<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Empire Business</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --bg: #000; --neon-blue: #00d4ff; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; min-height: 100%; }
        .container { max-width: 450px; margin: auto; padding: 20px; padding-bottom: 100px; }
        
        .logo-gold { font-size: 28px; letter-spacing: 5px; color: var(--gold); margin-bottom: 5px; text-shadow: 0 0 15px rgba(212,175,55,0.4); text-align: center; }
        .subtitle { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 30px; text-align: center; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; text-align: center; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-wa { background: #25D366; color: white; padding: 8px; border-radius: 5px; text-decoration: none; font-size: 12px; display: inline-block; margin-top: 10px; font-weight: bold; width: 100%; text-align: center; box-sizing: border-box; }

        .page { display: none; }
        .active { display: block; }

        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .item-card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 10px; text-align: center; overflow: hidden; border-bottom: 2px solid var(--gold); }
        .item-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .price { color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #666; font-size: 10px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        
        #preview { width: 120px; height: 120px; object-fit: cover; margin: 10px auto; display: none; border-radius: 10px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    
    <div id="auth_section">
        <div class="logo-gold">S.E.G GLOBAL</div>
        <p class="subtitle">Infrastructure de Sécurisation</p>
        <div id="login_step1">
            <input type="email" id="email_input" placeholder="Email de votre compte">
            <button class="btn-gold" onclick="sendAccessCode()">Obtenir mon code d'accès</button>
        </div>
        <div id="login_step2" style="display:none;">
            <input type="text" id="otp_input" placeholder="Entrez le code reçu">
            <button class="btn-gold" onclick="verifyAccessCode()">Ouvrir l'Empire</button>
        </div>
    </div>

    <div id="main_app" style="display:none;">
        
        <div id="home_page" class="page active">
            <h3 style="text-align: center; color: var(--gold);">Le Marché S.E.G</h3>
            <div class="market-grid" id="market_feed"></div>
        </div>

        <div id="seller_page" class="page">
            <h2 style="color:var(--gold); text-align:center;">Vendre un article</h2>
            <input type="text" id="prod_name" placeholder="Nom du produit">
            <input type="number" id="prod_price" placeholder="Prix (FCFA)">
            <input type="text" id="prod_phone" placeholder="Ton numéro WhatsApp (ex: 237690...)">
            <p style="font-size: 10px; text-align: center;">PHOTO :</p>
            <input type="file" id="prod_img" accept="image/*" onchange="previewImage(event)">
            <center><img id="preview"></center>
            <button class="btn-gold" onclick="publishProduct()" id="pub_btn">Publier sur le Marché</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="showPage('home_page', this)">🏠<br>ACCUEIL</div>
            <div class="nav-item" onclick="showPage('seller_page', this)">🛒<br>VENDRE</div>
            <div class="nav-item" onclick="logout()">🚪<br>QUITTER</div>
        </nav>
    </div>
</div>

<script>
    // 1. INITIALISATION
    (function() { emailjs.init("QGnoNmpH78_GuSLf4"); })();

    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpcD_vS9hH5f8Q2L-Y0X0kE0",
        authDomain: "seg-global.firebaseapp.com",
        projectId: "seg-global"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let correctOTP = "";
    let compressedImage = ""; 

    // 2. AUTHENTICATION
    function sendAccessCode() {
        const email = document.getElementById('email_input').value;
        if(!email) return alert("Email requis");
        correctOTP = Math.floor(100000 + Math.random() * 900000).toString();
        
        emailjs.send("service_ocg86ge", "template_v7i6m5m", { to_email: email, otp_code: correctOTP })
        .then(() => {
            document.getElementById('login_step1').style.display = 'none';
            document.getElementById('login_step2').style.display = 'block';
        });
    }

    function verifyAccessCode() {
        if(document.getElementById('otp_input').value === correctOTP) {
            localStorage.setItem("seg_session", "active");
            startApp();
        } else {
            alert("Code incorrect.");
        }
    }

    function startApp() {
        document.getElementById('auth_section').style.display = 'none';
        document.getElementById('main_app').style.display = 'block';
        loadProducts();
    }

    // 3. LOGIQUE PRODUIT (COMPRESSION INCLUSE)
    function previewImage(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // Compression intelligente (800px max)
                const maxWidth = 800;
                const scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;

                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Conversion JPEG léger pour Firestore
                compressedImage = canvas.toDataURL("image/jpeg", 0.7);
                
                const prev = document.getElementById('preview');
                prev.src = compressedImage;
                prev.style.display = "block";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function publishProduct() {
        const name = document.getElementById('prod_name').value;
        const price = document.getElementById('prod_price').value;
        const tel = document.getElementById('prod_phone').value;

        if(!name || !price || !compressedImage || !tel) return alert("Remplis tout, Fondateur !");

        document.getElementById('pub_btn').innerText = "PUBLICATION...";

        db.collection("produits").add({
            nom: name,
            prix: price,
            image: compressedImage,
            tel: tel,
            date: new Date()
        }).then(() => {
            alert("🚀 Succès ! Article en ligne sur l'Empire.");
            location.reload();
        }).catch((err) => {
            alert("Erreur Firebase : " + err.message);
            document.getElementById('pub_btn').innerText = "Publier sur le Marché";
        });
    }

    function loadProducts() {
        const feed = document.getElementById('market_feed');
        db.collection("produits").orderBy("date", "desc").onSnapshot((snapshot) => {
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                const waLink = `https://wa.me/${p.tel}?text=Salut S.E.G Global, je veux : ${p.nom}`;
                feed.innerHTML += `
                    <div class="item-card">
                        <img src="${p.image || 'https://via.placeholder.com/150'}">
                        <strong>${p.nom}</strong>
                        <span class="price">${parseInt(p.prix).toLocaleString()} F</span>
                        <a href="${waLink}" class="btn-wa">ACHETER</a>
                    </div>
                `;
            });
        });
    }

    // 4. NAVIGATION
    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function logout() { localStorage.removeItem("seg_session"); location.reload(); }
    
    // Auto-connexion si session active
    if(localStorage.getItem("seg_session") === "active") startApp();

</script>
</body>
</html>
