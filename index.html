<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | IMMERSIVE CORE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { 
            --main: #00f2ff; 
            --gold: #ffd700; 
            --bg-deep: #00050a; 
            --glass: rgba(255, 255, 255, 0.03);
            --neon-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; }

        /* --- LE FOND DYNAMIQUE --- */
        body { 
            background: var(--bg-deep); 
            color: #fff; 
            margin: 0; 
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; /* Crée la grille futuriste */
            position: relative;
        }

        /* Effet de halo lumineux en arrière-plan */
        body::before {
            content: "";
            position: fixed;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.08) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        /* --- INTERFACE --- */
        #public-view { padding: 25px; min-height: 100vh; }
        
        .header { 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--main); padding-bottom: 10px; margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1);
        }

        /* CARTE PROPULSER (GLASSMORPHISM) */
        .cyber-card { 
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px); /* Floute le fond pour faire ressortir la carte */
            border: 1px solid rgba(0, 242, 255, 0.5);
            border-radius: 20px; 
            padding: 25px; 
            box-shadow: var(--neon-shadow);
            border-top: 4px solid var(--main);
        }

        .social-grid { display: flex; justify-content: space-around; margin: 25px 0; }
        
        .cyber-btn { 
            width: 65px; height: 65px; border: 1px solid var(--main); border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; 
            background: var(--glass); transition: 0.4s;
        }
        .cyber-btn:active { transform: scale(0.9); background: var(--main); color: #000; }

        /* BOUTON D'OR UNIQUE */
        .gold-trigger {
            background: linear-gradient(45deg, #ffd700, #b8860b);
            color: #000; width: 100%; padding: 18px; border-radius: 12px;
            font-weight: 900; border: none; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* S.E.G NEWS BOX */
        .news-container {
            margin-top: 30px;
            background: linear-gradient(90deg, rgba(255, 215, 0, 0.1), transparent);
            border-left: 4px solid var(--gold);
            padding: 20px;
            border-radius: 0 15px 15px 0;
        }

        /* --- NEXUS PRIVÉ --- */
        #nexus-steve { display: none; padding: 25px; background: #000; min-height: 100vh; }
        .vault-display {
            border: 1px solid var(--gold);
            padding: 40px 20px;
            text-align: center;
            border-radius: 30px;
            background: radial-gradient(circle, #1a1a10 0%, #000 100%);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

<div id="public-view">
    <div class="header">
        <div style="color:var(--main); font-size:22px; font-weight:900; text-shadow: 0 0 10px var(--main);">S.E.G GLOBAL</div>
        <div onclick="accederNexus()" style="cursor:pointer; font-size:28px; color:var(--main);">💠</div>
    </div>

    <div class="cyber-card">
        <h2 style="margin:0; font-size:18px; letter-spacing:2px;">🚀 PROPULSER L'EMPIRE</h2>
        <p style="color:var(--main); font-size:10px; margin-top:5px; opacity:0.8;">INITIALISATION DU PROTOCOLE DE PARTAGE...</p>
        
        <div class="social-grid">
            <div onclick="share('wa')" style="border-color:#25d366; color:#25d366;" class="cyber-btn">WA</div>
            <div onclick="share('fb')" style="border-color:#1877f2; color:#1877f2;" class="cyber-btn">FB</div>
            <div onclick="share('tg')" style="border-color:#0088cc; color:#0088cc;" class="cyber-btn">TG</div>
        </div>

        <button class="gold-trigger" onclick="copyLink()">🔗 GÉNÉRER MON LIEN UNIQUE</button>
    </div>

    <div class="news-container">
        <div style="color:var(--gold); font-size:12px; font-weight:bold; margin-bottom:10px;">[ TRANSMISSION EN COURS ]</div>
        <div id="display-msg" style="font-size:14px; line-height:1.6; color:#e0e0e0;">Connexion aux serveurs Auto Global...</div>
    </div>
</div>

<div id="nexus-steve">
    <h1 style="color:var(--gold); text-align:center; font-size:20px;">COMMANDEMENT CENTRAL</h1>
    <div class="vault-display">
        <div style="color:rgba(255,215,0,0.6); font-size:11px; margin-bottom:15px;">TOTAL ACTIFS SÉCURISÉS</div>
        <div style="font-size:38px; font-weight:900; color:#fff; text-shadow: 0 0 15px #fff;">450 000 000</div>
        <div style="color:var(--gold); font-size:18px; margin-top:5px;">FCFA</div>
    </div>
    <textarea id="input-msg" style="width:100%; background:#0a0a0a; border:1px solid var(--gold); color:#fff; padding:15px; border-radius:10px; margin-bottom:20px;" rows="5"></textarea>
    <button onclick="updateSystem()" style="background:#ff3131; color:#fff; width:100%; padding:20px; border:none; border-radius:15px; font-weight:900; box-shadow: 0 0 20px rgba(255,49,49,0.4);">🚀 DÉPLOYER MISE À JOUR</button>
</div>

<script>
    // Config Firebase (Garde tes infos actuelles ici)
    const firebaseConfig = { apiKey: "TON_API_KEY", databaseURL: "TON_URL" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Sync
    db.ref('app_core').on('value', (snap) => {
        const val = snap.val();
        if(val) {
            document.getElementById('display-msg').innerText = "> " + val.message;
            document.getElementById('input-msg').value = val.message;
        }
    });

    function updateSystem() {
        const m = document.getElementById('input-msg').value;
        db.ref('app_core').set({ message: m, lastUpdate: Date.now() });
        alert("PROTOCOLE MIS À JOUR.");
    }

    function accederNexus() {
        let pass = prompt("IDENTIFIANT FONDATEUR :");
        if(pass && pass.toLowerCase() === "stève") {
            document.getElementById('public-view').style.display = 'none';
            document.getElementById('nexus-steve').style.display = 'block';
        }
    }
</script>
</body>
</html>
