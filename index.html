<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL | Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #0D0D0D; --surface: #1A1A1A; --text: #F2F2F2; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- PAGE D'INSCRIPTION (VISIBLE PAR DÉFAUT) --- */
        #auth-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('profile.jpg') center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000;
            padding: 20px;
        }

        .auth-card {
            background: rgba(26, 26, 26, 0.95); padding: 30px; border-radius: 15px;
            width: 100%; max-width: 400px; border: 1px solid var(--gold); text-align: center;
        }

        .auth-card h2 { font-family: 'Playfair Display'; color: var(--gold); margin-bottom: 20px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333;
            background: #222; color: white; margin-top: 5px;
        }

        .btn-reg {
            background: var(--gold); color: black; border: none; padding: 15px;
            width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* --- INTERFACE PRINCIPALE (CACHÉE AU DÉBUT) --- */
        #main-app { display: none; height: 100vh; }
        
        header { 
            height: 60px; padding: 0 15px; display: flex; justify-content: space-between; 
            align-items: center; background: var(--surface); border-bottom: 1px solid #333;
        }
        .logo { font-family: 'Playfair Display'; color: var(--gold); font-size: 1.3rem; }

        .app-content { height: calc(100vh - 130px); overflow-y: auto; padding: 15px; }
        
        /* Style Post (comme ta capture) */
        .post-card { background: var(--surface); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #222; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); }

        nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: var(--surface); display: flex; border-top: 1px solid #333;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; text-decoration: none; font-size: 0.7rem; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

    <div id="auth-page">
        <div class="auth-card">
            <h2>S.E.G GLOBAL</h2>
            <p style="font-size: 0.9rem; color: #aaa;">Rejoignez l'élite du commerce</p>
            
            <div class="input-group">
                <input type="text" id="reg-name" placeholder="Nom complet (ex: Stève Mpina)">
            </div>
            <div class="input-group">
                <input type="email" id="reg-email" placeholder="Adresse Email">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Mot de passe">
            </div>
            
            <button class="btn-reg" onclick="startApp()">CRÉER MON COMPTE</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div class="logo">S.E.G GLOBAL</div>
            <div style="font-size: 1.2rem;">🔍 💬</div>
        </header>

        <div class="app-content">
            <div class="post-card">
                <div class="post-header">
                    <div class="avatar"></div>
                    <div>
                        <b id="user-display-name">Utilisateur</b><br>
                        <small style="color: #666;">À l'instant</small>
                    </div>
                </div>
                <p>Bienvenue dans votre espace personnel. Vous pouvez maintenant poster vos articles de luxe.</p>
                <div style="width:100%; height:200px; background: #222; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#444;">
                    [ Image de votre premier article ]
                </div>
            </div>
        </div>

        <nav>
            <a href="#" class="nav-item active">🏠<span>Accueil</span></a>
            <a href="#" class="nav-item">🏪<span>Market</span></a>
            <a href="#" class="nav-item">👥<span>Amis</span></a>
            <a href="#" class="nav-item">🔔<span>Notifs</span></a>
            <a href="#" class="nav-item">≡<span>Menu</span></a>
        </nav>
    </div>

    <script>
        function startApp() {
            const name = document.getElementById('reg-name').value;
            if (name.trim() === "") {
                alert("S'il vous plaît, entrez votre nom.");
                return;
            }
            
            // On enregistre le nom pour l'afficher dans l'app
            document.getElementById('user-display-name').innerText = name;
            
            // Transition fluide vers l'application
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }
    </script>
</body>
</html>
