<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Marketplace</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --amazon-gold: #febd69; --amazon-dark: #131921; --seg-gold: #D4AF37; }
        body { background-color: #f3f3f3; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        
        /* Navbar style Amazon */
        .header { background-color: var(--amazon-dark); padding: 10px 20px; display: flex; flex-direction: column; align-items: center; color: white; }
        .logo { font-weight: bold; color: white; font-size: 22px; margin-bottom: 10px; }
        .logo span { color: var(--seg-gold); }
        .search-bar { width: 100%; display: flex; max-width: 500px; }
        .search-bar input { flex: 1; padding: 10px; border: none; border-radius: 4px 0 0 4px; }
        .search-bar button { background: var(--amazon-gold); border: none; padding: 10px 15px; border-radius: 0 4px 4px 0; cursor: pointer; }

        /* Conteneur */
        .container { padding: 15px; max-width: 600px; margin: auto; }
        
        /* Section Connexion */
        .auth-card { background: white; padding: 25px; border-radius: 8px; border: 1px solid #ddd; margin-top: 20px; text-align: center; }
        .btn-amazon { background: #ffd814; border: 1px solid #fcd200; border-radius: 8px; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Grille de Produits Amazon Style */
        #product_interface { display: none; }
        .hero-banner { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #ddd; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; padding: 10px; border-radius: 4px; border: 1px solid #ddd; text-align: left; }
        .card img { width: 100%; border-radius: 4px; background: #eee; }
        .price { color: #B12704; font-size: 18px; font-weight: bold; margin: 5px 0; }
        .delivery { font-size: 12px; color: #565959; }
    </style>
</head>
<body>

<div id="auth_section">
    <div class="header">
        <div class="logo">S.E.G <span>GLOBAL</span></div>
    </div>
    <div class="container">
        <div class="auth-card">
            <h3>Bienvenue chez S.E.G</h3>
            <p style="font-size: 14px;">Connectez-vous pour accéder à votre boutique de luxe.</p>
            <div id="step1">
                <input type="email" id="user_email" style="width:90%; padding:10px; margin-bottom:10px;" placeholder="E-mail">
                <button class="btn-amazon" onclick="sendOTP()">Continuer</button>
            </div>
            <div id="step2" style="display:none;">
                <input type="text" id="user_otp" style="width:90%; padding:10px; margin-bottom:10px;" placeholder="Code de vérification">
                <button class="btn-amazon" onclick="verifyOTP()">Vérifier le code</button>
            </div>
        </div>
    </div>
</div>

<div id="product_interface">
    <div class="header">
        <div class="logo">S.E.G <span>GLOBAL</span></div>
        <div class="search-bar">
            <input type="text" placeholder="Rechercher des diamants, pierres...">
            <button>🔍</button>
        </div>
    </div>
    <div class="container">
        <div class="hero-banner">
            <h2>L'empire est en marche</h2>
            <p>Découvrez nos extractions exclusives.</p>
        </div>
        <div class="grid">
            <div class="card">
                <div style="height:100px; background:#ddd;">💎</div>
                <h4>Diamant Brut</h4>
                <div class="price">850,00 €</div>
                <div class="delivery">Livraison GRATUITE</div>
            </div>
            <div class="card">
                <div style="height:100px; background:#ddd;">💍</div>
                <h4>Pierre Précieuse</h4>
                <div class="price">1 200,00 €</div>
                <div class="delivery">Stock limité</div>
            </div>
        </div>
        <button onclick="logout()" style="margin-top:20px; background:none; border:none; color:#007185; text-decoration:underline; cursor:pointer;">Déconnexion</button>
    </div>
</div>

<script>
    // Configuration Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpcD_vS9hH5f8Q2L-Y0X0kE0", 
        authDomain: "seg-global.firebaseapp.com",
        projectId: "seg-global",
        storageBucket: "seg-global.appspot.com",
        messagingSenderId: "880037527683",
        appId: "1:880037527683:web:0f0b38d469714f808c96bb",
        measurementId: "G-Z5WG470MGW"
    };
    firebase.initializeApp(firebaseConfig);
    emailjs.init("QGnoNmpH78_GuSLf4");

    let generatedOTP = "";

    window.onload = function() {
        if (localStorage.getItem("seg_global_session") === "active") {
            showProducts();
        }
    };

    function sendOTP() {
        const email = document.getElementById("user_email").value;
        if(!email) return alert("E-mail requis");
        generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
        emailjs.send("service_ocg86ge", "template_v7i6m5m", { to_email: email, otp_code: generatedOTP })
            .then(() => {
                document.getElementById("step1").style.display = "none";
                document.getElementById("step2").style.display = "block";
            });
    }

    function verifyOTP() {
        if(document.getElementById("user_otp").value === generatedOTP) {
            localStorage.setItem("seg_global_session", "active");
            showProducts();
        } else { alert("Code invalide"); }
    }

    function showProducts() {
        document.getElementById("auth_section").style.display = "none";
        document.getElementById("product_interface").style.display = "block";
    }

    function logout() {
        localStorage.removeItem("seg_global_session");
        location.reload();
    }
</script>
</body>
</html>
