<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Authentification</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #d4af37;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            border: 1px solid #d4af37;
            padding: 40px;
            border-radius: 15px;
            background: linear-gradient(145deg, #0a0a0a, #1a1a1a);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        h1 { font-size: 24px; letter-spacing: 3px; margin-bottom: 10px; }
        p { font-size: 14px; margin-bottom: 30px; color: #d4af37; opacity: 0.8; }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #d4af37;
            background: rgba(212, 175, 55, 0.1);
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #d4af37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .footer-text { margin-top: 25px; font-size: 10px; color: #555; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>S.E.G GLOBAL</h1>
        <p>AUTHENTIFICATION DE LUXE</p>
        
        <input type="email" id="user_email" placeholder="Entrez votre email" required>
        <button onclick="envoyerCode()">Obtenir mon code d'accès</button>
        
        <div class="footer-text">EXIGENCE • EXCLUSIVITÉ • SÉCURITÉ</div>
    </div>

    <script type="text/javascript">
        // Initialisation avec ta Clé Publique
        emailjs.init("QGnoNmpH78_GuSLf4");

        function envoyerCode() {
            const email = document.getElementById('user_email').value;
            const btn = document.querySelector('button');

            if (!email) {
                alert("Veuillez entrer une adresse email valide.");
                return;
            }

            // On change le texte du bouton pendant l'envoi
            btn.innerText = "ENVOI EN COURS...";
            btn.disabled = true;

            // Génération d'un code à 6 chiffres
            const code = Math.floor(100000 + Math.random() * 900000);

            const params = {
                to_email: email,
                otp_code: code,
                from_name: "S.E.G GLOBAL"
            };

            // Envoi via ton Service ID et ton Template ID
            // IMPORTANT : Utilise 'template_v7i6m5m' (ID standard pour le code OTP)
            emailjs.send('service_oc73u8o', 'template_v7i6m5m', params)
                .then(function() {
                    alert("Succès ! Un code de sécurité a été envoyé à : " + email);
                    btn.innerText = "CODE ENVOYÉ";
                }, function(error) {
                    alert("Erreur technique : " + JSON.stringify(error));
                    btn.innerText = "OBTENIR MON CODE D'ACCÈS";
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
