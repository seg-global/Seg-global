<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | Elite Management</title>
    <style>
        :root { --primary: #1877F2; --gold: #D4AF37; --white: #ffffff; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); padding-bottom: 70px; }

        /* HEADER */
        .header { background: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; color: var(--primary); font-size: 18px; }

        /* PROFIL UTILISATEUR */
        .profile-header { background: linear-gradient(to bottom, var(--primary), #0a4da0); height: 120px; position: relative; }
        .profile-pic { width: 100px; height: 100px; background: #eee; border: 4px solid var(--white); border-radius: 50%; position: absolute; bottom: -50px; left: 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .profile-info { padding: 60px 20px 20px 20px; background: var(--white); border-bottom: 1px solid #ddd; }

        /* LISTE DES OPTIONS */
        .opt-list { background: var(--white); margin-top: 10px; }
        .opt-item { padding: 15px 20px; border-bottom: 1px solid #f0f2f5; display: flex; align-items: center; cursor: pointer; font-weight: 500; }
        .opt-icon { margin-right: 15px; font-size: 20px; }

        /* NAVIGATION BASSE */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-link { flex: 1; text-align: center; color: #65676b; font-size: 10px; font-weight: 600; cursor: pointer; }
        .nav-link.active { color: var(--primary); }

        .view { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">S.E.G</div>
    <div style="font-size: 18px;">💬</div>
</div>

<!-- FIL D'ACTU -->
<div id="home" class="view active">
    <div style="padding: 20px; text-align: center;">
        <div style="background: white; padding: 30px; border-radius: 20px; border: 1px solid #eee;">
            <h3>Actualités de l'Empire</h3>
            <p style="color: #65676b;">Sécurisation des serveurs **auto global** en cours...</p>
        </div>
    </div>
</div>

<!-- PROFIL / MENU -->
<div id="profile" class="view">
    <div class="profile-header">
        <div class="profile-pic">👤</div>
    </div>
    <div class="profile-info">
        <h2 style="margin:0;">Stève</h2>
        <p style="color: var(--gray-text); margin: 5px 0;">CEO de **auto global**</p>
        <button style="margin-top:10px; background: #e4e6eb; border:none; padding: 8px 15px; border-radius: 5px; font-weight: bold;">Modifier le profil</button>
    </div>
    <div class="opt-list">
        <div class="opt-item"><span class="opt-icon">💎</span> Mes Diamants</div>
        <div class="opt-item"><span class="opt-icon">⚙️</span> Paramètres du système</div>
        <div class="opt-item" style="color: var(--gold);"><span class="opt-icon">💰</span> Portail Investisseur</div>
        <div class="opt-item" style="color: red;"><span class="opt-icon">🚪</span> Déconnexion</div>
    </div>
</div>

<div class="nav">
    <div class="nav-link active" onclick="show('home', this)">🏠<br>FIL D'ACTU</div>
    <div class="nav-link" onclick="alert('Marché en maintenance')">🏪<br>LE MARCHÉ</div>
    <div class="nav-link" style="color: var(--gold);">💰<br>INVESTIR</div>
    <div class="nav-link" onclick="show('profile', this)">☰<br>MENU</div>
</div>

<script>
    function show(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
</script>

</body>
</html>
