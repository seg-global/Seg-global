<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | Système Expert</title>
    <style>
        :root {
            --primary: #1877F2; 
            --gold: #D4AF37;
            --dark: #1c1e21;
            --white: #ffffff;
            --bg: #f0f2f5;
        }

        body { font-family: sans-serif; margin: 0; background: var(--bg); padding-bottom: 70px; overflow-x: hidden; }

        /* HEADER */
        .header {
            background: var(--white); padding: 15px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000;
        }

        /* MENU LATÉRAL */
        .side-menu {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--white); box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            transition: 0.3s; z-index: 2000; padding: 20px;
        }
        .side-menu.open { right: 0; }
        .menu-item { padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; cursor: pointer; }

        /* GRILLE DU MARCHÉ */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .product-card { background: var(--white); border-radius: 10px; overflow: hidden; border: 1px solid #ddd; }
        .product-img { width: 100%; height: 120px; background: #333; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; }
        .product-info { padding: 10px; }
        .price { color: var(--gold); font-weight: bold; }

        /* NAVIGATION BASSE */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; border-top: 1px solid #ddd; padding: 10px 0; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #65676b; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .screen { display: none; animation: fadeIn 0.3s; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* BOUTON NÉGOCIER */
        .btn-nego { background: var(--primary); color: white; border: none; width: 100%; padding: 8px; border-radius: 5px; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 800; color: var(--primary);">S.E.G GLOBAL</div>
        <div onclick="toggleMenu()" style="cursor:pointer; font-size: 20px;">☰</div>
    </div>

    <!-- MENU LATÉRAL -->
    <div id="sideMenu" class="side-menu">
        <div onclick="toggleMenu()" style="font-size: 25px; cursor: pointer; margin-bottom: 20px;">&times;</div>
        <div class="menu-item">👤 Mon Profil</div>
        <div class="menu-item">📦 Mes Commandes</div>
        <div class="menu-item">🛡️ Sécurité & Compte</div>
        <div class="menu-item" style="color: red; margin-top: 50px;">Déconnexion</div>
    </div>

    <!-- ÉCRAN ACCUEIL -->
    <div id="home" class="screen active-screen">
        <div style="padding: 20px; background: white; margin: 10px; border-radius: 10px;">
            <h3>Actualités de l'Empire</h3>
            <p>Le projet **auto global** avance au Cameroun. Nos équipes préparent les infrastructures serveurs.</p>
        </div>
    </div>

    <!-- ÉCRAN MARCHÉ -->
    <div id="market" class="screen">
        <div class="market-grid">
            <!-- Produit 1 -->
            <div class="product-card">
                <div class="product-img">💎</div>
                <div class="product-info">
                    <b>Diamant Brut</b><br>
                    <span class="price">Prix à négocier</span>
                    <button class="btn-nego" onclick="alert('Ouverture du chat sécurisé...')">Négocier</button>
                </div>
            </div>
            <!-- Produit 2 -->
            <div class="product-card">
                <div class="product-img">✨</div>
                <div class="product-info">
                    <b>Pierre Rare</b><br>
                    <span class="price">Sur devis</span>
                    <button class="btn-nego" onclick="alert('Ouverture du chat sécurisé...')">Négocier</button>
                </div>
            </div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="showScreen('home', this)">🏠<br>Accueil</div>
        <div class="nav-item" onclick="showScreen('market', this)">🏪<br>Marché</div>
        <div class="nav-item" style="color: var(--gold);" onclick="alert('Portail Investisseur activé')">💰<br>Investir</div>
        <div class="nav-item" onclick="toggleMenu()">☰<br>Menu</div>
    </div>

    <script>
        function showScreen(screenId, element) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(element) element.classList.add('active');
        }

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('open');
        }
    </script>
</body>
</html>
