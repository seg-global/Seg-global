<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Empire Interactif</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', sans-serif; }
        body { background-color: #f0f2f2; padding-bottom: 80px; overflow-x: hidden; }

        /* HEADER */
        .app-header { background-color: #232F3E; padding: 15px; position: sticky; top: 0; z-index: 1000; text-align: center; }
        .logo { color: #19C9D1; font-size: 22px; font-weight: bold; letter-spacing: 3px; }

        /* VUES */
        .page-view { display: none; animation: fadeIn 0.3s ease; }
        .active-view { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ACCUEIL CLIENT */
        .ceo-banner { padding: 10px; }
        .ceo-card { 
            height: 300px; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://i.ibb.co/tPhqzzV2/IMG-1506.jpg');
            background-size: cover; background-position: center; border-radius: 15px;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; color: white;
        }

        .product-grid { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .p-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .p-img { width: 100%; height: 150px; object-fit: cover; }
        .p-info { padding: 10px; text-align: center; }
        .buy-btn { background: #FEBD69; border: none; padding: 8px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* FORMULAIRE VENDEUR */
        .form-container { padding: 20px; background: white; margin: 15px; border-radius: 15px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .submit-btn { background: #19C9D1; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* DASHBOARD DG */
        #dashboard-view { background: #0d1117; color: white; min-height: 100vh; padding: 20px; }
        .stat-box { background: #161b22; padding: 20px; border-radius: 15px; border: 1px solid #30363d; margin-bottom: 15px; text-align: center; }

        /* NAV BASSE */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: white; display: flex; border-top: 1px solid #eee; z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: #19C9D1; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="logo">S.E.G GLOBAL</div>
    </header>

    <main id="view-home" class="page-view active-view">
        <div class="ceo-banner">
            <div class="ceo-card">
                <h2 style="text-transform: uppercase;">Offres du DG</h2>
                <p style="color: #19C9D1; font-weight: bold;">DANS LE MONDE ENTIER 🌍</p>
            </div>
        </div>
        <div class="product-grid">
            <div class="p-card">
                <img src="https://images.pexels.com/photos/1478442/pexels-photo-1478442.jpeg?auto=compress&cs=tinysrgb&w=400" class="p-img">
                <div class="p-info">
                    <p style="font-size: 12px;">Sneakers Luxe</p>
                    <p style="font-weight: bold;">180,000 F</p>
                    <button class="buy-btn" onclick="actionAchat()">ACHETER</button>
                </div>
            </div>
            <div class="p-card">
                <img src="https://images.pexels.com/photos/190819/pexels-photo-190819.jpeg?auto=compress&cs=tinysrgb&w=400" class="p-img">
                <div class="p-info">
                    <p style="font-size: 12px;">Montre S.E.G</p>
                    <p style="font-weight: bold;">450,000 F</p>
                    <button class="buy-btn" onclick="actionAchat()">ACHETER</button>
                </div>
            </div>
        </div>
    </main>

    <div id="view-sell" class="page-view">
        <div class="form-container">
            <h2 style="text-align: center; color: #232F3E; margin-bottom: 15px;">POSTER UN ARTICLE</h2>
            <p style="font-size: 12px; color: #666; text-align: center; margin-bottom: 20px;">Le Scanner S.E.G analysera votre photo après validation.</p>
            <input type="text" id="itemName" placeholder="Nom de l'article (ex: Barbouches)">
            <input type="number" id="itemPrice" placeholder="Prix de vente (FCFA)">
            <select id="itemCat">
                <option>Chaussures</option>
                <option>Vêtements</option>
                <option>Bijoux/Montres</option>
            </select>
            <button class="submit-btn" onclick="validerPost()">ACTIVER LE SCANNER & PUBLIER</button>
        </div>
    </div>

    <div id="view-dg" class="page-view">
        <div id="dashboard-view">
            <h2 style="color: #19C9D1; margin-bottom: 20px;">DASHBOARD DG</h2>
            <div class="stat-box">
                <p style="font-size: 12px; color: #8b949e;">COMMISSIONS TOTALES (10%)</p>
                <h1 id="total-revenue" style="color: #3fb950; margin: 10px 0;">4 850 000 FCFA</h1>
            </div>
            <div class="stat-box">
                <i class="fas fa-shield-alt" style="color: #ff7b72; font-size: 24px;"></i>
                <p style="margin-top: 10px;">42 ARNAQUES BLOQUÉES</p>
            </div>
            <button class="submit-btn" style="background: #30363d;" onclick="alert('Audit de sécurité en cours...')">AUDIT DU SYSTÈME</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="showPage('home')">
            <i class="fas fa-home"></i><span>Accueil</span>
        </div>
        <div class="nav-item" id="nav-sell" onclick="showPage('sell')">
            <i class="fas fa-plus-circle"></i><span>Vendre</span>
        </div>
        <div class="nav-item" id="nav-dg" onclick="showPage('dg')">
            <i class="fas fa-user-tie"></i><span>Mon S.E.G</span>
        </div>
    </nav>

    <script>
        // LOGIQUE DES BOUTONS
        function showPage(pageId) {
            // Cacher toutes les vues
            document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active-view'));
            // Désactiver tous les boutons nav
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Afficher la page demandée
            document.getElementById('view-' + pageId).classList.add('active-view');
            document.getElementById('nav-' + pageId).classList.add('active');

            // Changer la couleur du fond si c'est le dashboard
            document.body.style.backgroundColor = (pageId === 'dg') ? '#0d1117' : '#f0f2f2';
            window.scrollTo(0,0);
        }

        function actionAchat() {
            alert("✅ Article ajouté au panier S.E.G.\nConnectez-vous pour finaliser le paiement sécurisé.");
        }

        function validerPost() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            if(name && price) {
                alert("🔎 SCANNER S.E.G EN COURS...\n\nL'article '" + name + "' a été analysé avec succès.\nIl sera publié après vérification des 10% de commission.");
                showPage('home');
            } else {
                alert("Veuillez remplir les informations de l'article.");
            }
        }
    </script>
</body>
</html>
