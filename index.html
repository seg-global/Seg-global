<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - L'Empire Tout-en-Un</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --gold: #FFD700;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #000; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; color: white;
        }

        /* FOND CIEL AVEC SOLEIL (image_218.png) */
        .sky-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            z-index: -1;
        }
        .sun {
            position: absolute; top: 5%; right: 5%; width: 120px; height: 120px;
            background: radial-gradient(circle, #fff700 0%, transparent 75%);
            filter: blur(20px);
        }

        /* 1. ANALYSE LIVE (Milliards visés) */
        .section-card {
            margin: 10px auto; width: 90%;
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.3);
            padding: 15px; text-align: center; z-index: 10;
        }
        .live-value { font-size: 1.6em; font-weight: bold; color: #0047AB; text-decoration: underline; }

        /* 2. FLUX VIDÉO (TikTok / YouTube Style) */
        .main-content {
            height: 60vh; width: 95%; margin: 0 auto;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            border: 3px solid var(--neon-blue); border-radius: 25px;
            box-shadow: 0 0 20px var(--neon-blue);
            position: relative; background: rgba(0,0,0,0.4);
        }
        .video-container {
            height: 100%; width: 100%; scroll-snap-align: start;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 22px; }

        /* INTERFACE VIDÉO */
        .video-overlay {
            position: absolute; right: 15px; bottom: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }
        .neon-circle {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid var(--neon-blue); background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* 3. COFFRE-FORT PRIVÉ & SIMULATEUR (image_218.png) */
        .bottom-actions {
            display: flex; flex-direction: column; gap: 10px; margin-top: 10px;
        }
        .btn-action {
            width: 90%; margin: 0 auto; padding: 12px;
            border-radius: 15px; border: none; font-weight: bold;
            text-transform: uppercase; cursor: pointer;
        }
        .btn-unlock { background: #007bff; color: white; box-shadow: 0 4px 15px rgba(0,123,255,0.4); }
        .btn-gold { background: var(--gold); color: #333; }

        /* BARRE DE NAVIGATION (Facebook / Amazon / YouTube) */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--neon-blue);
        }
    </style>
</head>
<body>

    <div class="sky-bg"><div class="sun"></div></div>

    <!-- ENTÊTE : ANALYSE LIVE -->
    <div class="section-card">
        <div style="font-weight: bold; color: #0047AB;">📊 ANALYSE LIVE</div>
        <div class="live-value" id="main-counter">450 023 573 FCFA</div>
        <div style="font-size: 0.8em; color: #444;">Objectif : 500 Milliards</div>
    </div>

    <!-- CŒUR : FLUX VIDÉO -->
    <div class="main-content">
        <div class="video-container">
            <video autoplay muted loop playsinline>
                <source src="votre-video-1.mp4" type="video/mp4">
            </video>
            <div class="video-overlay">
                <div class="neon-circle">❤️</div>
                <div class="neon-circle">💬</div>
                <div class="neon-circle">🚀</div>
            </div>
        </div>
        <!-- On peut ajouter d'autres video-container ici -->
    </div>

    <!-- ACTIONS : COFFRE-FORT & PROFITS -->
    <div class="bottom-actions">
        <button class="btn-action btn-unlock">🔐 DÉVERROUILLER COFFRE-FORT</button>
        <div class="section-card" style="padding: 10px;">
            <input type="number" placeholder="Montant à investir" style="width: 80%; padding: 8px; border-radius: 10px; border: none;">
            <button class="btn-action btn-gold" style="width: 100%; margin-top: 5px;">SIMULER PROFITS</button>
        </div>
    </div>

    <!-- NAVIGATION EMPIRE -->
    <nav class="nav-bar">
        <span>📱 Vidéos</span>
        <span>💎 Bijoux</span>
        <span>🛍️ Boutique</span>
        <span>👤 Profil</span>
    </nav>

    <script>
        // Animation du compteur (Vision 500 Milliards)
        let total = 450023573;
        setInterval(() => {
            total += Math.floor(Math.random() * 10000);
            document.getElementById('main-counter').innerText = total.toLocaleString() + " FCFA";
        }, 1500);
    </script>

</body>
</html>
