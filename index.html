<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | MASTER CONTROL</title>
    
    <!-- SDK FIREBASE (La grande base de données de ton image 180) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #1877F2; --gold: #D4AF37; --bg: #000; --deploy: #ff3131; }
        * { box-sizing: border-box; font-family: 'SF Pro Display', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; overflow-x: hidden; }

        /* INTERFACE PUBLIQUE (CLIENT) */
        #app-public { display: block; padding-bottom: 80px; }
        .header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 20px; color: var(--main); }

        /* LE NEXUS (TON ÉCRAN DE FONDATEUR) */
        #nexus-steve { display: none; padding: 20px; border: 4px solid var(--gold); min-height: 100vh; animation: fadeIn 0.5s; }
        .vault-card { background: #111; border-radius: 20px; padding: 20px; border: 1px solid var(--gold); margin-bottom: 20px; text-align: center; }
        .editor-box { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 100px; }
        input, textarea { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; margin-top: 10px; }
        
        /* BOUTON DÉPLOYER */
        .master-btn { position: fixed; bottom: 20px; left: 5%; width: 90%; background: var(--deploy); color: white; border: none; padding: 20px; border-radius: 15px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 30px rgba(255,49,49,0.4); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<!-- 1. VUE QUE LE MONDE ENTIER VOIT -->
<div id="app-public">
    <div class="header">
        <div class="logo">S.E.G GLOBAL</div>
        <div onclick="startAuth()" style="cursor:pointer; font-size:24px;">☰</div>
    </div>
    <div style="padding: 30px; text-align: center;">
        <h1 id="live-title" style="font-size: 32px;">Chargement...</h1>
        <div id="live-content" style="background:#111; padding:25px; border-radius:20px; color:#aaa; font-size:18px;">
            Connexion sécurisée aux serveurs Auto Global...
        </div>
    </div>
</div>

<!-- 2. TON NEXUS PRIVÉ (CACHE POUR LES AUTRES) -->
<div id="nexus-steve">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="color:var(--gold); margin:0;">NEXUS FONDATEUR</h2>
        <button onclick="location.reload()" style="background:none; border:none; color:white;">SORTIR</button>
    </div>

    <div class="vault-card">
        <small style="color:var(--gold)">RÉSERVE DE VALEUR S.E.G</small>
        <div style="font-size:32px; font-weight:900; margin:10px 0;">450 000 000 FCFA</div>
        <div style="font-size:12px; color:#00ff88;">● IA DE SURVEILLANCE ACTIVE</div>
    </div>

    <div class="editor-box">
        <h3>MISE À JOUR MONDIALE (MIROIR)</h3>
        <label>Titre de l'application :</label>
        <input type="text" id="input-title" placeholder="Ex: S.E.G Empire">
        <br><br>
        <label>Annonce clients :</label>
        <textarea id="input-content" placeholder="Ecrivez votre message ici..."></textarea>
        <p style="font-size:11px; color:#666; margin-top:15px;">Note : Vos changements ne seront visibles sur Safari/Google que si vous cliquez sur DÉPLOYER.</p>
    </div>

    <button class="master-btn" onclick="pushToGlobal()">🚀 DÉPLOYER POUR TOUS LES UTILISATEURS</button>
</div>

<script>
    // --- CONFIGURATION FIREBASE (TES INFOS DE L'IMAGE 180) ---
    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpc...", // Complète avec ta clé de la photo 4
        authDomain: "seg-global.firebaseapp.com",
        databaseURL: "https://seg-global-default-rtdb.firebaseio.com", // Ton lien de base de données
        projectId: "seg-global",
        storageBucket: "seg-global.appspot.com",
        messagingSenderId: "880037527683",
        appId: "1:880037527683:web:..."
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // --- SYNCHRONISATION MONDIALE ---
    // Cette partie assure que les millions d'utilisateurs voient tes ordres.
    database.ref('app_state').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById('live-title').innerText = data.title;
            document.getElementById('live-content').innerText = data.content;
        }
    });

    // --- LOGIQUE DE DÉPLOIEMENT ---
    function pushToGlobal() {
        const newTitle = document.getElementById('input-title').value;
        const newContent = document.getElementById('input-content').value;

        if(!newTitle || !newContent) return alert("Remplissez les champs !");

        if(confirm("DÉPLOIEMENT : Voulez-vous synchroniser tous les téléphones mondiaux ?")) {
            database.ref('app_state').set({
                title: newTitle,
                content: newContent,
                updatedBy: "Stève",
                timestamp: Date.now()
            }).then(() => {
                alert("✅ MISE À JOUR EFFECTUÉE DANS LE MONDE ENTIER !");
            });
        }
    }

    // --- SÉCURITÉ D'ACCÈS ---
    function startAuth() {
        let access = prompt("IDENTIFICATION FONDATRICE (GMAIL/FACEID) :");
        if(access === "STEVE") { // Ici on pourra lier ton vrai Gmail stevempina4@gmail.com
            document.getElementById('app-public').style.display = 'none';
            document.getElementById('nexus-steve').style.display = 'block';
        }
    }
</script>

</body>
</html>
