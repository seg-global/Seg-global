<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | CORE SYSTEM</title>
    
    <!-- SDK FIREBASE (Mémoire de l'Empire) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #1877F2; --gold: #D4AF37; --bg: #000; --deploy: #ff3131; }
        * { box-sizing: border-box; font-family: 'Helvetica Neue', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; overflow-x: hidden; }

        /* INTERFACE PUBLIQUE (VISIBILITÉ MONDIALE) */
        #public-view { display: block; min-height: 100vh; padding: 20px; text-align: center; }
        .logo-header { color: var(--main); font-weight: 900; font-size: 24px; letter-spacing: 2px; margin-bottom: 30px; }
        
        .viral-card { background: #111; border: 2px solid var(--main); border-radius: 25px; padding: 25px; margin: 20px 0; box-shadow: 0 0 15px rgba(24,119,242,0.2); }
        .social-bar { display: flex; justify-content: space-around; margin: 20px 0; }
        .icon-btn { cursor:pointer; width:55px; height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:14px; color:white; transition: 0.3s; }
        .icon-btn:active { transform: scale(0.9); }

        /* LE NEXUS (TON ACCÈS PRIVÉ STÈVE) */
        #nexus-steve { display: none; padding: 20px; background: #050505; min-height: 100vh; border: 4px solid var(--gold); }
        .vault-card { background: linear-gradient(145deg, #111, #000); border-radius: 20px; padding: 30px; border: 1px solid var(--gold); text-align: center; margin-bottom: 25px; }
        .btn-deploy { background: var(--deploy); color: white; border: none; padding: 22px; width: 100%; border-radius: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 30px rgba(255,49,49,0.3); }

        input, textarea { width: 100%; padding: 18px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

<!-- VUE PUBLIQUE -->
<div id="public-view">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="logo-header">S.E.G GLOBAL</div>
        <div onclick="lancerConnexion()" style="cursor:pointer; font-size:24px;">☰</div>
    </div>
    
    <h1 id="live-title">SYSTÈME EN CHARGEMENT...</h1>
    <div id="live-message" style="color:#888; font-size:18px;">Connexion au réseau sécurisé Auto Global...</div>

    <div class="viral-card">
        <h3>🚀 PROPULSER L'EMPIRE</h3>
        <p style="color:#aaa;">Partagez Auto Global pour activer la croissance mondiale.</p>
        <div class="social-bar">
            <div onclick="partageDirect('whatsapp')" style="background:#25D366;" class="icon-btn">WA</div>
            <div onclick="partageDirect('facebook')" style="background:#1877F2;" class="icon-btn">FB</div>
            <div onclick="partageDirect('telegram')" style="background:#0088cc;" class="icon-btn">TG</div>
        </div>
        <button onclick="partagerLien()" style="background:var(--gold); border:none; padding:15px; width:100%; border-radius:12px; font-weight:900;">🔗 COPIER LE LIEN UNIQUE</button>
    </div>
</div>

<!-- LE NEXUS FONDATEUR -->
<div id="nexus-steve">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 style="color:var(--gold); margin:0;">PILOTAGE FONDATRICE</h2>
        <button onclick="location.reload()" style="background:none; border:1px solid #444; color:white; padding:10px; border-radius:10px;">QUITTER</button>
    </div>

    <div class="vault-card">
        <div style="color:var(--gold); font-size:12px; font-weight:bold;">ACTIF SÉCURISÉ</div>
        <div style="font-size:35px; font-weight:900; margin:10px 0;">450 000 000 FCFA</div>
        <div style="color:#00ff88; font-size:11px;">● SURVEILLANCE IA ACTIVE</div>
    </div>

    <div style="background:#111; padding:20px; border-radius:15px;">
        <label>Titre de l'Application :</label>
        <input type="text" id="admin-title">
        <br><br>
        <label>Message aux utilisateurs :</label>
        <textarea id="admin-message" rows="4"></textarea>
    </div>

    <button class="btn-deploy" onclick="sauvegarderMiseAJour()">🚀 DÉPLOYER LA MISE À JOUR MONDIALE</button>
</div>

<script>
    // --- 1. CONFIGURATION FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpc...", // Remplace par ta clé complète
        authDomain: "seg-global.firebaseapp.com",
        databaseURL: "https://seg-global-default-rtdb.firebaseio.com",
        projectId: "seg-global",
        storageBucket: "seg-global.appspot.com",
        messagingSenderId: "880037527683",
        appId: "1:880037527683:web:..."
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. SYNCHRONISATION MONDIALE ---
    db.ref('main_config').on('value', (snap) => {
        const data = snap.val();
        if(data) {
            document.getElementById('live-title').innerText = data.titre;
            document.getElementById('live-message').innerText = data.message;
            document.getElementById('admin-title').value = data.titre;
            document.getElementById('admin-message').value = data.message;
        }
    });

    function sauvegarderMiseAJour() {
        const t = document.getElementById('admin-title').value;
        const m = document.getElementById('admin-message').value;
        if(confirm("Confirmer le déploiement mondial ?")) {
            db.ref('main_config').set({ titre: t, message: m, updated: Date.now() });
        }
    }

    // --- 3. SYSTÈME DE VIRALITÉ ---
    function partageDirect(plateforme) {
        const lien = window.location.href.split('?')[0] + "?ref=STEVE_" + Math.random().toString(36).substring(7);
        const texte = encodeURIComponent("Rejoignez mon empire sur Auto Global ! ");
        let url = "";
        if(plateforme === 'whatsapp') url = `https://api.whatsapp.com/send?text=${texte}${lien}`;
        if(plateforme === 'facebook') url = `https://www.facebook.com/sharer/sharer.php?u=${lien}`;
        if(plateforme === 'telegram') url = `https://t.me/share/url?url=${lien}&text=${texte}`;
        window.open(url, '_blank');
    }

    // --- 4. ACCÈS SÉCURISÉ STÈVE ---
    function lancerConnexion() {
        let n = prompt("IDENTIFICATION DU FONDATEUR :");
        if(n && (n.toUpperCase().trim() === "STEVE" || n.toUpperCase().trim() === "STÈVE")) {
            document.getElementById('public-view').style.display = 'none';
            document.getElementById('nexus-steve').style.display = 'block';
        }
    }
</script>
</body>
</html>
