<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | Elite Interface</title>
    <style>
        :root {
            --primary: #1877F2; --gold: #D4AF37; --bg: #f2f4f7; --white: #ffffff;
        }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }

        /* HEADER AMÉLIORÉ */
        .header { background: var(--white); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 10px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .search-bar { background: #f0f2f5; border-radius: 20px; padding: 8px 15px; width: 60%; font-size: 13px; color: #65676b; border: none; }

        /* STORIES */
        .stories { display: flex; gap: 12px; padding: 15px; overflow-x: auto; background: var(--white); border-bottom: 1px solid #e4e6eb; }
        .story { min-width: 62px; height: 62px; border-radius: 50%; border: 3px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 24px; background: #fafafa; }

        /* CARTES PRODUITS LUXE */
        .market-view { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--white); border-radius: 18px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; }
        .card-img { width: 100%; height: 130px; background: linear-gradient(135deg, #1c1e21, #444); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 40px; }
        .card-body { padding: 12px; }
        .card-title { font-weight: 700; font-size: 14px; margin-bottom: 5px; }
        .card-price { color: var(--gold); font-size: 12px; font-weight: bold; }
        .nego-btn { margin-top: 10px; width: 100%; background: var(--primary); color: white; border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }

        /* NAV BASSE */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-link { flex: 1; text-align: center; color: #65676b; font-size: 10px; font-weight: 600; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
        .nav-link.gold { color: var(--gold); }

        .view { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; color: var(--primary); font-size: 18px;">S.E.G</div>
    <input type="text" class="search-bar" placeholder="Rechercher une pierre...">
    <div style="font-size: 18px;">💬</div>
</div>

<div id="home" class="view active">
    <div class="stories">
        <div class="story">➕</div>
        <div class="story">💎</div>
        <div class="story">🔥</div>
        <div class="story">🇨🇲</div>
    </div>
    <div style="padding: 20px;">
        <div style="background: white; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #eee;">
            <h2 style="margin:0;">Statut : En ligne</h2>
            <p style="color: #65676b;">Sécurisation des infrastructures **auto global** en cours.</p>
        </div>
    </div>
</div>

<div id="market" class="view">
    <div class="market-view">
        <div class="card">
            <div class="card-img">💎</div>
            <div class="card-body">
                <div class="card-title">Diamant Brut</div>
                <div class="card-price">Négociation Sécurisée</div>
                <button class="nego-btn" onclick="alert('Connexion au serveur sécurisé...')">Négocier</button>
            </div>
        </div>
        <div class="card">
            <div class="card-img">✨</div>
            <div class="card-body">
                <div class="card-title">Saphir Bleu</div>
                <div class="card-price">Expertise requise</div>
                <button class="nego-btn" onclick="alert('Appel à un expert...')">Demander</button>
            </div>
        </div>
    </div>
</div>

<div class="nav">
    <div class="nav-link active" onclick="show('home', this)">🏠<br>FIL D'ACTU</div>
    <div class="nav-link" onclick="show('market', this)">🏪<br>LE MARCHÉ</div>
    <div class="nav-link gold" onclick="alert('Accès au portail investisseur...')">💰<br>INVESTIR</div>
    <div class="nav-link">☰<br>MENU</div>
</div>

<script>
    function show(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
</script>

</body>
</html>
