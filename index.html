<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL IA - Empire System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        .empire-header {
            text-align: center;
            padding: 20px 10px;
            background: linear-gradient(180deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .empire-header h1 {
            color: #D4AF37;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .objectif-badge {
            color: #00E5FF;
            font-size: 11px;
            margin-top: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .app-screen {
            display: none; 
            animation: fadeIn 0.4s ease forwards;
            padding: 20px;
        }

        .app-screen.active-screen {
            display: block; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            color: #D4AF37;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 20px;
            position: relative;
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 229, 255, 0.15);
            border: 1px solid #00E5FF;
            color: #00E5FF;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            z-index: 10;
        }

        .product-image-placeholder {
            width: 100%;
            height: 250px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(212, 175, 55, 0.3);
            border: 1px dashed rgba(212, 175, 55, 0.2);
            overflow: hidden;
        }

        .product-image-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            margin-top: 15px;
        }

        .product-info h3 {
            font-size: 19px;
            color: #ffffff;
        }

        .price {
            color: #00E5FF;
            font-size: 17px;
            font-weight: bold;
            margin: 5px 0 5px 0;
        }

        .commission-info {
            font-size: 11px;
            color: #888888;
            margin-bottom: 12px;
        }

        .btn-buy {
            width: 100%;
            background: linear-gradient(90deg, #D4AF37 0%, #AA7C11 100%);
            border: none;
            padding: 14px;
            color: #000000;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #D4AF37;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 14px;
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }

        .file-select-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            position: relative;
        }

        .file-select-container input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-custom-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 8px;
            color: #D4AF37;
        }

        .file-name-text {
            display: block;
            font-size: 13px;
            color: #888888;
        }

        .ia-status-box {
            text-align: center;
            margin: 25px 0;
        }

        .ia-percent {
            color: #00E5FF;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-deploy {
            width: 100%;
            background: linear-gradient(90deg, #AA7C11 0%, #D4AF37 50%, #AA7C11 100%);
            border: none;
            padding: 16px;
            color: #000000;
            font-weight: bold;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .server-status {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #666666;
            margin: 20px 0 10px 0;
        }

        .status-dot.online {
            width: 6px;
            height: 6px;
            background-color: #00FF66;
            border-radius: 50%;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(5, 5, 5, 0.95);
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666666;
            text-decoration: none;
            font-size: 10px;
            gap: 5px;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: #D4AF37;
        }
    </style>
</head>
<body>

    <header class="empire-header">
        <h1>S.E.G GLOBAL IA</h1>
        <div class="objectif-badge">OBJECTIF : 24,000,000,000 FCFA</div>
    </header>

    <main id="screen-accueil" class="app-screen active-screen">
        <h2 class="section-title">MARCHÉ DE L'EMPIRE</h2>
        
        <div class="product-card">
            <div class="product-badge"><i class="fa-solid fa-sparkles"></i> Vérifié par l'Ouvrier IA</div>
            <div class="product-image-placeholder" id="main-product-image-box">
                <i class="fa-solid fa-gem fa-4x" id="default-icon"></i>
            </div>
            <div class="product-info">
                <h3 id="main-product-title">Mpina Premium</h3>
                <p class="price" id="main-product-price">20 000 FCFA</p>
                <div class="commission-info" id="main-product-commission">Frais appli (10%) : 2 000 FCFA</div>
                <button class="btn-buy" onclick="acheterProduit()">Acheter Maintenant</button>
            </div>
        </div>
    </main>

    <main id="screen-vente" class="app-screen">
        <h2 class="section-title">VENDRE UN ARTICLE</h2>
        
        <div class="form-group">
            <label>Nom du produit</label>
            <input type="text" id="prod-name" placeholder="Nom du produit">
        </div>

        <div class="form-group">
            <label>Prix (FCFA)</label>
            <input type="number" id="prod-price" placeholder="Prix FCFA">
        </div>

        <div class="form-group">
            <label>Fichier Média (Image/Vidéo)</label>
            <div class="file-select-container">
                <span class="file-custom-btn">Choisir le fichier</span>
                <span class="file-name-text" id="file-name-display">aucun fichier sélectionné</span>
                <input type="file" id="prod-file" accept="image/*" onchange="mettreAJourFichier(this)">
            </div>
        </div>

        <div class="ia-status-box">
            <div class="ia-percent" id="upload-status">Déploiement IA : 0%</div>
        </div>

        <button class="btn-deploy" onclick="lancerDeploieIA()">DÉPLOYER AVEC IA</button>
    </main>

    <div class="server-status">
        <span class="status-dot online"></span>
        <p>Connexion Cloud Google : <span class="latency">22ms</span> (Stable)</p>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="btn-nav-accueil" onclick="changerEcran('accueil')">
            <i class="fa-solid fa-house"></i>
            <span>MARCHÉ</span>
        </div>
        <div class="nav-item" id="btn-nav-vente" onclick="changerEcran('vente')">
            <i class="fa-solid fa-cart-shopping"></i>
            <span>VENDRE</span>
        </div>
        <div class="nav-item" onclick="quitterApp()">
            <i class="fa-solid fa-door-open"></i>
