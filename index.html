<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | FUTURE CORE</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #00f2ff; --gold: #ffd700; --bg: #000; --neon: rgba(0, 242, 255, 0.5); }
        * { box-sizing: border-box; font-family: 'Orbitron', 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; overflow-x: hidden; }

        /* --- ÉCRAN FUTURISTE --- */
        #public-view { padding: 25px; background: radial-gradient(circle at top, #001529 0%, #000 70%); min-height: 100vh; }
        
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--main); padding-bottom: 15px; margin-bottom: 30px; }
        .logo-seg { font-weight: 900; font-size: 26px; color: var(--main); text-shadow: 0 0 10px var(--neon); }

        /* VIRAL CARD FUTURISTE (IMAGE 189) */
        .cyber-card { 
            background: rgba(10, 10, 10, 0.9); border: 1px solid var(--main); border-radius: 15px; padding: 25px; 
            box-shadow: 0 0 20px var(--neon); position: relative; overflow: hidden;
        }
        .cyber-card::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 2px; background: var(--main); animation: sweep 3s infinite; }

        .social-grid { display: flex; justify-content: space-around; margin: 25px 0; }
        .cyber-btn { 
            width: 60px; height: 60px; border: 2px solid var(--main); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: bold; 
            cursor: pointer; box-shadow: inset 0 0 10px var(--neon); transition: 0.3s;
        }
        .cyber-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--main); }

        /* S.E.G NEWS FLUX */
        .news-box { 
            margin-top: 30px; border-left: 5px solid var(--gold); background: #0a0a0a; 
            padding: 20px; border-radius: 0 15px 15px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* --- NEXUS STÈVE --- */
        #nexus-steve { display: none; padding: 25px; background: #000; min-height: 100vh; border: 2px solid var(--gold); }
        .vault { border: 2px double var(--gold); padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 30px; background: rgba(212, 175, 55, 0.05); }
        .btn-deploy { background: #ff0000; color: #fff; padding: 20px; border-radius: 10px; width: 100%; font-weight: 900; border: none; box-shadow: 0 0 15px #ff0000; cursor: pointer; }

        @keyframes sweep { 0% { left: -100%; } 100% { left: 100%; } }
    </style>
</head>
<body>

<div id="public-view">
    <div class="header">
        <div class="logo-seg">S.E.G GLOBAL</div>
        <div onclick="lancerConnexion()" style="cursor:pointer; color:var(--main); font-size:28px;">⌬</div>
    </div>
    
    <div class="cyber-card">
        <h3 style="margin:0; letter-spacing:3px;">🚀 PROPULSER L'EMPIRE</h3>
        <p style="color:var(--main); font-size:12px; opacity:0.7;">ACTIVER LA CROISSANCE MONDIALE...</p>
        
        <div class="social-grid">
            <div onclick="partage('whatsapp')" style="border-color:#25D366; color:#25D366;" class="cyber-btn">WA</div>
            <div onclick="partage('facebook')" style="border-color:#1877F2; color:#1877F2;" class="cyber-btn">FB</div>
            <div onclick="partage('telegram')" style="border-color:#0088cc; color:#0088cc;" class="cyber-btn">TG</div>
        </div>
        <button onclick="partagerLien()" style="background:var(--gold); color:#000; width:100%; padding:15px; border-radius:8px; font-weight:900; border:none; cursor:pointer;">🔗 GÉNÉRER LIEN UNIQUE</button>
    </div>

    <div class="news-box">
        <div style="color:var(--gold); font-weight:bold; font-size:14px; margin-bottom:5px;">[ S.E.G NEWS ]</div>
        <div id="live-message" style="font-family: monospace; color:#fff;">SCAN DU RÉSEAU AUTO GLOBAL EN COURS...</div>
    </div>
</div>

<div id="nexus-steve">
    <h2 style="color:var(--gold); text-align:center;">COMMANDEMENT CENTRAL</h2>
    <div class="vault">
        <div style="color:var(--gold); font-size:12px;">ACTIF CRYPTÉ SÉCURISÉ</div>
        <div style="font-size:35px; font-weight:900; color:#fff;">450 000 000 FCFA</div>
    </div>
    <textarea id="admin-msg" style="width:100%; background:#111; color:#00f2ff; border:1px solid var(--main); padding:15px; border-radius:10px;" rows="4"></textarea>
    <button class="btn-deploy" onclick="deploy()">🚀 DÉPLOYER ORDRE MONDIAL</button>
</div>

<script>
    // CONFIGURATION FIREBASE (IDEM IMAGE 180)
    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpc...", 
        authDomain: "seg-global.firebaseapp.com",
        databaseURL: "https://seg-global-default-rtdb.firebaseio.com",
        projectId: "seg-global",
        storageBucket: "seg-global.appspot.com",
        messagingSenderId: "880037527683",
        appId: "1:880037527683:web:..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // SYNC TEMPS RÉEL
    db.ref('nexus_state').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('live-message').innerText = "> " + d.msg;
            document.getElementById('admin-msg').value = d.msg;
        }
    });

    function deploy() {
        const m = document.getElementById('admin-msg').value;
        db.ref('nexus_state').set({ msg: m, timestamp: Date.now() });
        alert("ORDRE DÉPLOYÉ SUR LE RÉSEAU MONDIAL.");
    }

    // PARTAGE FUTURISTE
    function partage(p) {
        const l = window.location.href + "?ref=STEVE_NEO";
        let u = p==='whatsapp' ? `https://wa.me/?text=${l}` : p==='facebook' ? `https://fb.com/sharer/sharer.php?u=${l}` : `https://t.me/share/url?url=${l}`;
        window.open(u, '_blank');
    }

    function lancerConnexion() {
        let n = prompt("CODE FONDATEUR :");
        if(n && (n.toUpperCase().trim() === "STÈVE" || n.toUpperCase().trim() === "STEVE")) {
            document.getElementById('public-view').style.display = 'none';
            document.getElementById('nexus-steve').style.display = 'block';
        }
    }
</script>
</body>
</html>
