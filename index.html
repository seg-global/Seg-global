<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Plateforme Mondiale</title>
    <style>
        /* --- CONFIGURATION AMAZON STYLE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Amazon Ember", Arial, sans-serif;
        }

        body {
            background-color: #EAEDED;
            color: #111;
            padding-bottom: 50px;
        }

        /* --- BARRE DE TRADUCTION GOOGLE (Invisible au repos) --- */
        #google_translate_element {
            background-color: #37475A;
            padding: 5px;
            text-align: center;
        }

        /* --- HEADER NOIR (Navigation) --- */
        .amazon-header {
            background-color: #232F3E;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-seg {
            color: #19C9D1;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 1px;
        }

        /* --- BARRE DE RECHERCHE --- */
        .search-bar-container {
            display: flex;
            width: 100%;
        }

        .search-input {
            flex-grow: 1;
            padding: 12px;
            border: none;
            border-radius: 4px 0 0 4px;
            font-size: 15px;
        }

        .search-button {
            background-color: #FEBD69;
            border: none;
            padding: 0 15px;
            border-radius: 0 4px 4px 0;
            font-size: 18px;
        }

        /* --- BARRE DE LIVRAISON --- */
        .delivery-bar {
            background-color: #37475A;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- BANNIÈRE PROMO --- */
        .promo-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(to right, #FF9900, #FFB84D);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .promo-text {
            color: white;
            z-index: 2;
        }

        .promo-text h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        /* --- ZONE DU CRÉATEUR (DIRECTEUR GÉNÉRAL) --- */
        .creator-section {
            padding: 15px;
        }

        .creator-card {
            background-color: white;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .creator-image-box {
            width: 100%;
            height: 350px;
            border-radius: 4px;
            background-image: url('https://i.ibb.co/tPhqzzV2/IMG-1506.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            color: white;
            position: relative;
        }

        .creator-image-box::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        .creator-image-box h2 { z-index: 2; font-size: 20px; text-transform: uppercase; }
        .creator-image-box p { z-index: 2; font-style: italic; }

        /* --- GRILLE PRODUITS --- */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
        }

        .product-item {
            background: white;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }

        .product-img-placeholder {
            width: 100%;
            height: 100px;
            background: #f0f0f0;
            margin-bottom: 10px;
        }

        /* --- FOOTER VENDEUR --- */
        .footer-banner {
            background: #232F3E;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <header class="amazon-header">
        <div class="top-nav">
            <a href="#" class="logo-seg">S.E.G GLOBAL</a>
            <div style="color:white; font-size: 20px;">🛒</div>
        </div>
        <div class="search-bar-container">
            <input type="text" class="search-input" placeholder="Rechercher / Search...">
            <button class="search-button">🔍</button>
        </div>
    </header>

    <div class="delivery-bar">
        📍 Expédition mondiale disponible
    </div>

    <section class="promo-banner">
        <div class="promo-text">
            <h1>Livraison Gratuite</h1>
            <p>Sur votre première commande mondiale</p>
        </div>
        <div style="font-size: 60px; opacity: 0.3;">🌍</div>
    </section>

    <section class="creator-section">
        <div class="creator-card">
            <h3 style="margin-bottom: 10px; font-size: 14px; color: #555;">LE CRÉATEUR DE L'EMPIRE</h3>
            <div class="creator-image-box">
                <h2>LA VISION DU DIRECTEUR</h2>
                <p>L'excellence sans frontières</p>
            </div>
        </div>
    </section>

    <div class="product-grid">
        <div class="product-item">
            <div class="product-img-placeholder"></div>
            <p style="font-size: 12px; font-weight: bold;">MONTRE NÉON</p>
        </div>
        <div class="product-item">
            <div class="product-img-placeholder"></div>
            <p style="font-size: 12px; font-weight: bold;">SAC CYBER</p>
        </div>
    </div>

    <div class="footer-banner">
        DEVENIR VENDEUR MONDIAL
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'fr',
                // Cette ligne permet d'inclure toutes les langues automatiquement
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
