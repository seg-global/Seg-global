<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | Biometric Security</title>
    <style>
        :root { --primary: #1877F2; --gold: #D4AF37; --white: #ffffff; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); padding-bottom: 90px; }

        /* OVERLAY BIOMÉTRIQUE */
        #biometricOverlay { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .bio-icon { font-size: 70px; margin-bottom: 20px; animation: scanAnim 2s infinite; }
        .bio-status { font-weight: bold; color: #1c1e21; font-size: 18px; }
        
        @keyframes scanAnim {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; color: var(--primary); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* HEADER & RECHERCHE (image_165.png) */
        .header { background: var(--white); padding: 10px 15px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .logo-text { font-weight: 900; color: var(--primary); font-size: 22px; }
        .search-bar { background: #f0f2f5; border-radius: 20px; padding: 8px 15px; flex-grow: 1; display: flex; border: 1px solid #ddd; }
        .search-bar input { border: none; background: transparent; width: 100%; outline: none; }

        /* CATÉGORIES CIRCULAIRES */
        .categories { display: flex; justify-content: space-around; padding: 15px; background: var(--white); border-bottom: 1px solid #eee; overflow-x: auto; }
        .cat-btn { min-width: 55px; min-height: 55px; border-radius: 50%; border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 22px; background: white; flex-shrink: 0; }

        /* NAVIGATION BASSE */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; padding: 12px 0; border-top: 2px solid #eee; z-index: 2000; }
        .nav-link { flex: 1; text-align: center; color: #65676b; font-size: 10px; font-weight: 800; cursor: pointer; }
        .nav-link.active { color: var(--primary); }

        .view { display: none; }
        .active-view { display: block; }
    </style>
</head>
<body>

<!-- SYSTÈME BIOMÉTRIQUE INTELLIGENT -->
<div id="biometricOverlay" onclick="simulateAuth()">
    <div id="bioIcon" class="bio-icon">👤</div>
    <div id="bioText" class="bio-status">Face ID pour S.E.G GLOBAL</div>
    <p style="color: gray; font-size: 12px; margin-top: 10px;">Touchez pour scanner</p>
</div>

<!-- L'APPLICATION (Soudée au code précédent) -->
<div class="header">
    <div class="logo-text">S.E.G</div>
    <div class="search-bar"><input type="text" placeholder="Rechercher une pierre..."></div>
    <div style="font-size: 22px;">💬</div>
</div>

<div id="homeView" class="view active-view">
    <div class="categories">
        <div class="cat-btn">➕</div><div class="cat-btn">💎</div><div class="cat-btn">🔥</div><div class="cat-btn">🇨🇲</div><div class="cat-btn">⚙️</div>
    </div>
    <div style="padding: 20px; background: white; margin: 10px; border-radius: 15px; text-align: center;">
        <h3>Bienvenue dans l'infrastructure</h3>
        <p style="color: gray;">Sécurisation des serveurs **auto global** en cours...</p>
    </div>
</div>

<div class="nav">
    <div class="nav-link active">🏠<br>FIL D'ACTU</div>
    <div class="nav-link">🏪<br>LE MARCHÉ</div>
    <div class="nav-link" style="color: var(--gold);">💰<br>INVESTIR</div>
    <div class="nav-link">☰<br>MENU</div>
</div>

<script>
    // Détection auto du type de capteur
    window.onload = function() {
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        const icon = document.getElementById('bioIcon');
        const text = document.getElementById('bioText');
        
        if (isIOS) {
            icon.innerText = "🆔"; // Icône Face ID
            text.innerText = "Face ID S.E.G GLOBAL";
        } else {
            icon.innerText = "🖐️"; // Icône Touch ID
            text.innerText = "Touch ID S.E.G GLOBAL";
        }
    }

    function simulateAuth() {
        const text = document.getElementById('bioText');
        text.innerText = "Analyse en cours...";
        text.style.color = "#D4AF37";
        
        setTimeout(() => {
            text.innerText = "Accès Autorisé ✅";
            text.style.color = "green";
            setTimeout(() => {
                document.getElementById('biometricOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('biometricOverlay').style.display = 'none';
                }, 500);
            }, 500);
        }, 1500);
    }
</script>

</body>
</html>
