<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIRAVEL - S.E.G GLOBAL</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KIRAVEL">
    <link rel="apple-touch-icon" href="https://i.ibb.co/VWV3X9Y/kiravel-logo.png">
    <meta name="theme-color" content="#050505">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           STYLE GÉNÉRAL
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* EN-TÊTE PREMIUM */
        .empire-header {
            text-align: center;
            padding: 25px 10px 20px 10px;
            background: linear-gradient(180deg, rgba(212,175,55,0.12) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.25);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .empire-header h1 {
            color: #D4AF37;
            font-size: 26px;
            letter-spacing: 2px;
            font-weight: 800;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
        }

        .objectif-badge {
            color: #00E5FF;
            font-size: 11px;
            margin-top: 6px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* SYSTÈME DE NAVIGATION DES ÉCRANS */
        .app-screen {
            display: none; 
            animation: screenFade 0.3s ease-out forwards;
            padding: 20px;
        }

        .app-screen.active-screen {
            display: block; 
        }

        @keyframes screenFade {
            from { opacity: 0; transform: scale(0.99); }
            to { opacity: 1; transform: scale(1); }
        }

        .section-title {
            color: #D4AF37;
            font-size: 20px;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* ==========================================================================
           ÉCRAN : MARCHÉ DE L'EMPIRE
           ========================================================================== */
        #market-feed {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .empty-market-message {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            font-size: 14px;
        }

        /* CARTE PRODUIT PREMIUM */
        .product-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 18px;
            padding: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .product-badge {
            position: absolute;
            top: 26px;
            right: 26px;
            background: rgba(0, 229, 255, 0.15);
            border: 1px solid #00E5FF;
            color: #00E5FF;
            font-size: 10px;
            padding: 5px 10px;
            border-radius: 20px;
            z-index: 10;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .product-image-container {
            width: 100%;
            height: 260px;
            background: #111111;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-image-container img, .product-image-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            margin-top: 15px;
        }

        .product-info h3 {
            font-size: 20px;
            color: #ffffff;
            font-weight: 600;
        }

        .price {
            color: #00E5FF;
            font-size: 18px;
            font-weight: 700;
            margin: 6px 0 15px 0;
        }

        .card-actions {
            display: flex;
            gap: 12px;
        }

        .btn-buy {
            flex: 1;
            background: linear-gradient(90deg, #D4AF37 0%, #AA7C11 100%);
            border: none;
            padding: 15px;
            color: #000000;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-share {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #D4AF37;
            width: 50px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            cursor: pointer;
        }

        /* ==========================================================================
           ÉCRAN : VENDRE UN ARTICLE
           ========================================================================== */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            color: #D4AF37;
            margin-bottom: 9px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 16px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
        }

        .file-select-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            position: relative;
        }

        .file-select-container input[type="file"] {
            position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
        }

        .file-custom-btn {
            background: rgba(212, 175, 55, 0.1); color: #D4AF37; padding: 10px 20px; border-radius: 8px; font-size: 13px; display: inline-block; margin-bottom: 8px; font-weight: bold;
        }

        .file-name-text { display: block; font-size: 13px; color: #777777; }
        .ia-status-box { text-align: center; margin: 25px 0; min-height: 20px; }
        .ia-percent { color: #00E5FF; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        .btn-deploy {
            width: 100%;
            background: linear-gradient(90deg, #AA7C11 0%, #D4AF37 50%, #AA7C11 100%);
            border: none;
            padding: 16px;
            color: #000000;
            font-weight: bold;
            border-radius: 12px;
            font-size: 15px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* BAS DE PAGE & STRUCTURE */
        .server-status {
            display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 11px; color: #555555; margin: 30px 0 10px 0;
        }

        .status-dot.online { width: 6px; height: 6px; background-color: #00FF66; border-radius: 50%; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5, 5, 5, 0.94); border-top: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 14px 0 24px 0; z-index: 1000;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; color: #555555; text-decoration: none; font-size: 11px; gap: 6px; cursor: pointer; font-weight: bold;
        }

        .nav-item i { font-size: 22px; }
        .nav-item.active { color: #D4AF37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body>

    <header class="empire-header">
        <h1>KIRAVEL</h1>
        <div class="objectif-badge">OBJECTIF : 24,000,000,000 FCFA</div>
    </header>

    <main id="screen-accueil" class="app-screen active-screen">
        <h2 class="section-title">MARCHÉ DE L'EMPIRE</h2>
        <div id="market-feed">
            <div class="empty-market-message" id="empty-msg">Connexion à la base de données de l'Empire...</div>
        </div>
    </main>

    <main id="screen-vente" class="app-screen">
        <h2 class="section-title">Vendre un Article</h2>
        
        <div class="form-group">
            <label>Nom du produit</label>
            <input type="text" id="prod-name" placeholder="Entrez le nom du produit">
        </div>

        <div class="form-group">
            <label>Prix (FCFA)</label>
            <input type="number" id="prod-price" placeholder="Entrez le prix">
        </div>

        <div class="form-group">
            <label>Fichier Média (Image/Vidéo)</label>
            <div class="file-select-container">
                <span class="file-custom-btn">Choisir le fichier</span>
                <span class="file-name-text" id="file-name-display">aucun fichier sélectionné</span>
                <input type="file" id="prod-file" accept="image/*,video/*" onchange="traiterFichierMedia(this)">
            </div>
        </div>

        <div class="ia-status-box">
            <div class="ia-percent" id="upload-status"></div>
        </div>

        <button class="btn-deploy" onclick="executerPublicationIA()">PUBLIER AVEC IA</button>
    </main>

    <div class="server-status">
        <span class="status-dot online"></span>
        <p>Connexion Cloud Google : 22ms (Stable)</p>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="btn-nav-accueil" onclick="basculerEcran('accueil')">
            <i class="fa-solid fa-house"></i>
            <span>MARCHÉ</span>
        </div>
        <div class="nav-item" id="btn-nav-vente" onclick="basculerEcran('vente')">
            <i class="fa-solid fa-bag-shopping"></i>
            <span>VENDRE</span>
        </div>
        <div class="nav-item" onclick="quitterApplication()">
            <i class="fa-solid fa-door-open"></i>
            <span>QUITTER</span>
        </div>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-storage.js";

        // Ta configuration officielle extraite de ta capture Google Console
        const firebaseConfig = {
            apiKey: "AIzaSyAMX8SfBySnpc2U8Y80D35uY55N0f2HswU",
            authDomain: "seg-global.firebaseapp.com",
            projectId: "seg-global",
            storageBucket: "seg-global.appspot.com",
            messagingSenderId: "880037527683",
            appId: "1:880037527683:web:96e838e68cfb99b50e7939",
            measurementId: "G-Z5WG470MGG"
        };

        // Initialisation des serveurs Firebase Cloud
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let fichierSelectionne = null;

        // Écoute automatique et affichage du flux en temps réel
        const fluxMarché = document.getElementById('market-feed');
        const msgVide = document.getElementById('empty-msg');

        const q = query(collection(db, "produits"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            fluxMarché.innerHTML = "";
            if(snapshot.empty) {
                fluxMarché.innerHTML = `<div class="empty-market-message" id="empty-msg">Aucun article sur le marché. Allez dans "Vendre" pour déployer avec l'IA.</div>`;
                return;
            }
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const nouvelleCarte = document.createElement('div');
                nouvelleCarte.className = 'product-card';
                
                // Détection intelligente du type de média (Image vs Vidéo)
                let baliseMedia = `<i class="fa-solid fa-gem fa-4x" style="color:rgba(212,175,55,0.2)"></i>`;
                if(data.mediaUrl) {
                    if(data.mediaType && data.mediaType.startsWith('video')) {
                        baliseMedia = `<video src="${data.mediaUrl}" controls loop muted playsinline></video>`;
                    } else {
                        baliseMedia = `<img src="${data.mediaUrl}" alt="${data.nom}">`;
                    }
                }

                const prixFormate = Number(data.prix).toLocaleString('fr-FR');

                nouvelleCarte.innerHTML = `
                    <div class="product-badge"><i class="fa-solid fa-sparkles"></i> Certifié IA</div>
                    <div class="product-image-container">
                        ${baliseMedia}
                    </div>
                    <div class="product-info">
                        <h3>${data.nom}</h3>
                        <p class="price">${prixFormate} FCFA</p>
                        <div class="card-actions">
                            <button class="btn-buy" onclick="window.declencherAchat('${data.nom}')">Acheter Maintenant</button>
                            <button class="btn-share" onclick="window.partagerArticle('${data.nom}', '${prixFormate}')">
                                <i class="fa-solid fa-share-nodes"></i>
                            </button>
                        </div>
                    </div>
                `;
                fluxMarché.appendChild(nouvelleCarte);
            });
        });

        // Lecture du fichier choisi par l'utilisateur
        window.traiterFichierMedia = function(input) {
            const labelFichier = document.getElementById('file-name-display');
            if (input.files && input.files.length > 0) {
                fichierSelectionne = input.files[0];
                labelFichier.textContent = fichierSelectionne.name;
                labelFichier.style.color = "#00E5FF";
            } else {
                labelFichier.textContent = "aucun fichier sélectionné";
                labelFichier.style.color = "#777777";
                fichierSelectionne = null;
            }
        };

        // Envoi combiné : Stockage Storage + Enregistrement Base de données
        window.executerPublicationIA = function() {
            const statusLabel = document.getElementById('upload-status');
            const champNom = document.getElementById('prod-name');
            const champPrix = document.getElementById('prod-price');

            if(!champNom.value || !champPrix.value) {
                alert("Erreur : Renseignez le nom et le prix de votre article.");
                return;
            }

            statusLabel.style.color = "#00E5FF";

            if (fichierSelectionne) {
                // Création d'une référence unique dans le Storage Cloud Google
                const nomUnique = `${Date.now()}_${fichierSelectionne.name}`;
                const stockageRef = ref(storage, `produits/${nomUnique}`);
                const tacheTelechargement = uploadBytesResumable(stockageRef, fichierSelectionne);

                tacheTelechargement.on('state_changed', 
                    (snapshot) => {
                        // Progression réelle calculée par le serveur Google
                        const progression = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
                        statusLabel.textContent = `Analyse et déploiement IA : ${progression}%`;
                    }, 
                    (error) => {
                        alert("Erreur lors de l'envoi média : " + error.message);
                    }, 
                    () => {
                        // Envoi réussi, récupération du lien final public
                        getDownloadURL(tacheTelechargement.snapshot.ref).then((urlDeTelechargement) => {
                            enregistrerDansFirestore(champNom.value, champPrix.value, urlDeTelechargement, fichierSelectionne.type);
                        });
                    }
                );
            } else {
                // Publication sans média
                statusLabel.textContent = "Analyse et déploiement IA : 50%";
                enregistrerDansFirestore(champNom.value, champPrix.value, "", "");
            }
        };

        async function enregistrerDansFirestore(nom, prix, urlMedia, typeMedia) {
            const statusLabel = document.getElementById('upload-status');
            try {
                await addDoc(collection(db, "produits"), {
                    nom: nom,
                    prix: Number(prix),
                    mediaUrl: urlMedia,
                    mediaType: typeMedia,
                    timestamp: Date.now()
                });

                statusLabel.textContent = "DÉPLOIE-MENT RÉUSSI !";
                statusLabel.style.color = "#00FF66";

                // Reset complet du formulaire
                document.getElementById('prod-name').value = "";
                document.getElementById('prod-price').value = "";
                document.getElementById('prod-file').value = "";
                document.getElementById('file-name-display').textContent = "aucun fichier sélectionné";
                document.getElementById('file-name-display').style.color = "#777777";
                fichierSelectionne = null;

                setTimeout(() => {
                    statusLabel.textContent = "";
                    basculerEcran('accueil'); 
                }, 1000);

            } catch (e) {
                alert("Erreur de synchronisation Firestore : " + e.message);
            }
        }
    </script>

    <script>
        // Fonctions globales de l'application
        function basculerEcran(cible) {
            document.getElementById('screen-accueil').classList.remove('active-screen');
            document.getElementById('screen-vente').classList.remove('active-screen');
            document.getElementById('btn-nav-accueil').classList.remove('active');
            document.getElementById('btn-nav-vente').classList.remove('active');

            if(cible === 'accueil') {
                document.getElementById('screen-accueil').classList.add('active-screen');
                document.getElementById('btn-nav-accueil').classList.add('active');
            } else if(cible === 'vente') {
                document.getElementById('screen-vente').classList.add('active-screen');
                document.getElementById('btn-nav-vente').classList.add('active');
            }
        }

        function declencherAchat(nom) {
            alert(`帝国 S.E.G GLOBAL - Option d'achat en cours pour : ${nom}`);
        }

        function partagerArticle(nom, prix) {
            const texte = encodeURIComponent(`Regarde ce produit de luxe sur KIRAVEL : ${nom} à ${prix} FCFA !`);
            window.open(`https://api.whatsapp.com/send?text=${texte}`, '_blank');
        }

        function quitterApplication() {
            if(confirm("Quitter l'application KIRAVEL ?")) {
                alert("Session suspendue.");
            }
        }
    </script>
</body>
</html>
