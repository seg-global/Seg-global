<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL | EMPIRE INTÉGRÉ IA</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --bg: #000; --neon-blue: #00d4ff; --dark-grey: #111; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100%; overflow-x: hidden; }
        
        /* Design Futuriste */
        .dashboard-header { padding: 25px; text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border-bottom: 2px solid var(--gold); }
        .logo-gold { font-size: 28px; letter-spacing: 5px; color: var(--gold); cursor: pointer; text-shadow: 0 0 15px rgba(212,175,55,0.4); text-transform: uppercase; }
        .target-text { font-size: 12px; color: var(--neon-blue); margin-top: 5px; text-transform: uppercase; font-weight: bold; }
        
        .container { max-width: 450px; margin: auto; padding: 20px; padding-bottom: 100px; }
        
        /* Formulaires */
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; box-sizing: border-box; font-weight: bold; }
        .btn-gold { width: 100%; padding: 15px; background: linear-gradient(90deg, #af8f42, #dfbd69); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--gold); }

        /* Bulle de Chat IA Intégrée */
        #ai_chat_box { position: fixed; bottom: 90px; right: 20px; width: 280px; background: #1a1a1a; border: 1px solid var(--gold); border-radius: 15px; display: none; z-index: 2000; box-shadow: 0 0 25px rgba(212,175,55,0.3); }
        .chat-header { background: var(--gold); color: black; padding: 10px; border-radius: 15px 15px 0 0; font-weight: bold; font-size: 11px; text-align: center; }
        #chat_messages { height: 180px; overflow-y: auto; padding: 10px; font-size: 12px; background: #000; border-bottom: 1px solid #222; }
        
        /* Marché */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .item-card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 10px; text-align: center; border-bottom: 3px solid var(--gold); }
        .item-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; }
        
        /* Barre de Progression */
        .progress-container { width: 100%; background: #222; border-radius: 10px; margin: 10px 0; height: 8px; overflow: hidden; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--gold); transition: width 0.3s; }

        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #555; font-size: 10px; text-align: center; cursor: pointer; text-decoration: none; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div id="auth_section" class="container">
    <div class="logo-gold" style="margin-top:50px; text-align: center;">S.E.G GLOBAL</div>
    <p style="text-align:center; color:#888; font-size:10px; letter-spacing: 2px;">AUTHENTIFICATION EMPIRE</p>
    
    <div id="login_step1">
        <input type="email" id="email_input" placeholder="Email de votre compte">
        <button class="btn-gold" onclick="sendAccessCode()">Obtenir le Code</button>
    </div>
    <div id="login_step2" style="display:none;">
        <input type="text" id="otp_input" placeholder="Code reçu">
        <button class="btn-gold" onclick="verifyAccessCode()">Entrer dans l'Empire</button>
    </div>
</div>

<div id="main_app" style="display:none;">
    <div class="dashboard-header">
        <h1 class="logo-gold" onclick="toggleAIChat()">S.E.G GLOBAL IA</h1>
        <div class="target-text">OBJECTIF : 24,000,000,000 FCFA</div>
    </div>

    <div class="container">
        <div id="ai_chat_box">
            <div class="chat-header">COMMUNICATION OUVRIER IA</div>
            <div id="chat_messages"><b>IA:</b> Bonjour Steve. Comment puis-je organiser l'Empire aujourd'hui ?</div>
            <input type="text" id="ai_order" placeholder="Ordre (ex: Organise les ventes)" style="font-size: 11px; margin: 5px; width: 90%;">
            <button class="btn-gold" style="width: 90%; margin: 5px; padding: 8px; font-size: 10px;" onclick="envoyerOrdreIA()">Envoyer</button>
        </div>

        <div id="home_page" class="page active">
            <h2 style="text-align:center; color:var(--gold); font-size:16px;">MARCHÉ DE LUXE</h2>
            <div class="market-grid" id="market_feed"></div>
        </div>

        <div id="seller_page" class="page">
            <h2 style="color:var(--gold); text-align:center; font-size: 16px;">PUBLIER AVEC IA</h2>
            <input type="text" id="prod_name" placeholder="Nom de l'article">
            <input type="number" id="prod_price" placeholder="Prix (FCFA)">
            <input type="file" id="prod_img" accept="image/*">
            
            <div class="progress-container" id="prog_cont">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="statusText" style="font-size:10px; text-align:center; color:var(--neon-blue);"></p>
            
            <button class="btn-gold" id="pub_btn" onclick="publishWithIA()">DÉPLOYER AVEC IA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('home_page', this)">🏠<br>ACCUEIL</div>
        <div class="nav-item" onclick="showPage('seller_page', this)">⚡<br>IA VENTE</div>
        <div class="nav-item" onclick="logout()">🚪<br>QUITTER</div>
    </nav>
</div>

<script>
    // --- CONFIGURATION ---
    (function() { emailjs.init("QGnoNmpH78_GuSLf4"); })();
    
    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpcD_vS9hH5f8Q2L-Y0X0kE0",
        authDomain: "seg-global.firebaseapp.com",
        projectId: "seg-global",
        storageBucket: "seg-global.appspot.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let correctOTP = "";
    let selectedFile;

    // --- LOGIQUE IA & CHAT ---
    function toggleAIChat() {
        const chat = document.getElementById('ai_chat_box');
        chat.style.display = chat.style.display === 'none' ? 'block' : 'none';
    }

    async function envoyerOrdreIA() {
        const order = document.getElementById('ai_order').value;
        const msgBox = document.getElementById('chat_messages');
        if(!order) return;
        msgBox.innerHTML += `<div><b>Vous:</b> ${order}</div>`;
        
        setTimeout(() => {
            msgBox.innerHTML += `<div style="color:var(--gold)"><b>IA:</b> Ordre reçu. J'optimise l'interface et le flux de données pour l'objectif 24 Milliards.</div>`;
            msgBox.scrollTop = msgBox.scrollHeight;
        }, 800);
        document.getElementById('ai_order').value = "";
    }

    // --- AUTHENTIFICATION ---
    function sendAccessCode() {
        const email = document.getElementById('email_input').value;
        if(!email) return alert("Email requis");
        correctOTP = Math.floor(100000 + Math.random() * 900000).toString();
        emailjs.send("service_ocg86ge", "template_v7i6m5m", { to_email: email, otp_code: correctOTP })
        .then(() => {
            document.getElementById('login_step1').style.display = 'none';
            document.getElementById('login_step2').style.display = 'block';
        });
    }

    function verifyAccessCode() {
        if(document.getElementById('otp_input').value === correctOTP) {
            localStorage.setItem("seg_session", "active");
            startApp();
        } else { alert("Code incorrect."); }
    }

    function startApp() {
        document.getElementById('auth_section').style.display = 'none';
        document.getElementById('main_app').style.display = 'block';
        loadProducts();
    }

    // --- VENTE & FIREBASE ---
    async function publishWithIA() {
        const name = document.getElementById('prod_name').value;
        const price = document.getElementById('prod_price').value;
        const file = document.getElementById('prod_img').files[0];
        const status = document.getElementById('statusText');
        const progCont = document.getElementById('prog_cont');

        if(!name || !price || !file) return alert("Données manquantes !");
        
        progCont.style.display = "block";
        status.innerText = "L'IA analyse l'image...";

        const storageRef = storage.ref('empire/' + Date.now() + "_" + file.name);
        const task = storageRef.put(file);

        task.on('state_changed', 
            (snap) => {
                const p = (snap.bytesTransferred / snap.totalBytes) * 100;
                document.getElementById('progressBar').style.width = p + "%";
                status.innerText = "DÉPLOIEMENT IA : " + Math.round(p) + "%";
            },
            (err) => { alert("Erreur: Vérifiez les règles Storage (Mode Test)"); },
            async () => {
                const url = await task.snapshot.ref.getDownloadURL();
                await db.collection("produits").add({
                    nom: name, prix: parseFloat(price), image: url, date: new Date()
                });
                alert("ARTICLE CLASSÉ PAR L'IA ET PUBLIÉ !");
                location.reload();
            }
        );
    }

    function loadProducts() {
        const feed = document.getElementById('market_feed');
        db.collection("produits").orderBy("date", "desc").onSnapshot(snap => {
            feed.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                feed.innerHTML += `
                    <div class="item-card">
                        <img src="${p.image}">
                        <div style="font-size:12px; margin-top:5px;"><b>${p.nom}</b></div>
                        <div style="color:var(--gold); font-size:11px;">${p.prix.toLocaleString()} F</div>
                    </div>`;
            });
        });
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function logout() { localStorage.removeItem("seg_session"); location.reload(); }
    if(localStorage.getItem("seg_session") === "active") startApp();
</script>
</body>
</html>
