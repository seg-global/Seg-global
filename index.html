<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Monde</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background-color: #EAEDED; }

        /* --- BARRE DE TRADUCTION FIXE --- */
        .translate-header {
            background-color: #FEBD69; /* Orange Amazon */
            padding: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 2px solid #f3a847;
        }

        /* --- HEADER STYLE AMAZON --- */
        .amazon-header {
            background-color: #232F3E;
            padding: 15px;
            color: white;
        }
        .logo-seg { color: #19C9D1; font-size: 24px; font-weight: bold; letter-spacing: 2px; }
        
        .search-container { display: flex; margin-top: 10px; }
        .search-input { flex: 1; padding: 12px; border: none; border-radius: 4px 0 0 4px; }
        .search-btn { background: #FEBD69; border: none; padding: 10px 20px; border-radius: 0 4px 4px 0; cursor: pointer; }

        /* --- BANNIERE PROMO --- */
        .promo-banner {
            background: linear-gradient(to right, #FF9900, #FFB84D);
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        /* --- SECTION CRÉATEUR (TA PHOTO) --- */
        .creator-section { padding: 15px; }
        .creator-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .creator-img {
            width: 100%;
            height: 400px;
            background-image: url('https://i.ibb.co/tPhqzzV2/IMG-1506.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            color: white;
            position: relative;
        }
        .creator-img::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .creator-img h2, .creator-img p { z-index: 2; position: relative; }

        /* --- GRILLE PRODUITS --- */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .product-item { background: white; padding: 10px; border-radius: 4px; text-align: center; }
        .product-box { height: 100px; background: #f0f0f0; margin-bottom: 5px; }

        /* --- CACHER LA BARRE GOOGLE ORIGINALE --- */
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
    </style>
</head>
<body>

    <div class="translate-header">
        <span>🌍 TRADUIRE DANS MA LANGUE : </span>
        <div id="google_translate_element" style="display: inline-block; vertical-align: middle;"></div>
    </div>

    <header class="amazon-header">
        <div class="logo-seg">S.E.G GLOBAL</div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Rechercher partout dans le monde...">
            <button class="search-btn">🔍</button>
        </div>
    </header>

    <section class="promo-banner">
        <div>
            <h1 style="font-size: 28px;">EXPÉDITION MONDIALE</h1>
            <p>Le luxe n'a plus de frontières.</p>
        </div>
    </section>

    <section class="creator-section">
        <div class="creator-card">
            <div class="creator-img">
                <h2 style="font-size: 22px;">LA VISION DU DIRECTEUR GÉNÉRAL</h2>
                <p>Bienvenue dans l'empire S.E.G</p>
            </div>
        </div>
    </section>

    <div class="product-grid">
        <div class="product-item">
            <div class="product-box"></div>
            <p style="font-size: 12px; font-weight: bold;">MONTRE NÉON</p>
        </div>
        <div class="product-item">
            <div class="product-box"></div>
            <p style="font-size: 12px; font-weight: bold;">SAC CYBER</p>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'fr',
                // Inclut TOUTES les langues
                layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL,
                autoDisplay: true
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
