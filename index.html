<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | SYSTÈME CENTRAL</title>
    <style>
        :root { --primary: #1877F2; --gold: #D4AF37; --bg: #0f1012; --dark-card: #1c1e21; --glass: rgba(255, 255, 255, 0.1); }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: white; overflow-x: hidden; padding-bottom: 80px; transition: 0.3s; }
        
        /* FORMULAIRE D'INSCRIPTION (MODAL) */
        #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--dark-card); padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; border: 1px solid var(--glass); text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--glass); background: rgba(0,0,0,0.3); color: white; margin-top: 5px; box-sizing: border-box; }
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* HEADER & NAV */
        .header { background: rgba(15, 16, 18, 0.85); backdrop-filter: blur(15px); padding: 15px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--glass); }
        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(15,16,18,0.95); display: flex; padding: 15px 0; border-top: 1px solid var(--glass); z-index: 2000; }
        .nav-link { flex: 1; text-align: center; color: #666; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-link.active { color: var(--primary); }

        /* VUES */
        .view { display: none; padding: 20px; animation: slideIn 0.3s ease-out; }
        .active-view { display: block; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* CARDS */
        .card { background: var(--dark-card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--glass); }
        .profit-value { color: var(--gold); font-size: 28px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<!-- ÉCRAN D'INSCRIPTION -->
<div id="authOverlay">
    <div class="auth-card">
        <h2 style="color:var(--primary)">S.E.G GLOBAL</h2>
        <p>Créez votre compte investisseur</p>
        <div class="input-group">
            <label>Nom complet</label>
            <input type="text" id="regName" placeholder="Ex: Stève ...">
        </div>
        <div class="input-group">
            <label>Email / Téléphone</label>
            <input type="text" id="regContact" placeholder="Contact sécurisé">
        </div>
        <button class="btn-main" onclick="finishAuth()">REJOINDRE L'EMPIRE</button>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <b style="color:var(--primary); font-size:22px;">S.E.G</b>
    <input type="text" style="flex-grow:1; background:var(--glass); border:none; padding:10px; border-radius:20px; color:white;" placeholder="Rechercher...">
</div>

<!-- VUE : DASHBOARD (HOME) -->
<div id="homeView" class="view active-view">
    <div class="card" style="background: linear-gradient(135deg, #1c1e21, #2c3e50);">
        <p style="color:var(--gold); font-size:12px; font-weight:bold;">👑 CONTRÔLE CRÉATEUR : <span id="userName">STÈVE</span></p>
        <div class="profit-value">181 443 FCFA</div>
        <p style="font-size:10px; opacity:0.6;">Statut : Connecté aux serveurs mondiaux</p>
    </div>
</div>

<!-- VUE : INVESTIR (SIMULATEUR) -->
<div id="investView" class="view">
    <div class="card">
        <h3>📊 ANALYSE LIVE</h3>
        <p>Valeur estimée :</p>
        <div class="profit-value" style="font-size:22px;">450 023 573 FCFA</div>
        <div style="height:50px; display:flex; align-items:flex-end; gap:5px; margin-top:10px;">
            <div style="height:30%; width:20%; background:var(--primary); border-radius:5px;"></div>
            <div style="height:60%; width:20%; background:var(--primary); border-radius:5px;"></div>
            <div style="height:45%; width:20%; background:var(--primary); border-radius:5px;"></div>
            <div style="height:90%; width:20%; background:var(--gold); border-radius:5px;"></div>
        </div>
    </div>
    
    <div class="card">
        <h3>💰 SIMULATEUR DE PROFITS</h3>
        <input type="number" id="simAmount" placeholder="Montant à investir">
        <button class="btn-main" onclick="calc()">CALCULER RENDEMENT</button>
        <p id="res" style="margin-top:15px; color:var(--primary); font-weight:bold;"></p>
    </div>
</div>

<!-- NAVIGATION -->
<div class="nav">
    <div class="nav-link active" onclick="tab('homeView', this)">🏠<br>TABLEAU</div>
    <div class="nav-link" onclick="tab('investView', this)">💰<br>INVESTIR</div>
</div>

<script>
    function finishAuth() {
        const name = document.getElementById('regName').value;
        if(name) {
            document.getElementById('userName').innerText = name.toUpperCase();
            document.getElementById('authOverlay').style.display = 'none';
        }
    }

    function tab(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
        document.getElementById(id).classList.add('active-view');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function calc() {
        const amt = document.getElementById('simAmount').value;
        if(amt) {
            const profit = amt * 1.3;
            document.getElementById('res').innerText = "Profit estimé : " + profit.toLocaleString() + " FCFA";
        }
    }
</script>
</body>
</html>
