<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Authentification</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body {
            background-color: #000;
            color: #D4AF37;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #D4AF37;
            padding: 30px;
            border-radius: 15px;
            background: linear-gradient(145deg, #0f0f0f, #000);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            width: 90%;
            max-width: 400px;
        }
        h1 { font-size: 24px; letter-spacing: 3px; margin-bottom: 5px; }
        p.subtitle { font-size: 10px; text-transform: uppercase; margin-bottom: 30px; color: #aaa; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            text-align: center;
        }
        input:focus { border-color: #D4AF37; outline: none; }
        button {
            width: 100%;
            padding: 12px;
            background-color: #D4AF37;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        button:hover { background-color: #fff; box-shadow: 0 0 10px #fff; }
        .message { margin-top: 15px; font-size: 14px; display: none; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>S.E.G GLOBAL</h1>
    <p class="subtitle">Authentification de Luxe</p>

    <div id="step1">
        <input type="email" id="user_email" placeholder="Entrez votre e-mail" required>
        <button onclick="sendOTP()">Obtenir mon code d'accès</button>
    </div>

    <div id="step2" style="display: none;">
        <p>Code envoyé à votre adresse.</p>
        <input type="text" id="user_otp" placeholder="Entrez le code reçu">
        <button onclick="verifyOTP()">Valider l'accès</button>
        <p style="font-size: 12px; margin-top:10px; cursor:pointer;" onclick="location.reload()">Réessayer</p>
    </div>

    <div id="status_msg" class="message"></div>
</div>

<script>
    (function() {
        // REMPLACE "TON_USER_ID" PAR TA PUBLIC KEY EMAILJS
        emailjs.init("TON_USER_ID"); 
    })();

    let generatedOTP = "";

    function sendOTP() {
        const email = document.getElementById("user_email").value;
        const msg = document.getElementById("status_msg");
        
        if(!email) { alert("Veuillez entrer un e-mail"); return; }

        // Générer un code à 6 chiffres
        generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

        const params = {
            to_email: email,
            otp_code: generatedOTP
        };

        msg.style.display = "block";
        msg.innerHTML = "Envoi en cours...";
        msg.className = "message";

        emailjs.send("service_ocg86ge", "template_v7i6m5m", params)
            .then(function() {
                msg.innerHTML = "CODE ENVOYÉ AVEC SUCCÈS !";
                msg.className = "message success";
                document.getElementById("step1").style.display = "none";
                document.getElementById("step2").style.display = "block";
            }, function(error) {
                msg.innerHTML = "ERREUR : Vérifie ton Template ID dans EmailJS.";
                msg.className = "message error";
                console.log("Erreur:", error);
            });
    }

    function verifyOTP() {
        const inputOTP = document.getElementById("user_otp").value;
        const msg = document.getElementById("status_msg");

        if(inputOTP === generatedOTP) {
            msg.innerHTML = "ACCÈS AUTORISÉ. BIENVENUE CHEZ S.E.G GLOBAL.";
            msg.className = "message success";
            // Ici tu peux rediriger vers ton catalogue de diamants
            // window.location.href = "page_diamants.html";
        } else {
            msg.innerHTML = "CODE INCORRECT. VEUILLEZ RÉESSAYER.";
            msg.className = "message error";
        }
    }
</script>

</body>
</html>
