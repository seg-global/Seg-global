<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Interface Luxe Pro</title>
    <style>
        /* --- CONFIGURATION AMAZON STYLE --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Amazon Ember", Arial, sans-serif;
        }

        body {
            background-color: #EAEDED; /* Le gris clair typique d'Amazon */
            color: #111;
        }

        /* --- HEADER NOIR (Navigation) --- */
        .amazon-header {
            background-color: #232F3E;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-seg {
            color: #19C9D1;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
            letter-spacing: 1px;
        }

        /* --- BARRE DE RECHERCHE --- */
        .search-bar-container {
            display: flex;
            width: 100%;
        }

        .search-input {
            flex-grow: 1;
            padding: 12px;
            border: none;
            border-radius: 4px 0 0 4px;
            font-size: 15px;
        }

        .search-button {
            background-color: #FEBD69; /* Le orange Amazon */
            border: none;
            padding: 0 15px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-size: 18px;
        }

        /* --- BARRE DE LIVRAISON --- */
        .delivery-bar {
            background-color: #37475A;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- GRANDE BANNIÈRE (Comme ton image Amazon) --- */
        .promo-banner {
            width: 100%;
            height: 220px;
            background: linear-gradient(to right, #FF9900, #FFB84D);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .promo-text {
            color: white;
            z-index: 2;
            max-width: 60%;
        }

        .promo-text h1 {
            font-size: 26px;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .btn-promo {
            background: white;
            color: #111;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
        }

        /* --- TA ZONE : LE CRÉATEUR --- */
        .creator-section {
            padding: 15px;
        }

        .creator-card {
            background-color: white;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .creator-image-box {
            width: 100%;
            height: 300px;
            border-radius: 4px;
            background-image: url('https://i.ibb.co/tPhqzzV2/IMG-1506.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            color: white;
            position: relative;
        }

        .creator-image-box::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
        }

        .creator-image-box h2, .creator-image-box p {
            z-index: 2;
        }

        /* --- GRILLE DE PRODUITS --- */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 15px 20px;
        }

        .product-item {
            background: white;
            padding: 15px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-img {
            width: 100%;
            height: 120px;
            background: #f7f7f7;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .price-tag {
            background: #CC0C39;
            color: white;
            padding: 2px 6px;
            font-size: 12px;
            border-radius: 2px;
            align-self: flex-start;
        }
    </style>
</head>
<body>

    <header class="amazon-header">
        <div class="top-nav">
            <a href="#" class="logo-seg">S.E.G GLOBAL</a>
            <div style="color:white; font-size: 20px;">🛒</div>
        </div>
        <div class="search-bar-container">
            <input type="text" class="search-input" placeholder="Rechercher sur S.E.G Global">
            <button class="search-button">🔍</button>
        </div>
    </header>

    <div class="delivery-bar">
        📍 Votre adresse de livraison: Cameroun
    </div>

    <section class="promo-banner">
        <div class="promo-text">
            <h1>1ère livraison gratuite</h1>
            <p>Découvrez l'excellence maintenant.</p>
            <a href="#" class="btn-promo">En savoir plus</a>
        </div>
        <div style="font-size: 80px; opacity: 0.3;">💎</div>
    </section>

    <section class="creator-section">
        <div class="creator-card">
            <h3 style="margin-bottom: 10px;">LE CRÉATEUR DU LUXE</h3>
            <div class="creator-image-box">
                <h2>LA VISION DU DIRECTEUR</h2>
                <p>Incarnez l'exception</p>
            </div>
        </div>
    </section>

    <div class="product-grid">
        <div class="product-item">
            <div class="product-img"></div>
            <div class="price-tag">-14%</div>
            <p style="font-size: 13px; font-weight: bold; margin-top: 5px;">Montre Néon</p>
        </div>
        <div class="product-item">
            <div class="product-img"></div>
            <div class="price-tag">-13%</div>
            <p style="font-size: 13px; font-weight: bold; margin-top: 5px;">Sac Cyber</p>
        </div>
    </div>

</body>
</html>
