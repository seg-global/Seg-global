<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL | The Elite Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* On garde le doré luxe */
            --gold: #D4AF37;
            --text-white: #F2F2F2;
            --overlay: rgba(13, 13, 13, 0.85); /* Un filtre noir très sombre à 85% d'opacité */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0D0D0D; /* Couleur de secours */
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            /* C'est ici que tout se passe : Ta photo en arrière-plan */
            background-image: url('https://seg-global.vercel.app/profile.jpg'); /* REMPLACE PAR TON URL D'IMAGE REELLE */
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* L'image ne bouge pas quand on scrolle */
        }

        /* Le filtre sombre pour la lisibilité */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--overlay);
            z-index: 1; /* Derrière le contenu, mais devant l'image */
        }

        /* Le contenu de l'application */
        .content {
            position: relative;
            z-index: 10; /* Devant le filtre sombre */
            padding-bottom: 100px; /* Espace pour la nav basse */
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
            letter-spacing: 2px;
        }

        .lang-switch {
            border: 1px solid var(--gold);
            padding: 5px 10px;
            color: var(--gold);
            font-size: 0.8rem;
            border-radius: 4px;
        }

        /* --- HERO SECTION (Style de l'image 10) --- */
        .hero {
            text-align: center;
            padding: 60px 20px 40px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .hero p {
            color: #AAA; /* Gris clair pour le sous-titre */
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .cta-button {
            background-color: var(--gold);
            color: black;
            padding: 15px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        /* --- NAVIGATION BASSE (Comme l'image 11 mais avec tes couleurs) --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: rgba(26, 26, 26, 0.9);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #333;
            z-index: 1000;
        }

        .nav-item {
            color: #888;
            text-decoration: none;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-item.active {
            color: var(--gold);
        }

    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content">
        <header>
            <div class="logo">S.E.G GLOBAL</div>
            <div class="lang-switch">EN | FR</div>
        </header>

        <section class="hero">
            <h1>The Bridge To <br>Global Luxury</h1>
            <p>From Dubai to Africa, excellence delivered.</p>
            <br><br>
            <a href="#" class="cta-button">Explore Collection</a>
        </section>

        </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <span>🏠</span> <span>Home</span>
        </a>
        <a href="#" class="nav-item">
            <span>💎</span> <span>Market</span>
        </a>
        <a href="#" class="nav-item">
            <span>👤</span> <span>Account</span>
        </a>
    </nav>

</body>
</html>
