<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL | Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --fb-blue: #0866FF; --bg-dark: #0D0D0D; --surface: #1C1C1C; --text: #FFFFFF; --gold: #D4AF37; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text); height: 100vh; overflow: hidden; }

        /* HEADER STYLE FACEBOOK */
        header { 
            height: 60px; padding: 0 15px; display: flex; justify-content: space-between; 
            align-items: center; background: var(--surface); border-bottom: 1px solid #333;
        }
        .logo-text { font-weight: 800; color: var(--gold); font-size: 1.5rem; letter-spacing: -1px; }
        .head-icons { display: flex; gap: 15px; font-size: 1.2rem; }

        /* CONTENU DES PAGES */
        .app-container { height: calc(100vh - 130px); overflow-y: auto; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* STYLE FIL D'ACTUALITÉ (FEEDS) */
        .story-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .story-card { min-width: 100px; height: 160px; background: #333; border-radius: 12px; position: relative; border: 1px solid #444; }
        .post-card { background: var(--surface); border-radius: 10px; margin-bottom: 15px; padding: 12px; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .user-pic { width: 35px; height: 35px; background: var(--gold); border-radius: 50%; }
        .post-img { width: 100%; border-radius: 8px; margin: 10px 0; background: #222; min-height: 200px; }

        /* STYLE MARKETPLACE */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .market-item { background: var(--surface); border-radius: 8px; overflow: hidden; }
        .market-img { width: 100%; height: 150px; object-fit: cover; background: #222; }
        .market-info { padding: 8px; font-size: 0.9rem; }
        .price { font-weight: bold; color: var(--gold); }

        /* NAVIGATION BASSE (STYLE FACEBOOK) */
        nav { 
            position: fixed; bottom: 0; width: 100%; height: 70px; 
            background: var(--surface); display: flex; border-top: 1px solid #333;
        }
        .nav-tab { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: #888; text-decoration: none; font-size: 0.65rem;
        }
        .nav-tab.active { color: var(--gold); border-top: 3px solid var(--gold); }
        .nav-tab i { font-size: 1.5rem; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">S.E.G GLOBAL</div>
        <div class="head-icons">🔍 💬</div>
    </header>

    <div class="app-container">
        <div id="home" class="page active">
            <div class="story-bar">
                <div class="story-card" style="background: url('profile.jpg') center/cover;"></div>
                <div class="story-card"></div>
                <div class="story-card"></div>
                <div class="story-card"></div>
            </div>
            <div class="post-card">
                <div class="post-header"><div class="user-pic"></div> <b>Stève Mpina</b></div>
                <p>Bienvenue sur le futur du luxe en Afrique. 🌍💎</p>
                <div class="post-img" style="background: url('https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=500') center/cover;"></div>
                <div style="display:flex; justify-content:space-around; color:#888; font-size: 0.8rem;">
                    <span>👍 J'aime</span> <span>💬 Commenter</span> <span>🔗 Partager</span>
                </div>
            </div>
        </div>

        <div id="market" class="page">
            <h2 style="margin-top:0;">Marketplace</h2>
            <div class="market-grid">
                <div class="market-item">
                    <div class="market-img" style="background: url('https://images.unsplash.com/photo-1601121141461-9d6647bca1ed?w=400') center/cover;"></div>
                    <div class="market-info">
                        <div class="price">150 000 FCFA</div>
                        <div>Montre de Luxe Dubai</div>
                    </div>
                </div>
                <div class="market-item">
                    <div class="market-img" style="background: url('https://images.unsplash.com/photo-1547996160-81dfa63595dd?w=400') center/cover;"></div>
                    <div class="market-info">
                        <div class="price">45 000 FCFA</div>
                        <div>Bague Or 18K</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="notif" class="page">
            <h2>Notifications</h2>
            <p style="color:#888;">Roberto Tabet a aimé votre projet.</p>
        </div>
    </div>

    <nav>
        <a href="javascript:void(0)" class="nav-tab active" onclick="switchPage('home', this)"><i>🏠</i><span>Accueil</span></a>
        <a href="javascript:void(0)" class="nav-tab" onclick="switchPage('market', this)"><i>🏪</i><span>Market</span></a>
        <a href="javascript:void(0)" class="nav-tab"><i>👥</i><span>Amis</span></a>
        <a href="javascript:void(0)" class="nav-tab" onclick="switchPage('notif', this)"><i>🔔</i><span>Notifs</span></a>
        <a href="javascript:void(0)" class="nav-tab"><i>≡</i><span>Menu</span></a>
    </nav>

    <script>
        function switchPage(pageId, element) {
            // Désactiver toutes les pages et onglets
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            
            // Activer la sélection
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
