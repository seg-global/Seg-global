<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Accueil Alibaba Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background-color: #f4f4f4; padding-bottom: 80px; }

        /* --- HEADER ALIBABA STYLE --- */
        .ali-header { background: linear-gradient(90deg, #ff6a00, #ee4d2d); padding: 15px; position: sticky; top: 0; z-index: 1000; border-radius: 0 0 20px 20px; }
        .top-line { display: flex; justify-content: space-between; align-items: center; color: white; margin-bottom: 15px; }
        .search-container { background: white; border-radius: 25px; display: flex; padding: 10px 15px; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .search-container input { border: none; flex: 1; outline: none; margin-left: 10px; font-size: 14px; }

        /* --- BANNER BIENVENUE --- */
        .welcome-banner { margin: 15px; background: white; border-radius: 15px; padding: 20px; display: flex; align-items: center; justify-content: space-between; overflow: hidden; position: relative; }
        .welcome-text h2 { font-size: 18px; color: #333; }
        .welcome-text p { font-size: 12px; color: #ff6a00; font-weight: bold; }
        .coupon-badge { background: #ffefea; color: #ff6a00; padding: 5px 10px; border-radius: 5px; font-size: 10px; margin-top: 5px; display: inline-block; }

        /* --- CATÉGORIES COLORÉES --- */
        .ali-cats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 15px; background: white; margin: 0 15px; border-radius: 15px; }
        .cat-item { text-align: center; }
        .cat-circle { width: 50px; height: 50px; border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; }
        .cat-item p { font-size: 11px; color: #666; font-weight: 500; }

        /* --- SECTION FLASH SALES --- */
        .section-title { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .flash-grid { display: flex; overflow-x: auto; padding: 0 15px; gap: 12px; scrollbar-width: none; }
        .flash-card { min-width: 130px; background: white; border-radius: 12px; padding: 10px; text-align: center; }
        .flash-img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; }
        .flash-price { color: #ee4d2d; font-weight: bold; font-size: 14px; margin-top: 5px; }

        /* --- NAV BASSE --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; display: flex; border-top: 1px solid #eee; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; text-decoration: none; font-size: 11px; }
        .nav-link.active { color: #ff6a00; }
        .nav-link i { font-size: 22px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="ali-header">
        <div class="top-line">
            <span style="font-weight: bold; font-size: 18px;">S.E.G GLOBAL</span>
            <i class="fas fa-comment-dots" style="font-size: 20px;"></i>
        </div>
        <div class="search-container">
            <i class="fas fa-search" style="color: #999;"></i>
            <input type="text" placeholder="Rechercher des produits d'usine...">
            <i class="fas fa-camera" style="color: #999;"></i>
        </div>
    </div>

    <div class="welcome-banner">
        <div class="welcome-text">
            <h2>Bienvenue, Stève</h2>
            <p>Ton Empire commence ici</p>
            <span class="coupon-badge">-10% sur ton premier achat</span>
        </div>
        <div style="font-size: 50px; color: #ff6a00; opacity: 0.2;"><i class="fas fa-crown"></i></div>
    </div>

    <div class="ali-cats">
        <div class="cat-item">
            <div class="cat-circle" style="background: #ff9d00;"><i class="fas fa-car"></i></div>
            <p>Auto</p>
        </div>
        <div class="cat-item">
            <div class="cat-circle" style="background: #00d2ff;"><i class="fas fa-gem"></i></div>
            <p>Luxe</p>
        </div>
        <div class="cat-item">
            <div class="cat-circle" style="background: #ff4b2b;"><i class="fas fa-bolt"></i></div>
            <p>Tech</p>
        </div>
        <div class="cat-item">
            <div class="cat-circle" style="background: #7b2ff7;"><i class="fas fa-tshirt"></i></div>
            <p>Mode</p>
        </div>
    </div>

    <div class="section-title">
        <h3 style="font-size: 16px;">Ventes Flash 🔥</h3>
        <a href="#" style="color: #999; font-size: 12px; text-decoration: none;">Voir plus</a>
    </div>
    <div class="flash-grid">
        <div class="flash-card">
            <img src="https://images.pexels.com/photos/190819/pexels-photo-190819.jpeg?w=200" class="flash-img">
            <p class="flash-price">450k F</p>
        </div>
        <div class="flash-card">
            <img src="https://images.pexels.com/photos/1478442/pexels-photo-1478442.jpeg?w=200" class="flash-img">
            <p class="flash-price">120k F</p>
        </div>
        <div class="flash-card">
            <img src="https://images.pexels.com/photos/2858137/pexels-photo-2858137.jpeg?w=200" class="flash-img">
            <p class="flash-price">1.5M F</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link active"><i class="fas fa-home"></i><span>Accueil</span></div>
        <div class="nav-link"><i class="fas fa-list"></i><span>Catégories</span></div>
        <div class="nav-link"><i class="fas fa-shopping-cart"></i><span>Panier</span></div>
        <div class="nav-link"><i class="fas fa-user"></i><span>Mon Compte</span></div>
    </nav>

</body>
</html>
