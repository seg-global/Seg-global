<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. LE FOND ET L'ATMOSPHÈRE */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: linear-gradient(to bottom, #1e90ff, #ffffff);
        }

        /* 2. LE SOLEIL DANS L'ANGLE */
        .sun {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #fff700 20%, rgba(255,247,0,0.5) 50%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }

        /* 3. LES NUAGES (Animation de flottement) */
        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.8;
            z-index: 2;
            animation: float 20s infinite linear;
        }
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .c1 { width: 120px; height: 40px; top: 15%; left: -150px; }
        .c1::after { width: 50px; height: 50px; top: -20px; left: 15px; }
        .c1::before { width: 70px; height: 70px; top: -35px; left: 40px; }

        @keyframes float {
            from { transform: translateX(0); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        /* 4. ÉTOILES FILANTES */
        .shooting-star {
            position: absolute;
            top: 20%;
            left: -100px;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, white, transparent);
            z-index: 1;
            animation: shoot 8s infinite;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(20deg); opacity: 1; }
            10% { transform: translateX(100vw) translateY(30vh) rotate(20deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* 5. INTERFACE ET BOUTONS (Z-INDEX ÉLEVÉ POUR QU'ILS MARCHENT) */
        .app-container {
            position: relative;
            z-index: 10; /* Indispensable pour que les boutons répondent ! */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            color: #ffff00;
            text-shadow: 0 0 15px rgba(255, 255, 0, 0.8);
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .btn-futuristic {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #ffff00;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.3);
        }

        .btn-futuristic:active {
            transform: scale(0.95);
            background: #ffff00;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="cloud c1"></div>
    <div class="shooting-star"></div>

    <div class="app-container">
        <h1>MA VISION FUTURISTE</h1>
        
        <button class="btn-futuristic" onclick="alert('Bouton 1 activé !')">ACCÉDER</button>
        <button class="btn-futuristic" onclick="alert('Bouton 2 activé !')">EXPLORER</button>
    </div>

    <script>
        // Ce petit script s'assure que tes boutons sont réactifs
        console.log("L'application est prête et les boutons sont actifs.");
    </script>

</body>
</html>
