<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL V2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ali-orange: #ff6a00; --seg-cyan: #19C9D1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        /* --- ÉCRAN DE MISE À JOUR (FORCE UPDATE) --- */
        #update-screen {
            position: fixed; inset: 0; background: white; z-index: 20000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }
        .btn-update { background: var(--ali-orange); color: white; padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; margin-top: 20px; }

        /* --- INTERFACE ALIBABA MODERNE --- */
        .app-header { background: linear-gradient(90deg, #ff6a00, #ee4d2d); padding: 15px; color: white; position: sticky; top: 0; z-index: 1000; }
        .view { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .active-view { display: block; }
        
        /* BOUTIQUE VENDEUR */
        .shop-card { background: white; border-radius: 15px; padding: 20px; border: 2px dashed #ddd; margin-bottom: 20px; text-align: center; }
        .input-group { margin-bottom: 15px; text-align: left; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="update-screen">
        <div style="font-size: 60px; color: var(--ali-orange);"><i class="fas fa-cloud-download-alt"></i></div>
        <h1 style="margin-top: 20px;">Mise à jour requise</h1>
        <p style="color: #666; margin-top: 10px;">Le DG Stève a déployé de nouvelles fonctionnalités de sécurité et le moteur de boutique.</p>
        <button class="btn-update" onclick="appliquerMiseAJour()">METTRE À JOUR MAINTENANT</button>
    </div>

    <header class="app-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 900;">S.E.G GLOBAL</span>
            <span id="version-tag" style="font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px;">V1.0</span>
        </div>
    </header>

    <main id="view-home" class="view active-view">
        <h2>Bienvenue dans l'Empire</h2>
        </main>

    <main id="view-vendre" class="view">
        <div class="shop-card">
            <i class="fas fa-store" style="font-size: 40px; color: var(--ali-orange);"></i>
            <h3>Créer ma boutique S.E.G</h3>
            <p style="font-size: 12px; color: #999;">Commencez à vendre vos articles dans le monde entier.</p>
        </div>
        
        <div class="input-group">
            <label>Nom de votre Boutique</label>
            <input type="text" placeholder="ex: Cameroon Luxury Shoes">
        </div>
        <div class="input-group">
            <label>Catégorie</label>
            <select>
                <option>Automobile</option>
                <option>Precious Stones (Diamants/Or)</option>
                <option>High-Tech</option>
                <option>Mode & Luxe</option>
            </select>
        </div>
        <button class="btn-update" style="width: 100%;" onclick="alert('Boutique en cours de création sur Firebase...')">ACTIVER MA BOUTIQUE</button>
    </main>

    <script>
        // LE SYSTÈME DE MISE À JOUR DU DG
        const VERSION_ACTUELLE = "2.0"; // Change ceci à "3.0" plus tard pour forcer une nouvelle MAJ
        
        function checkVersion() {
            const versionInstallee = localStorage.getItem('seg_version');
            if (versionInstallee !== VERSION_ACTUELLE) {
                document.getElementById('update-screen').style.display = 'flex';
            } else {
                document.getElementById('version-tag').innerText = "V" + VERSION_ACTUELLE;
            }
        }

        function appliquerMiseAJour() {
            localStorage.setItem('seg_version', VERSION_ACTUELLE);
            alert("Mise à jour S.E.G GLOBAL réussie !");
            location.reload();
        }

        window.onload = checkVersion;
    </script>
</body>
</html>
