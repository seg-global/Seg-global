        /* ==========================================================================
           STYLE GENERAL & RESET
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* ==========================================================================
           EN-TÊTE LUMINEUX (EMPIRE SYSTEM)
           ========================================================================== */
        .empire-header {
            text-align: center;
            padding: 20px 10px;
            background: linear-gradient(180deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .empire-header h1 {
            color: #D4AF37;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .objectif-badge {
            color: #00E5FF;
            font-size: 11px;
            margin-top: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* GESTION DES ECRANS ANIMÉS */
        .app-screen {
            display: none; 
            animation: fadeIn 0.4s ease forwards;
            padding: 20px;
        }

        .app-screen.active-screen {
            display: block; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================================================
           ECRAN 1 : MARCHÉ DE LUXE (ACCUEIL)
           ========================================================================== */
        .section-title {
            color: #D4AF37;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 20px;
            position: relative;
            transition: transform 0.2s ease;
        }

        .product-header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .product-badge {
            background: rgba(0, 229, 255, 0.15);
            border: 1px solid #00E5FF;
            color: #00E5FF;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
        }

        .btn-chat-trigger {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-chat-trigger:active {
            transform: scale(0.9);
            background: #D4AF37;
            color: #000000;
        }

        .product-image-placeholder {
            width: 100%;
            height: 220px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(212, 175, 55, 0.3);
            border: 1px dashed rgba(212, 175, 55, 0.2);
        }

        .product-info {
            margin-top: 15px;
        }

        .product-info h3 {
            font-size: 19px;
            color: #ffffff;
        }

        .price {
            color: #00E5FF;
            font-size: 17px;
            font-weight: bold;
            margin: 5px 0 12px 0;
        }

            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {

            color: #D4AF37;
            font-weight: bold;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

            line-height: 1.4;
        }

            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
