<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Empire Intégré</title>
    
    <!-- Bibliothèques Cloud S.E.G -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --bg: #000; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Arial', sans-serif; min-height: 100%; overflow-x: hidden; }
        .container { max-width: 450px; margin: auto; padding: 20px; padding-bottom: 100px; }
        
        .logo-gold { font-size: 28px; letter-spacing: 5px; color: var(--gold); text-align: center; text-shadow: 0 0 15px rgba(212,175,55,0.4); margin-top: 20px; }
        .subtitle { font-size: 10px; color: #888; text-transform: uppercase; text-align: center; margin-bottom: 30px; }
        
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; text-align: center; font-weight: bold; }
        .btn-gold { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; position: relative; overflow: hidden; }
        .btn-gold:disabled { color: #fff; cursor: not-allowed; }
        
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .item-card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 10px; text-align: center; border-bottom: 2px solid var(--gold); }
        .item-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .price { color: var(--gold); font-weight: bold; display: block; font-size: 14px; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #666; font-size: 10px; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        
        #preview { width: 120px; height: 120px; object-fit: cover; margin: 15px auto; display: none; border-radius: 10px; border: 2px solid var(--gold); box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <!-- AUTHENTIFICATION -->
    <div id="auth_section">
        <div class="logo-gold">S.E.G GLOBAL</div>
        <p class="subtitle">Système Haute Rapidité</p>
        <div id="login_step1">
            <input type="email" id="email_input" placeholder="Email de session">
            <button class="btn-gold" onclick="sendAccessCode()">Générer Code d'Entrée</button>
        </div>
        <div id="login_step2" style="display:none;">
            <input type="text" id="otp_input" placeholder="Code OTP">
            <button class="btn-gold" onclick="verifyAccessCode()">Vérifier Identité</button>
        </div>
    </div>

    <!-- APP PRINCIPALE -->
    <div id="main_app" style="display:none;">
        <div id="home_page" class="page active">
            <h3 style="text-align: center; color: var(--gold);">FLUX DE L'EMPIRE</h3>
            <div class="market-grid" id="market_feed"></div>
        </div>

        <div id="seller_page" class="page">
            <h2 style="color:var(--gold); text-align:center;">Vendre un article</h2>
            <input type="text" id="prod_name" placeholder="Désignation">
            <input type="number" id="prod_price" placeholder="Prix (FCFA)">
            <p style="font-size: 10px; text-align:center; color: #888;">CAPTEUR PHOTO ACTIF</p>
            <input type="file" id="prod_img" accept="image/*" onchange="previewImage(event)" style="border: 1px dashed var(--gold); padding: 10px;">
            <img id="preview">
            <button class="btn-gold" id="pub_btn" onclick="publishProduct()">DÉPLOYER IMMÉDIATEMENT</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="showPage('home_page', this)">🏠<br>FLUX</div>
            <div class="nav-item" onclick="showPage('seller_page', this)">🛒<br>VENDRE</div>
            <div class="nav-item" onclick="logout()">🚪<br>OFFLINE</div>
        </nav>
    </div>
</div>

<script>
    // --- INITIALISATION ---
    (function() { emailjs.init("QGnoNmpH78_GuSLf4"); })();
    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpcD_vS9hH5f8Q2L-Y0X0kE0",
        authDomain: "seg-global.firebaseapp.com",
        projectId: "seg-global",
        storageBucket: "seg-global.appspot.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    const SEG_ID = "SEG-237-3130"; 

    let correctOTP = "";
    let optimizedFile = null;

    // --- MOTEUR DE RAPIDITÉ (COMPRESSION) ---
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; 
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
                };
            };
        });
    }

    // --- GESTION MÉDIAS ---
    async function previewImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const prev = document.getElementById('preview');
                prev.src = e.target.result;
                prev.style.display = "block";
            };
            reader.readAsDataURL(file);
            optimizedFile = await compressImage(file);
        }
    }

    // --- PUBLICATION HAUTE VITESSE RECTIFIÉE ---
    async function publishProduct() {
        const name = document.getElementById('prod_name').value;
        const price = document.getElementById('prod_price').value;
        const btn = document.getElementById('pub_btn');
        
        if(!name || !price || !optimizedFile) return alert("Données manquantes !");
        
        const phoneRegex = /[0-9]{8,}/g;
        if(phoneRegex.test(name)) return alert("🚨 SÉCURITÉ : Pas de numéros !");

        btn.innerHTML = "PROPULSION : 1%"; 
        btn.disabled = true;

        try {
            const fileName = `SEG_${Date.now()}.jpg`;
            const storageRef = storage.ref('produits_seg').child(fileName);
            const metadata = { contentType: 'image/jpeg' };
            const uploadTask = storageRef.put(optimizedFile, metadata);

            uploadTask.on('state_changed', 
                (snapshot) => {
                    let progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    let displayProgress = Math.max(1, Math.round(progress));
                    btn.innerText = "SÉCURISATION : " + displayProgress + "%";
                    // Barre de progression visuelle sur le bouton
                    btn.style.background = `linear-gradient(90deg, #D4AF37 ${displayProgress}%, #444 ${displayProgress}%)`;
                }, 
                (error) => { 
                    console.error(error);
                    alert("Erreur réseau : Vérifiez votre connexion.");
                    btn.disabled = false;
                    btn.innerText = "RÉESSAYER";
                }, 
                async () => {
                    const photoURL = await uploadTask.snapshot.ref.getDownloadURL();
                    await db.collection("produits").add({
                        nom: name,
                        prix: parseFloat(price),
                        image: photoURL,
                        vendeurId: SEG_ID,
                        date: new Date()
                    });
                    btn.innerText = "TERMINÉ !";
                    alert("🚀 Article déployé avec succès !");
                    location.reload();
                }
            );
        } catch (e) {
            alert("Erreur critique : " + e.message);
            btn.disabled = false;
            btn.innerText = "PUBLIER";
        }
    }

    // --- SYSTÈME CORE ---
    function sendAccessCode() {
        const email = document.getElementById('email_input').value;
        if(!email) return alert("Email requis");
        correctOTP = Math.floor(100000 + Math.random() * 900000).toString();
        emailjs.send("service_ocg86ge", "template_v7i6m5m", { to_email: email, otp_code: correctOTP })
        .then(() => {
            document.getElementById('login_step1').style.display = 'none';
            document.getElementById('login_step2').style.display = 'block';
        });
    }

    function verifyAccessCode() {
        if(document.getElementById('otp_input').value === correctOTP) {
            localStorage.setItem("seg_session", "active");
            startApp();
        } else alert("Code incorrect");
    }

    function startApp() {
        document.getElementById('auth_section').style.display = 'none';
        document.getElementById('main_app').style.display = 'block';
        loadProducts();
    }

    function loadProducts() {
        const feed = document.getElementById('market_feed');
        db.collection("produits").orderBy("date", "desc").onSnapshot((snap) => {
            feed.innerHTML = "";
            snap.forEach((doc) => {
                const p = doc.data();
                feed.innerHTML += `
                    <div class="item-card">
                        <img src="${p.image}">
                        <strong>${p.nom}</strong>
                        <span class="price">${p.prix.toLocaleString()} F</span>
                    </div>`;
            });
        });
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function logout() { localStorage.removeItem("seg_session"); location.reload(); }
    if(localStorage.getItem("seg_session") === "active") startApp();
</script>
</body>
</html>
