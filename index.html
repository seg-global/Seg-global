<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | Expert Interface</title>
    <style>
        :root {
            --primary: #1877F2; 
            --gold: #D4AF37;
            --dark: #1c1e21;
            --white: #ffffff;
            --bg: #f7f8fa;
            --gray-text: #65676b;
        }

        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }

        /* HEADER AVEC OMBRE LÉGÈRE */
        .header {
            background: var(--white); padding: 12px 20px; display: flex;
            justify-content: space-between; align-items: center;
            box-shadow: 0 1px 12px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 1000;
        }

        /* SECTION STORIES (STYLE RÉSEAU SOCIAL) */
        .stories { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: var(--white); margin-bottom: 10px; }
        .story-circle { 
            min-width: 65px; height: 65px; border-radius: 50%; 
            border: 3px solid var(--primary); display: flex; 
            align-items: center; justify-content: center; font-size: 25px;
            background: #eee; cursor: pointer;
        }

        /* AFFICHAGE DES PRODUITS DU MARCHÉ */
        .market-container { padding: 15px; }
        .product-card { 
            background: var(--white); border-radius: 15px; overflow: hidden; 
            margin-bottom: 20px; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .product-preview { 
            width: 100%; height: 180px; background: #222; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--gold); font-size: 50px;
        }
        .product-details { padding: 15px; }
        .product-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .product-price { color: var(--gold); font-size: 16px; font-weight: 600; margin-bottom: 10px; }

        /* BOUTON D'ACTION PRINCIPAL */
        .action-btn { 
            background: var(--primary); color: white; border: none; 
            width: 100%; padding: 12px; border-radius: 10px; 
            font-weight: bold; font-size: 14px; cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.98); background: #1565c0; }

        /* NAVIGATION BASSE ÉLÉGANTE */
        .nav-bar { 
            position: fixed; bottom: 0; width: 100%; background: var(--white); 
            display: flex; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-link { flex: 1; text-align: center; color: var(--gray-text); font-size: 10px; font-weight: 500; cursor: pointer; }
        .nav-link.active { color: var(--primary); }
        .nav-link.invest { color: var(--gold); font-weight: 700; }

        .view { display: none; }
        .active-view { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900; font-size: 20px; color: var(--primary); letter-spacing: -0.5px;">S.E.G GLOBAL</div>
        <div style="font-size: 20px;">💬</div>
    </div>

    <!-- VUE ACCUEIL -->
    <div id="homeView" class="view active-view">
        <div class="stories">
            <div class="story-circle" title="Ajouter">➕</div>
            <div class="story-circle">💎</div>
            <div class="story-circle">🌍</div>
            <div class="story-circle">🚀</div>
        </div>
        <div style="padding: 0 15px;">
            <div style="background: white; padding: 20px; border-radius: 15px; border: 1px solid #eee;">
                <h3 style="margin-top: 0;">Statut de l'infrastructure</h3>
                <p style="color: var(--gray-text); font-size: 14px;">Recherche de partenaires pour les serveurs **auto global** en cours...</p>
            </div>
        </div>
    </div>

    <!-- VUE MARCHÉ -->
    <div id="marketView" class="view">
        <div class="market-container">
            <div class="product-card">
                <div class="product-preview">💎</div>
                <div class="product-details">
                    <div class="product-title">Diamant de Forêt (Cameroun)</div>
                    <div class="product-price">Négociation Sécurisée</div>
                    <button class="action-btn" onclick="alert('Lancement de la négociation...')">Lancer une offre</button>
                </div>
            </div>
        </div>
    </div>

    <!-- NAVIGATION BASSE -->
    <div class="nav-bar">
        <div class="nav-link active" onclick="changeView('homeView', this)">🏠<br>FIL D'ACTU</div>
        <div class="nav-link" onclick="changeView('marketView', this)">🏪<br>LE MARCHÉ</div>
        <div class="nav-link invest" onclick="alert('Portail Investisseur : Objectif Serveurs & Machines')">💰<br>INVESTIR</div>
        <div class="nav-link">☰<br>MENU</div>
    </div>

    <script>
        function changeView(viewId, element) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(viewId).classList.add('active-view');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(element) element.classList.add('active');
        }
    </script>
</body>
</html>
