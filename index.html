<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Interface Luxe</title>
    <style>
        /* --- Styles Généraux --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --primary-teal: #19C9D1;
            --dark-background: #1C1C1E;
            --text-color: #333;
        }

        body {
            background-color: white;
            color: var(--text-color);
            padding-bottom: 50px;
        }

        /* --- Header / Logo --- */
        .header {
            padding: 20px;
            background-color: white;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-teal);
            letter-spacing: 3px;
        }

        /* --- Barre de Recherche --- */
        .search-container {
            padding: 0 20px 20px 20px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #E0E0E0;
            background-color: #F8F8F8;
            font-size: 16px;
            outline: none;
        }

        /* --- Section Titre & Bouton --- */
        .hero-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .hero-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .btn-explorer {
            background-color: var(--primary-teal);
            color: white;
            padding: 12px 40px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Grille de Produits --- */
        .section-name {
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
        }

        .product-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 15px;
            margin-bottom: 30px;
        }

        .product-card {
            flex: 1;
            max-width: 170px;
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            position: relative;
            border: 1px solid #F0F0F0;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: black;
            color: white;
            font-size: 9px;
            padding: 3px 7px;
            border-radius: 4px;
            font-weight: bold;
        }

        .product-img-box {
            width: 100%;
            height: 120px;
            background-color: #F0F9FA;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #19C9D1;
            font-weight: bold;
            font-size: 10px;
        }

        .product-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn-cart {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #DDD;
            background: white;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Section CRÉATEUR (TA PHOTO) --- */
        .creator-container {
            padding: 0 20px;
            margin-bottom: 30px;
        }

        .creator-card {
            width: 100%;
            height: 400px;
            border-radius: 25px;
            background-color: #000;
            background-image: url('https://i.ibb.co/tPhqzzV2/IMG-1506.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 40px;
            color: white;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        /* Effet de dégradé sur la photo pour que le texte soit lisible */
        .creator-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            z-index: 1;
        }

        .creator-text-main {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
            z-index: 2;
            text-transform: uppercase;
        }

        .creator-text-sub {
            font-size: 14px;
            font-style: italic;
            opacity: 0.9;
            z-index: 2;
        }

        /* --- Footer Vendeur --- */
        .footer-banner {
            background: linear-gradient(to right, #000, #333);
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">S.E.G GLOBAL</div>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Rechercher une montre, un sac...">
    </div>

    <div class="hero-section">
        <div class="hero-title">L'EXCELLENCE À PORTÉE DE MAIN</div>
        <button class="btn-explorer">EXPLORER</button>
    </div>

    <div class="section-name">NOS NOUVEAUTÉS LUXE</div>
    <div class="product-grid">
        <div class="product-card">
            <div class="badge">PRÉMIUM</div>
            <div class="product-img-box">IMAGE PRODUIT</div>
            <div class="product-title">MONTRE NÉON</div>
            <button class="btn-cart">Ajouter au panier</button>
        </div>
        <div class="product-card">
            <div class="product-img-box">IMAGE PRODUIT</div>
            <div class="product-title">SAC CYBER</div>
            <button class="btn-cart">Ajouter au panier</button>
        </div>
    </div>

    <div class="creator-container">
        <div class="creator-card">
            <div class="creator-text-main">LA VISION DU CRÉATEUR</div>
            <div class="creator-text-sub">Diriger le luxe de demain</div>
        </div>
    </div>

    <div class="footer-banner">
        VOUS ÊTES VENDEUR ?
    </div>

</body>
</html>
