<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Système de Transaction</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; padding-bottom: 50px; }

        /* HEADER PRESTIGE */
        .main-header { background-color: #232F3E; padding: 20px; text-align: center; color: white; position: sticky; top: 0; z-index: 100; }
        .logo { color: #19C9D1; font-size: 26px; font-weight: bold; letter-spacing: 2px; }

        /* INTERFACE PUBLIQUE */
        .ceo-section { padding: 15px; }
        .ceo-card {
            background-image: url('https://i.ibb.co/tPhqzzV2/IMG-1506.jpg'); 
            height: 400px; background-size: cover; background-position: center;
            border-radius: 15px; display: flex; flex-direction: column; justify-content: flex-end;
            padding: 25px; color: white; position: relative; overflow: hidden;
        }
        .ceo-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        
        .action-btn { background: #19C9D1; color: white; border: none; padding: 18px; width: 100%; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 15px 0; text-transform: uppercase; }

        /* GRILLE PRODUITS AVEC BOUTON ACHAT */
        .article-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .article-card { background: white; border-radius: 12px; padding: 12px; border: 1px solid #eee; text-align: center; }
        .buy-btn { background: #FEBD69; border: none; padding: 8px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* MODALE DE PAIEMENT SÉCURISÉ */
        #paymentModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .payment-box { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">S.E.G GLOBAL</div>
    </header>

    <main id="app-content">
        <section class="ceo-section">
            <div class="ceo-card">
                <div style="z-index: 2;">
                    <p style="color: #19C9D1; font-weight: bold;">DIRECTEUR GÉNÉRAL</p>
                    <h1 style="font-size: 20px;">L'EMPIRE DU LUXE</h1>
                </div>
            </div>
            <button class="action-btn" onclick="openPortal()">Ouvrir mon Espace Vendeur</button>
        </section>

        <h2 style="padding: 0 15px;">🛍️ ARTICLES DISPONIBLES</h2>
        <div class="article-grid">
            <div class="article-card">
                <div style="height:100px; background:#f9f9f9; border-radius:8px; margin-bottom:8px;"></div>
                <p style="font-weight:bold;">Montre S.E.G Néon</p>
                <p style="color:#19C9D1;">500,000 FCFA</p>
                <button class="buy-btn" onclick="processAchat('Montre S.E.G Néon', 500000, 'Boutique Alpha')">ACHETER MAINTENANT</button>
            </div>
            <div class="article-card">
                <div style="height:100px; background:#f9f9f9; border-radius:8px; margin-bottom:8px;"></div>
                <p style="font-weight:bold;">Diamant Brut 2ct</p>
                <p style="color:#19C9D1;">1,200,000 FCFA</p>
                <button class="buy-btn" onclick="processAchat('Diamant Brut 2ct', 1200000, 'Mines S.E.G')">ACHETER MAINTENANT</button>
            </div>
        </div>
    </main>

    <div id="paymentModal">
        <div class="payment-box">
            <h2 id="pay-item">Paiement</h2>
            <hr style="margin: 15px 0; border: 0.5px solid #eee;">
            <p style="font-size: 14px; color: #666;">Montant à déposer sur le compte S.E.G :</p>
            <h3 id="pay-price" style="margin: 10px 0; color: #232F3E;">0 FCFA</h3>
            
            <select style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;">
                <option>Mobile Money (MTN/Orange)</option>
                <option>Virement Bancaire</option>
                <option>Wallet S.E.G</option>
            </select>
            
            <button class="action-btn" onclick="confirmTransaction()">CONFIRMER LE DÉPÔT</button>
            <p onclick="closePay()" style="color:red; cursor:pointer; font-weight:bold; margin-top:15px;">ANNULER</p>
        </div>
    </div>

    <script>
        let currentOrder = {};

        function processAchat(nom, prix, boutique) {
            currentOrder = { nom, prix, boutique };
            document.getElementById('pay-item').innerText = nom;
            document.getElementById('pay-price').innerText = prix.toLocaleString() + " FCFA";
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function closePay() {
            document.getElementById('paymentModal').style.display = 'none';
        }

        function confirmTransaction() {
            // LOGIQUE DE RÉPARTITION S.E.G
            const commission = currentOrder.prix * 0.10; // 10% pour l'application
            const vendeurPart = currentOrder.prix - commission;

            alert(`✅ TRANSACTION RÉUSSIE !\n\nL'argent a été déposé sur le compte central S.E.G.\n\nRépartition :\n- Boutique (${currentOrder.boutique}) : ${vendeurPart.toLocaleString()} FCFA\n- Commission S.E.G : ${commission.toLocaleString()} FCFA\n\nLe vendeur est notifié pour la livraison.`);
            closePay();
        }

        function openPortal() {
            alert("Accès au Portail Vendeur sécurisé...");
        }
    </script>
</body>
</html>
