<script>
    // Initialisation EmailJS
    (function() { emailjs.init("QGnoNmpH78_GuSLf4"); })();

    // Configuration Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpcD_vS9hH5f8Q2L-Y0X0kE0",
        authDomain: "seg-global.firebaseapp.com",
        projectId: "seg-global"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- SYSTÈME DE COMPTE S.E.G ---
    // On simule un utilisateur connecté (Plus tard, cela viendra de la base de données)
    let currentUser = {
        id: "SEG-237-" + Math.floor(1000 + Math.random() * 9000),
        solde: 50000 // Solde initial pour test (en FCFA)
    };

    let base64Image = ""; // Pour stocker l'image convertie

    function startApp() {
        document.getElementById('auth_section').style.display = 'none';
        document.getElementById('main_app').style.display = 'block';
        
        // Affichage de l'ID et du solde dans l'interface
        document.querySelector('.header-stats .val-money').innerText = currentUser.solde.toLocaleString() + " FCFA";
        console.log("Compte connecté : " + currentUser.id);
        
        loadProducts();
    }

    // Aperçu et conversion de l'image (Crucial pour Firebase)
    function previewImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function() {
            base64Image = reader.result;
            const prev = document.getElementById('preview');
            if(prev) {
                prev.src = reader.result;
                prev.style.display = "block";
            }
        }
        reader.readAsDataURL(file);
    }

    // Chargement du Marché
    function loadProducts() {
        const feed = document.getElementById('market_feed');
        db.collection("produits").orderBy("date", "desc").onSnapshot((snapshot) => {
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const p = doc.data();
                feed.innerHTML += `
                    <div class="item-card">
                        <img src="${p.image || 'https://via.placeholder.com/150'}">
                        <strong>${p.nom}</strong>
                        <span class="price">${parseInt(p.prix).toLocaleString()} F</span>
                        <button onclick="securePay('${doc.id}', ${p.prix})" class="btn-gold" style="font-size:10px; margin-top:10px;">ACHETER VIA S.E.G</button>
                    </div>
                `;
            });
        });
    }

    // LOGIQUE DE PAIEMENT SÉCURISÉ (Zéro Arnaque)
    function securePay(prodId, prix) {
        if(currentUser.solde < prix) {
            alert("⚠️ Solde insuffisant sur votre compte S.E.G.\nVeuillez recharger via Orange ou MTN Money.");
        } else {
            const commission = prix * 0.10;
            const netVendeur = prix - commission;
            
            if(confirm(`Confirmer l'achat ?\nPrix : ${prix} F\nFrais de service S.E.G inclus.`)) {
                // Ici on déduit le solde (simulation)
                currentUser.solde -= prix;
                document.querySelector('.header-stats .val-money').innerText = currentUser.solde.toLocaleString() + " FCFA";
                
                alert(`✅ Succès !\nCommission S.E.G prélevée : ${commission} F\nLe vendeur recevra : ${netVendeur} F.`);
            }
        }
    }

    // Publication d'un article
    function publishProduct() {
        const name = document.getElementById('prod_name').value;
        const price = document.getElementById('prod_price').value;
        
        if(!name || !price || !base64Image) {
            return alert("⚠️ Erreur : Veuillez remplir le nom, le prix et ajouter une photo.");
        }

        db.collection("produits").add({
            nom: name,
            prix: parseFloat(price),
            image: base64Image,
            vendeurId: currentUser.id, // L'ID S.E.G du vendeur
            date: new Date()
        }).then(() => {
            alert("🚀 Article publié sur l'infrastructure S.E.G GLOBAL !");
            showPage('home_page', document.querySelector('.nav-item'));
        }).catch((error) => {
            alert("Erreur base de données : " + error.message);
        });
    }

    // Navigation
    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
    }
</script>
