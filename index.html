<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | Empire Management</title>
    <style>
        :root { --primary: #1877F2; --gold: #D4AF37; --white: #ffffff; --bg: #f0f2f5; --dark: #1c1e21; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }

        /* HEADER & RECHERCHE */
        .header { background: var(--white); padding: 10px 15px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .logo-text { font-weight: 900; color: var(--primary); font-size: 20px; }
        .search-bar { background: #f0f2f5; border-radius: 20px; padding: 8px 15px; flex-grow: 1; display: flex; border: 1px solid #ddd; }
        .search-bar input { border: none; background: transparent; width: 100%; outline: none; }

        /* CATÉGORIES */
        .categories { display: flex; justify-content: space-around; padding: 15px; background: var(--white); border-bottom: 1px solid #eee; }
        .cat-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; background: white; }

        /* FIL D'ACTUALITÉ */
        .publish-box { background: var(--white); margin: 10px; padding: 12px; border-radius: 10px; display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #eee; object-fit: cover; }
        .feed { padding: 0 10px; }
        .post { background: var(--white); border-radius: 12px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .post-img { width: 100%; display: block; }
        .post-content { padding: 12px; font-size: 14px; }

        /* PORTAIL INVESTISSEUR */
        .invest-view { display: none; padding: 20px; }
        .stats-card { background: linear-gradient(135deg, #1c1e21, #444); color: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
        .gold-text { color: var(--gold); font-weight: 900; font-size: 24px; }
        .bunker-btn { width: 100%; background: #cc0000; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }

        /* NAVIGATION */
        .nav { position: fixed; bottom: 0; width: 100%; background: var(--white); display: flex; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-link { flex: 1; text-align: center; color: #65676b; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-link.active { color: var(--primary); }

        .view { display: none; }
        .active-view { display: block; }
        #postFile, #profileFile { display: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-text">S.E.G</div>
    <div class="search-bar"><input type="text" placeholder="Rechercher..."></div>
    <div style="font-size: 20px;">💬</div>
</div>

<!-- ACCUEIL -->
<div id="homeView" class="view active-view">
    <div class="categories">
        <div class="cat-btn">➕</div><div class="cat-btn">💎</div><div class="cat-btn">🔥</div><div class="cat-btn">🇨🇲</div>
    </div>
    <div class="publish-box">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="user-avatar" id="navAvatar">
        <label for="postFile" style="background:#f0f2f5; padding:10px; border-radius:20px; flex-grow:1; font-size:14px;">Quoi de neuf ?</label>
        <input type="file" id="postFile" accept="image/*" onchange="addPost(event)">
    </div>
    <div id="feedContainer" class="feed">
        <div class="post"><div class="post-content"><strong>Admin S.E.G</strong><br>Système prêt pour l'expansion.</div></div>
    </div>
</div>

<!-- INVESTISSEUR -->
<div id="investView" class="view">
    <div class="stats-card">
        <h3>💰 PORTAIL INVESTISSEUR</h3>
        <p>Valorisation de l'Empire :</p>
        <div class="gold-text">450 000 000 FCFA</div>
        <p><small>Statut : Croissance Exceptionnelle</small></p>
    </div>
    <div style="background:white; padding:15px; border-radius:10px; border-left: 5px solid var(--gold);">
        <h4>Projets en cours</h4>
        <ul>
            <li>Extraction zone Centre</li>
            <li>Infrastructures **auto global**</li>
        </ul>
    </div>
    <button class="bunker-btn" onclick="alert('ACCÈS RESTREINT : Activation du Bunker de sécurité...')">🚨 ACTIVER LE BUNKER DE SÉCURITÉ</button>
</div>

<!-- PROFIL -->
<div id="profileView" class="view">
    <div style="background:var(--primary); height:100px;"></div>
    <div style="padding:20px; text-align:center;">
        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="mainProfilePic" style="width:100px; height:100px; border-radius:50%; border:4px solid white; margin-top:-50px;">
        <h2>Stève</h2>
        <label for="profileFile" style="color:var(--primary); font-weight:bold; cursor:pointer;">Changer ma photo</label>
        <input type="file" id="profileFile" accept="image/*" onchange="updateProfilePic(event)">
    </div>
</div>

<div class="nav">
    <div class="nav-link active" onclick="switchTab('homeView', this)">🏠<br>FIL D'ACTU</div>
    <div class="nav-link" onclick="switchTab('marketView', this)">🏪<br>LE MARCHÉ</div>
    <div class="nav-link" style="color:var(--gold);" onclick="switchTab('investView', this)">💰<br>INVESTIR</div>
    <div class="nav-link" onclick="switchTab('profileView', this)">☰<br>MENU</div>
</div>

<script>
    function switchTab(id, el) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function addPost(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const post = document.createElement('div');
            post.className = 'post';
            post.innerHTML = `<img src="${reader.result}" class="post-img"><div class="post-content"><strong>CEO Stève</strong><br>Mise à jour stratégique.</div>`;
            document.getElementById('feedContainer').prepend(post);
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    function updateProfilePic(event) {
        const reader = new FileReader();
        reader.onload = function() {
            document.getElementById('mainProfilePic').src = reader.result;
            document.getElementById('navAvatar').src = reader.result;
        }
        reader.readAsDataURL(event.target.files[0]);
    }
</script>
</body>
</html>
