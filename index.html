<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUTO GLOBAL | S.E.G</title>
    <style>
        :root {
            --primary-blue: #1877F2;
            --gold: #D4AF37;
            --dark-bg: #0b0c0e;
            --card-bg: #1c1e21;
            --text-gray: #b0b3b8;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding-bottom: 90px; /* Espace pour la nav */
            overflow-x: hidden;
        }

        /* --- ÉCRAN D'AUTHENTIFICATION --- */
        #authScreen {
            position: fixed; inset: 0; background: var(--dark-bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }
        .auth-logo { font-size: 32px; font-weight: 900; color: var(--primary-blue); margin-bottom: 40px; letter-spacing: 2px; }
        .auth-container { width: 100%; max-width: 400px; }
        .auth-input { 
            width: 100%; background: #242526; border: 1px solid #3e4042; padding: 18px; 
            border-radius: 15px; color: white; margin-bottom: 15px; font-size: 16px;
        }
        .auth-btn { 
            width: 100%; background: var(--primary-blue); border: none; padding: 18px; 
            border-radius: 15px; color: white; font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* --- HEADER --- */
        .header {
            padding: 20px; display: flex; align-items: center; gap: 15px;
            background: rgba(11, 12, 14, 0.9); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-text { color: var(--primary-blue); font-weight: 900; font-size: 24px; letter-spacing: 1px; }
        .search-bar {
            flex-grow: 1; background: #242526; border-radius: 25px; padding: 10px 20px;
            color: var(--text-gray); font-size: 14px; border: none;
        }

        /* --- CONTENU --- */
        .container { padding: 15px; }
        .view { display: none; opacity: 0; transform: translateY(20px); transition: all 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .view.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- CARDS (Style image_173.png) --- */
        .card {
            background: var(--card-bg); border-radius: 28px; padding: 25px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card-title { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 18px; margin-bottom: 20px; text-transform: uppercase; }
        .label { color: var(--text-gray); font-size: 14px; margin-bottom: 10px; }
        .big-value { color: var(--gold); font-size: 32px; font-weight: 900; margin: 15px 0; letter-spacing: -1px; }
        
        /* Bar Chart */
        .chart { display: flex; align-items: flex-end; gap: 8px; height: 60px; margin-top: 20px; }
        .bar { width: 100%; border-radius: 6px; background: var(--primary-blue); }
        .bar.highlight { background: var(--gold); }

        /* Inputs & Buttons */
        .main-input {
            width: 100%; background: #121315; border: 1px solid #303236; padding: 20px;
            border-radius: 18px; color: white; font-size: 16px; margin-bottom: 20px;
        }
        .action-btn {
            width: 100%; background: var(--primary-blue); color: white; border: none;
            padding: 20px; border-radius: 20px; font-weight: 800; font-size: 16px;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #000;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #1c1e21; z-index: 5000;
        }
        .nav-item { text-align: center; color: #4e4f52; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .nav-item.active { color: var(--primary-blue); }
        .nav-icon { font-size: 20px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
    <div class="auth-logo">AUTO GLOBAL</div>
    <div class="auth-container">
        <input type="text" id="uName" class="auth-input" placeholder="Nom d'utilisateur">
        <input type="password" class="auth-input" placeholder="Code d'accès sécurisé">
        <button class="auth-btn" onclick="login()">DÉPLOYER L'EMPIRE</button>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <div class="logo-text">S.E.G</div>
    <input type="text" class="search-bar" placeholder="Rechercher...">
</div>

<div class="container">
    <!-- VIEW: TABLEAU -->
    <div id="tab1" class="view active">
        <div class="card">
            <div class="card-title">📊 ANALYSE LIVE</div>
            <div class="label">Valeur estimée :</div>
            <div class="big-value" id="totalWealth">450 023 573 FCFA</div>
            <div class="chart">
                <div class="bar" style="height: 30%;"></div>
                <div class="bar" style="height: 65%;"></div>
                <div class="bar" style="height: 40%;"></div>
                <div class="bar highlight" style="height: 95%;"></div>
            </div>
            <p style="font-size: 10px; color: #00ff88; margin-top: 15px;">● Statut : Serveurs Opérationnels</p>
        </div>
    </div>

    <!-- VIEW: INVESTIR -->
    <div id="tab2" class="view">
        <div class="card">
            <div class="card-title">💰 SIMULATEUR DE PROFITS</div>
            <input type="number" id="investInput" class="main-input" placeholder="Montant à investir">
            <button class="action-btn" onclick="runSimulation()">Calculer rendement</button>
            <div id="resultBox" style="display:none; margin-top: 25px; text-align: center;">
                <div class="label">Profit estimé :</div>
                <div class="big-value" id="profitResult" style="color:var(--primary-blue); font-size: 26px;">0 FCFA</div>
            </div>
        </div>
    </div>
</div>

<!-- NAVIGATION -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('tab1', this)">
        <span class="nav-icon">🏠</span> TABLEAU
    </div>
    <div class="nav-item" onclick="switchTab('tab2', this)">
        <span class="nav-icon">💰</span> INVESTIR
    </div>
    <div class="nav-item">
        <span class="nav-icon">🌍</span> MARCHÉ
    </div>
    <div class="nav-item">
        <span class="nav-icon">☰</span> MENU
    </div>
</div>

<script>
    function login() {
        const name = document.getElementById('uName').value;
        if(name.length > 2) {
            document.getElementById('authScreen').style.transition = '0.5s';
            document.getElementById('authScreen').style.opacity = '0';
            setTimeout(() => document.getElementById('authScreen').style.display = 'none', 500);
        }
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        const target = document.getElementById(tabId);
        target.classList.add('active');
        el.classList.add('active');
    }

    function runSimulation() {
        const val = document.getElementById('investInput').value;
        if(val > 0) {
            const profit = Math.floor(val * 1.15);
            document.getElementById('profitResult').innerText = profit.toLocaleString() + " FCFA";
            document.getElementById('resultBox').style.display = 'block';
        }
    }
</script>

</body>
</html>
