<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Vision</title>
    <style>
        /* 1. SUPPRESSION DU NOIR ET MISE EN PLACE DU CIEL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background: linear-gradient(to bottom, #1e90ff 0%, #87ceeb 50%, #ffffff 100%);
        }

        /* 2. LE SOLEIL DANS L'ANGLE (Éclaire l'appli) */
        .sun {
            position: absolute;
            top: -30px;
            right: -30px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #fff700 20%, rgba(255,247,0,0.4) 60%, transparent 80%);
            border-radius: 50%;
            z-index: 1;
            box-shadow: 0 0 50px rgba(255, 247, 0, 0.5);
        }

        /* 3. NUAGES RÉALISTES (Statiques pour commencer) */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            width: 150px;
            height: 50px;
            border-radius: 50px;
            z-index: 2;
            filter: blur(5px);
        }
        .cloud::after { content: ''; position: absolute; background: white; width: 70px; height: 70px; border-radius: 50%; top: -30px; left: 20px; }
        .cloud::before { content: ''; position: absolute; background: white; width: 50px; height: 50px; border-radius: 50%; top: -20px; left: 70px; }
        
        .n1 { top: 15%; left: 10%; transform: scale(0.8); }
        .n2 { top: 25%; right: 15%; transform: scale(1.2); opacity: 0.7; }

        /* 4. ÉTOILES FILANTES */
        .star {
            position: absolute;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, white, transparent);
            animation: move-star 5s infinite;
            opacity: 0;
            z-index: 1;
        }
        @keyframes move-star {
            0% { transform: translateX(-100px) translateY(0) rotate(25deg); opacity: 1; }
            20% { transform: translateX(100vw) translateY(40vh) rotate(25deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* 5. INTERFACE ET BOUTONS (Z-INDEX 100 POUR ÊTRE SÛR QUE ÇA MARCHE) */
        .container {
            position: relative;
            z-index: 100; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .logo-title {
            color: #ffff00; /* Éclairage Jaune */
            text-shadow: 0 0 20px rgba(255, 247, 0, 0.9);
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
        }

        .main-button {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid #ffffff;
            color: white;
            padding: 18px 45px;
            border-radius: 15px;
            font-size: 1.1rem;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            margin: 10px;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .main-button:active {
            transform: scale(0.9);
            background: #ffff00;
            color: #1e90ff;
        }
    </style>
</head>
<body>

    <div class="sun"></div>
    <div class="cloud n1"></div>
    <div class="cloud n2"></div>
    <div class="star"></div>

    <div class="container">
        <h1 class="logo-title">S.E.G GLOBAL</h1>
        
        <button class="main-button" onclick="alert('Lien généré !')">GÉNÉRER MON LIEN</button>
        <button class="main-button" onclick="alert('Action 2')">BOUTON ACTIF</button>
    </div>

</body>
</html>
