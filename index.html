<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KIRAVEL">
    <link rel="apple-touch-icon" href="https://i.ibb.co/VWV3X9Y/kiravel-logo.png">
    
    <meta name="description" content="KIRAVEL - La plateforme internationale de revente de luxe avec messagerie ultra-sécurisée par l'Ouvrier IA.">
    <meta name="author" content="S.E.G GLOBAL IA">

    <title>KIRAVEL - L'Empire du Luxe</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           STYLE GENERAL NOIR & OR (EMPIRE DESIGN)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        .empire-header {
            text-align: center;
            padding: 20px 10px;
            background: linear-gradient(180deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .empire-header h1 {
            color: #D4AF37;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .objectif-badge {
            color: #00E5FF;
            font-size: 11px;
            margin-top: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .app-screen {
            display: none; 
            animation: fadeIn 0.3s ease forwards;
            padding: 20px;
        }

        .app-screen.active-screen {
            display: block; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            color: #D4AF37;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* ==========================================================================
           CARTES DE PRODUITS
           ========================================================================== */
        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .product-header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .product-badge {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid #00E5FF;
            color: #00E5FF;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .btn-chat-trigger {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .product-image-placeholder {
            width: 100%;
            height: 200px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(212, 175, 55, 0.2);
            border: 1px dashed rgba(212, 175, 55, 0.2);
        }

        .product-info {
            margin-top: 12px;
        }

        .product-info h3 { font-size: 18px; }
        .price { color: #00E5FF; font-size: 16px; font-weight: bold; margin-top: 4px; }

        /* ==========================================================================
           MESSAGERIE INTERNE & SÉCURITÉ IA
           ========================================================================== */
        .chat-container {
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            height: 55vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .chat-header {
            background: rgba(212, 175, 55, 0.1);
            padding: 14px;
            font-size: 13px;
            color: #D4AF37;
            font-weight: bold;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .ia-shield-status {
            color: #00FF66;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.4;
            animation: popMessage 0.2s ease forwards;
        }

        @keyframes popMessage {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .msg.vendeur {
            background: rgba(255, 255, 255, 0.07);
            color: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .msg.acheteur {
            background: linear-gradient(90deg, #AA7C11 0%, #D4AF37 100%);
            color: #000000;
            align-self: flex-end;
            font-weight: bold;
            border-bottom-right-radius: 2px;
        }

        /* Message d'interception de l'Ouvrier IA */
        .msg.system-ia {
            background: rgba(255, 51, 51, 0.15);
            border: 1px dashed #FF3333;
            color: #FF8888;
            align-self: center;
            max-width: 95%;
            text-align: center;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .msg.system-ia i {
            color: #FF3333;
            margin-right: 5px;
        }

        .chat-input-area {
            display: flex;
            padding: 12px;
            background: #000000;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 12px 16px;
            border-radius: 25px;
            color: #ffffff;
            outline: none;
            font-size: 14px;
        }

        .chat-input-area input:focus {
            border-color: #D4AF37;
        }

        .btn-send-msg {
            background: #D4AF37;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: #000000;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        .btn-send-msg:active { transform: scale(0.9); }

        /* ==========================================================================
           BARRE DE NAVIGATION FIXE
           ========================================================================== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(5, 5, 5, 0.95);
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #555555;
            font-size: 10px;
            gap: 4px;
            cursor: pointer;
        }

        .nav-item i { font-size: 18px; }
        .nav-item.active { color: #D4AF37; }
    </style>
</head>
<body>

    <header class="empire-header">
        <h1>KIRAVEL</h1>
        <div class="objectif-badge">OBJECTIF : 24,000,000,000 FCFA</div>
    </header>

    <main id="screen-accueil" class="app-screen active-screen">
        <h2 class="section-title">MARCHÉ DE LUXE</h2>
        
        <div class="product-card">
            <div class="product-header-box">
                <div class="product-badge"><i class="fa-solid fa-robot"></i> Filtré par l'Ouvrier IA</div>
                <button class="btn-chat-trigger" onclick="ouvrirMessagerie('Mpina Premium')">
                    <i class="fa-solid fa-comments"></i>
                </button>
            </div>
            <div class="product-image-placeholder">
                <i class="fa-solid fa-gem fa-4x"></i>
            </div>
            <div class="product-info">
                <h3>Mpina Premium</h3>
                <p class="price">20 000 FCFA</p>
            </div>
        </div>
    </main>

    <main id="screen-chat" class="app-screen">
        <h2 class="section-title">CHAT INTERNE SÉCURISÉ</h2>
        
        <div class="chat-container">
            <div class="chat-header">
                <span id="chat-target-title"><i class="fa-solid fa-comments"></i> Canal d'achat</span>
                <span class="ia-shield-status"><i class="fa-solid fa-shield-halved"></i> IA Active</span>
            </div>
            
            <div class="chat-messages" id="chat-box-messages">
                <div class="msg vendeur">Bonjour ! L'article est disponible. On valide la transaction ici sur l'application ?</div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="user-msg-input" placeholder="Écrivez votre message...">
                <button class="btn-send-msg" onclick="traiterMessageAcheteur()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" id="btn-nav-accueil" onclick="changerEcran('accueil')">
            <i class="fa-solid fa-house"></i>
            <span>Accueil</span>
        </div>
        <div class="nav-item" onclick="alert('Module IA Vente connecté au Cloud.')">
            <i class="fa-solid fa-bolt"></i>
            <span>IA Vente</span>
        </div>
    </nav>

    <script>
        function changerEcran(nomEcran) {
            document.getElementById('screen-accueil').classList.remove('active-screen');
            document.getElementById('screen-chat').classList.remove('active-screen');
            document.getElementById('btn-nav-accueil').classList.remove('active');

            if(nomEcran === 'accueil') {
                document.getElementById('screen-accueil').classList.add('active-screen');
                document.getElementById('btn-nav-accueil').classList.add('active');
            }
        }

        function ouvrirMessagerie(nomProduit) {
            document.getElementById('screen-accueil').classList.remove('active-screen');
            document.getElementById('screen-chat').classList.add('active-screen');
            document.getElementById('chat-target-title').innerHTML = `<i class="fa-solid fa-lock"></i> Négociation : ${nomProduit}`;
        }

        // ==========================================================================
        // LE MOTEUR ULTRA-ACTIF DE L'OUVRIER IA (SÉCURITÉ & RETENTION)
        // ==========================================================================
        function traiterMessageAcheteur() {
            const input = document.getElementById('user-msg-input');
            const txt = input.value.trim();
            if(!txt) return;

            const chatBox = document.getElementById('chat-box-messages');

            // 1. Détection des fraudes et tentatives de dérivation (WhatsApp, Numéros, etc.)
            const regexTelephone = /(\+?\d[\s\-\.]?){8,}/g; 
            const regexFuiteExterne = /whatsapp|wa\.me|téléphone|numéro|num|appeler|écris moi sur|contact/i;

            if (regexTelephone.test(txt) || regexFuiteExterne.test(txt)) {
                input.value = '';
                
                // L'Ouvrier IA intercepte et bloque directement le message dans le chat !
                const msgIa = document.createElement('div');
                msgIa.className = 'msg system-ia';
                msgIa.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> <strong>Alerte Ouvrier IA :</strong> Échange externe détecté. Pour sécuriser votre argent et vos commissions, les contacts en dehors de KIRAVEL sont bloqués.`;
                chatBox.appendChild(msgIa);
                chatBox.scrollTop = chatBox.scrollHeight;
                return; // Le message n'est JAMAIS envoyé au vendeur
            }

            // 2. Si le message est propre, on l'affiche normalement dans le chat interne
            const msgAcheteur = document.createElement('div');
            msgAcheteur.className = 'msg acheteur';
            msgAcheteur.textContent = txt;
            chatBox.appendChild(msgAcheteur);
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. Script Ultra-Actif de l'Ouvrier IA : Relance automatique après 1.5s
            setTimeout(() => {
                const msgRelanceIa = document.createElement('div');
                msgRelanceIa.className = 'msg vendeur';
                msgRelanceIa.innerHTML = `<i class="fa-solid fa-robot" style="color:#00E5FF"></i> <strong>Ouvrier IA :</strong> Le vendeur a bien reçu votre proposition. L'IA S.E.G prépare la sécurisation des fonds.`;
                chatBox.appendChild(msgRelanceIa);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1500);
        }

        // Écouteur pour la touche Entrée du clavier mobile
        document.getElementById('user-msg-input').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') traiterMessageAcheteur();
        });
    </script>
</body>
</html>
