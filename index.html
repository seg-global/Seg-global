<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Marketplace de Luxe</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #ffffff; color: #111; margin: 0; padding: 0; }
        .welcome-section { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 50vh; width: 100%; background: #fcfcfc; border-bottom: 2px solid #00ffff; }
        h1 { font-size: 2.2em; text-transform: uppercase; letter-spacing: 5px; color: #00cccc; text-shadow: 0 0 10px rgba(0, 255, 255, 0.3); }
        
        /* Grille des produits flottants */
        .shop-section { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 800px; }
        .product-card { background: #fff; border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-image { width: 70px; animation: float 4s ease-in-out infinite; filter: drop-shadow(0 0 5px #00ffff); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* NOUVELLE SECTION VENDEUR */
        .seller-space { width: 100%; background: #000; color: #fff; padding: 50px 20px; box-sizing: border-box; margin-top: 50px; border-top: 4px solid #00ffff; }
        .seller-container { max-width: 500px; margin: 0 auto; text-align: center; }
        .seller-title { color: #00ffff; text-transform: uppercase; letter-spacing: 2px; }
        .seller-form { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid #00ffff; margin-top: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #00ffff; background: #111; color: #fff; box-sizing: border-box; }
        .btn-seller { width: 100%; padding: 15px; background: #00ffff; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="welcome-section">
        <h1>S.E.G GLOBAL</h1>
        <p>L'EXCELLENCE À PORTÉE DE MAIN</p>
        <button style="padding:10px 20px; background:#00ffff; border:none; border-radius:5px; font-weight:bold;">EXPLORER</button>
    </div>

    <div class="shop-section">
        <h2 style="color:#00cccc">VITRINE DE LUXE</h2>
        <div class="product-grid">
            <div class="product-card"><img src="https://via.placeholder.com/70/fff/0ff?text=Montre" class="product-image"><p>MONTRE NÉON</p></div>
            <div class="product-card"><img src="https://via.placeholder.com/70/fff/0ff?text=Sac" class="product-image"><p>SAC CYBER</p></div>
        </div>
    </div>

    <div class="seller-space">
        <div class="seller-container">
            <h2 class="seller-title">Vous êtes Vendeur ?</h2>
            <p>Propulsez vos produits dans une nouvelle dimension.</p>
            
            <div class="seller-form">
                <p style="font-size:0.8em; color:#00ffff">REJOINDRE LA MARKETPLACE</p>
                <input type="text" placeholder="Nom de votre Boutique">
                <input type="tel" placeholder="Numéro WhatsApp (ex: +237...)">
                <select>
                    <option>Type de produits</option>
                    <option>Montres & Bijoux</option>
                    <option>Sacs & Maroquinerie</option>
                    <option>Chaussures de luxe</option>
                </select>
                <textarea placeholder="Décrivez vos articles en quelques mots..."></textarea>
                <button class="btn-seller" onclick="alert('Demande envoyée à Stève !')">POSTULER MAINTENANT</button>
            </div>
            <p style="font-size: 0.7em; margin-top: 20px; opacity: 0.5;">S.E.G GLOBAL - Système de vérification des vendeurs activé.</p>
        </div>
    </div>

</body>
</html>
