<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S.E.G GLOBAL | SYSTÈME AUTONOME</title>
    
    <!-- SDK FIREBASE (Mémoire & Puissance Google) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <style>
        :root { --main: #1877F2; --gold: #D4AF37; --bg: #000; --deploy: #ff3131; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; margin: 0; }

        /* VUE PUBLIQUE */
        #public-view { display: block; padding: 20px; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
        .viral-card { background: #111; border: 1px solid var(--main); border-radius: 20px; padding: 20px; margin-top: 30px; }
        .btn-share { background: var(--main); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; }

        /* LE NEXUS (TON ACCÈS) */
        #nexus-steve { display: none; padding: 20px; border: 5px solid var(--gold); min-height: 100vh; background: #050505; }
        .vault-card { background: #111; border-radius: 20px; padding: 25px; border: 1px solid var(--gold); text-align: center; margin-bottom: 20px; }
        .btn-deploy { background: var(--deploy); color: white; border: none; padding: 20px; width: 100%; border-radius: 15px; font-weight: 900; cursor: pointer; margin-top: 20px; }
        
        input, textarea { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="public-view">
    <div class="header">
        <div style="color:var(--main); font-weight:900;">S.E.G GLOBAL</div>
        <div onclick="authentification()" style="cursor:pointer; opacity:0.5;">☰</div>
    </div>
    
    <h1 id="live-title">CHARGEMENT...</h1>
    <div id="live-message" style="color:#888;">Connexion au réseau Auto Global...</div>

    <!-- STRATÉGIE DE CROISSANCE (VISIBLE PAR LES CLIENTS) -->
    <div class="viral-card">
        <h3>🚀 REJOIGNEZ L'EMPIRE</h3>
        <p style="font-size:14px; color:#aaa;">Partagez votre lien unique pour débloquer des accès exclusifs S.E.G.</p>
        <button class="btn-share" onclick="partagerLien()">🔗 COPIER MON LIEN D'INVITÉ</button>
    </div>
</div>

<div id="nexus-steve">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--gold)">PILOTAGE FONDATRICE</h2>
        <button onclick="location.reload()" style="background:none; border:none; color:white;">SORTIR</button>
    </div>

    <div class="vault-card">
        <div style="color:var(--gold); font-size:12px;">ACTIF SÉCURISÉ</div>
        <div style="font-size:32px; font-weight:900;">450 000 000 FCFA</div>
    </div>

    <div style="background:#111; padding:20px; border-radius:15px;">
        <label>Titre Mondial :</label>
        <input type="text" id="db-title">
        <br><br>
        <label>Message Mondial :</label>
        <textarea id="db-content"></textarea>
    </div>

    <button class="btn-deploy" onclick="deployer()">🚀 DÉPLOYER LA MISE À JOUR MONDIALE</button>
</div>

<script>
    // --- 1. CONFIGURATION (IMAGE 180) ---
    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpc...", // Remplace par ta clé complète
        authDomain: "seg-global.firebaseapp.com",
        databaseURL: "https://seg-global-default-rtdb.firebaseio.com",
        projectId: "seg-global",
        storageBucket: "seg-global.appspot.com",
        messagingSenderId: "880037527683",
        appId: "1:880037527683:web:..."
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- 2. LOGIQUE DE VIRALITÉ (STRATÉGIE MUSK) ---
    function partagerLien() {
        const idUnique = Math.random().toString(36).substring(7);
        const lien = window.location.href.split('?')[0] + "?ref=" + idUnique;
        navigator.clipboard.writeText(lien);
        alert("Lien de parrainage copié ! Partage-le pour faire exploser Auto Global.");
    }

    // Vérification automatique des parrainages à l'ouverture
    const urlParams = new URLSearchParams(window.location.search);
    const parrain = urlParams.get('ref');
    if(parrain) {
        db.ref('stats/visites_parrainage').transaction(v => (v || 0) + 1);
    }

    // --- 3. SYNCHRONISATION MONDIALE ---
    db.ref('app_state').on('value', (snap) => {
        const data = snap.val();
        if(data) {
            document.getElementById('live-title').innerText = data.titre;
            document.getElementById('live-message').innerText = data.message;
            document.getElementById('db-title').value = data.titre;
            document.getElementById('db-content').value = data.message;
        }
    });

    function deployer() {
        const t = document.getElementById('db-title').value;
        const m = document.getElementById('db-content').value;
        if(confirm("Lancer la mise à jour mondiale ?")) {
            db.ref('app_state').set({ titre: t, message: m, date: Date.now() });
        }
    }

    // --- 4. ACCÈS SÉCURISÉ ---
    function authentification() {
        let n = prompt("NOM DU FONDATEUR :");
        if(n && (n.toUpperCase().trim() === "STEVE" || n.toUpperCase().trim() === "STÈVE")) {
            document.getElementById('public-view').style.display = 'none';
            document.getElementById('nexus-steve').style.display = 'block';
        }
    }
</script>
</body>
</html>
