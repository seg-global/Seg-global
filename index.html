<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script>
  (function(){
      // REMPLACE CECI PAR TA CLÉ PUBLIQUE EMAILJS
      emailjs.init("user_xxxxxxxxxxxxxxxx"); 
  })();

  // L'ALGORITHME DE GÉNÉRATION
  let codeSecret = Math.floor(100000 + Math.random() * 900000);

  function envoyerLeCode() {
      const emailClient = document.getElementById('user-email').value;
      
      // Paramètres à envoyer à EmailJS
      let params = {
          to_email: emailClient,
          otp_code: codeSecret 
      };

      // REMPLACE 'service_xxx' et 'template_xxx' par tes vrais IDs
      emailjs.send('service_xxx', 'template_xxx', params)
          .then(function() {
              alert("Succès ! Code envoyé à " + emailClient);
              // Affiche la section pour entrer le code
              document.getElementById('otp-section').style.display = 'block';
          }, function(error) {
              alert("Échec de l'envoi... Erreur: " + JSON.stringify(error));
          });
  }
</script>
