<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL | EMPIRE INTÉGRÉ</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --bg: #000; --neon-blue: #00d4ff; --dark-grey: #111; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100%; }
        
        /* Design Futuriste */
        .dashboard-header { padding: 25px; text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); border-bottom: 2px solid var(--gold); }
        .logo-gold { font-size: 28px; letter-spacing: 5px; color: var(--gold); cursor: pointer; text-shadow: 0 0 15px rgba(212,175,55,0.4); }
        .target-text { font-size: 12px; color: var(--neon-blue); margin-top: 5px; text-transform: uppercase; }
        
        .container { max-width: 450px; margin: auto; padding: 20px; padding-bottom: 100px; }
        
        /* Formulaires & Inputs */
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; box-sizing: border-box; font-weight: bold; }
        .btn-gold { width: 100%; padding: 15px; background: linear-gradient(90deg, #af8f42, #dfbd69); color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--gold); }

        /* Poste de Commande Secret */
        #boss_dashboard { display: none; background: #050505; border: 2px solid var(--gold); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-card { background: #111; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #222; }

        /* Marché */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .item-card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 10px; text-align: center; border-bottom: 3px solid var(--gold); }
        .item-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 10px; }
        
        /* Barre de Progression Anti-0% */
        .progress-container { width: 100%; background: #222; border-radius: 10px; margin: 10px 0; height: 8px; overflow: hidden; display: none; }
        .progress-bar { width: 0%; height: 100%; background: var(--gold); transition: width 0.3s; }

        .page { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: #555; font-size: 10px; text-align: center; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div id="auth_section" class="container">
    <div class="logo-gold" style="margin-top:50px;">S.E.G GLOBAL</div>
    <p style="text-align:center; color:#888; font-size:10px;">INFRASTRUCTURE SÉCURISÉE</p>
    
    <div id="login_step1">
        <input type="email" id="email_input" placeholder="Email de votre iPhone">
        <button class="btn-gold" onclick="sendAccessCode()">Obtenir le Code d'Accès</button>
    </div>
    <div id="login_step2" style="display:none;">
        <input type="text" id="otp_input" placeholder="Code de sécurité">
        <button class="btn-gold" onclick="verifyAccessCode()">Ouvrir l'Empire</button>
    </div>
</div>

<div id="main_app" style="display:none;">
    <div class="dashboard-header">
        <h1 class="logo-gold" onclick="ouvrirPosteDeCommande()">S.E.G GLOBAL</h1>
        <div class="target-text">Objectif : 24,000,000,000 FCFA</div>
    </div>

    <div class="container">
        <div id="boss_dashboard">
            <h3 style="color:var(--gold); text-align:center; margin:0; font-size:14px;">COMMANDEMENT CENTRAL</h3>
            <div class="stats-grid">
                <div class="stat-card"><small>FLUX</small><br><b style="color:var(--neon-blue)">EN ATTENTE</b></div>
                <div class="stat-card"><small>IA OUVRIERS</small><br><b style="color:#25D366">ACTIFS</b></div>
            </div>
            <button class="btn-gold" style="font-size:10px;" onclick="alert('Optimisation IA lancée...')">Accélérer les flux</button>
        </div>

        <div id="home_page" class="page active">
            <h2 style="text-align:center; color:var(--gold); font-size:18px;">MARCHÉ DE L'EMPIRE</h2>
            <div class="market-grid" id="market_feed"></div>
        </div>

        <div id="seller_page" class="page">
            <h2 style="color:var(--gold); text-align:center;">Vendre un Article</h2>
            <input type="text" id="prod_name" placeholder="Nom du produit">
            <input type="number" id="prod_price" placeholder="Prix (FCFA)">
            <input type="file" id="prod_img" accept="image/*" onchange="previewImage(event)">
            
            <div class="progress-container" id="prog_cont">
                <div id="progressBar" class="progress-bar"></div>
            </div>
            <p id="statusText" style="font-size:10px; text-align:center; color:#888;"></p>
            
            <button class="btn-gold" id="pub_btn" onclick="publishProduct()">PUBLIER AVEC IA</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showPage('home_page', this)">🏠<br>MARCHÉ</div>
        <div class="nav-item" onclick="showPage('seller_page', this)">🛒<br>VENDRE</div>
        <div class="nav-item" onclick="logout()">🚪<br>QUITTER</div>
    </nav>
</div>

<script>
    // --- INITIALISATION ---
    (function() { emailjs.init("QGnoNmpH78_GuSLf4"); })();
    
    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpcD_vS9hH5f8Q2L-Y0X0kE0",
        authDomain: "seg-global.firebaseapp.com",
        projectId: "seg-global",
        storageBucket: "seg-global.appspot.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let correctOTP = "";
    let selectedFile;

    // --- SÉCURITÉ & AUTH ---
    function sendAccessCode() {
        const email = document.getElementById('email_input').value;
        if(!email) return alert("Email requis");
        correctOTP = Math.floor(100000 + Math.random() * 900000).toString();
        emailjs.send("service_ocg86ge", "template_v7i6m5m", { to_email: email, otp_code: correctOTP })
        .then(() => {
            document.getElementById('login_step1').style.display = 'none';
            document.getElementById('login_step2').style.display = 'block';
        });
    }

    function verifyAccessCode() {
        if(document.getElementById('otp_input').value === correctOTP) {
            localStorage.setItem("seg_session", "active");
            startApp();
        } else { alert("Code de sécurité invalide."); }
    }

    function startApp() {
        document.getElementById('auth_section').style.display = 'none';
        document.getElementById('main_app').style.display = 'block';
        loadProducts();
    }

    // --- GESTION PATRON ---
    window.ouvrirPosteDeCommande = function() {
        const p = prompt("IDENTIFIANT FONDATEUR :");
        if(p === "237_STEVE_BOSS") {
            document.getElementById('boss_dashboard').style.display = 'block';
            alert("Bienvenue, Steve. Système prêt.");
        }
    }

    // --- VENTE & IA ---
    function previewImage(e) { selectedFile = e.target.files[0]; }

    async function publishProduct() {
        const name = document.getElementById('prod_name').value;
        const price = document.getElementById('prod_price').value;
        const btn = document.getElementById('pub_btn');
        const progCont = document.getElementById('prog_cont');

        if(!name || !price || !selectedFile) return alert("Infos manquantes !");
        
        btn.disabled = true;
        progCont.style.display = "block";
        document.getElementById('statusText').innerText = "IA : Classification SEO en cours...";

        // Simulation SEO IA
        document.title = name + " | S.E.G GLOBAL";

        const storageRef = storage.ref('produits_seg/' + Date.now() + "_" + selectedFile.name);
        const uploadTask = storageRef.put(selectedFile);

        uploadTask.on('state_changed', 
            (snap) => {
                const p = (snap.bytesTransferred / snap.totalBytes) * 100;
                document.getElementById('progressBar').style.width = p + "%";
                document.getElementById('statusText').innerText = "ENVOI SÉCURISÉ : " + Math.round(p) + "%";
            },
            (err) => { alert("Erreur Storage : Activez le Mode Test !"); },
            async () => {
                const url = await uploadTask.snapshot.ref.getDownloadURL();
                await db.collection("produits").add({
                    nom: name, prix: parseFloat(price), image: url, date: new Date()
                });
                alert("🚀 ARTICLE DÉPLOYÉ DANS L'EMPIRE !");
                location.reload();
            }
        );
    }

    function loadProducts() {
        const feed = document.getElementById('market_feed');
        db.collection("produits").orderBy("date", "desc").onSnapshot(snap => {
            feed.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                feed.innerHTML += `
                    <div class="item-card">
                        <img src="${p.image}">
                        <div style="margin-top:10px;"><b>${p.nom}</b></div>
                        <div style="color:var(--gold); font-size:12px;">${p.prix.toLocaleString()} FCFA</div>
                        <button class="btn-gold" style="padding:5px; font-size:10px; margin-top:5px;">ACHETER</button>
                    </div>`;
            });
        });
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function logout() { localStorage.removeItem("seg_session"); location.reload(); }
    if(localStorage.getItem("seg_session") === "active") startApp();
</script>
</body>
</html>
