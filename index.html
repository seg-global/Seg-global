<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Direction & Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f4f7f6; color: #1a1a1a; padding-bottom: 50px; }

        /* HEADER PRESTIGE */
        .main-header { background-color: #232F3E; padding: 20px; text-align: center; color: white; position: sticky; top: 0; z-index: 100; }
        .logo { color: #19C9D1; font-size: 26px; font-weight: bold; letter-spacing: 2px; }

        /* SECTION ACCUEIL (DIRECTEUR GÉNÉRAL) */
        .ceo-section { padding: 15px; }
        .ceo-card {
            background-image: url('https://i.ibb.co/tPhqzzV2/IMG-1506.jpg'); 
            height: 400px; background-size: cover; background-position: center;
            border-radius: 15px; display: flex; flex-direction: column; justify-content: flex-end;
            padding: 25px; color: white; position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .ceo-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
        .ceo-text { z-index: 2; }

        .action-btn { background: #19C9D1; color: white; border: none; padding: 18px; width: 100%; font-weight: bold; border-radius: 10px; cursor: pointer; margin: 15px 0; text-transform: uppercase; }

        /* DASHBOARD VENDEUR (CACHÉ AU DÉPART) */
        #vendor-dashboard { display: none; padding: 20px; animation: slideUp 0.5s ease; }
        .dashboard-box { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .stat-card { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #19C9D1; }
        
        .form-group { margin-top: 20px; text-align: left; }
        .form-group input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; }

        /* MODALE SCANNER */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="logo">S.E.G GLOBAL</div>
    </header>

    <main id="public-view">
        <section class="ceo-section">
            <div class="ceo-card">
                <div class="ceo-text">
                    <p style="color: #19C9D1; font-weight: bold;">VISION DU DIRECTEUR GÉNÉRAL</p>
                    <h1 style="font-size: 22px;">L'EMPIRE DU LUXE MONDIAL</h1>
                </div>
            </div>
            <button class="action-btn" onclick="openScanner()">Devenir Vendeur Mondial</button>
        </section>
    </main>

    <div id="vendor-dashboard">
        <div class="dashboard-box">
            <h2 id="welcome-name" style="color: #232F3E;">Espace Boutique 👋</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Gestionnaire de ventes S.E.G Global</p>

            <div class="stat-card">
                <p style="font-size: 12px; color: #888;">SOLDE DISPONIBLE (APRÈS 10% S.E.G)</p>
                <h3 id="vendor-balance" style="font-size: 24px; color: #19C9D1;">0 FCFA</h3>
            </div>

            <div class="form-group">
                <label style="font-weight: bold; font-size: 14px;">Ajouter un nouvel article de luxe :</label>
                <input type="text" id="newProdName" placeholder="Nom du produit (ex: Diamant...)">
                <input type="number" id="newProdPrice" placeholder="Prix de vente en FCFA">
                <button class="action-btn" style="background: #232F3E; margin-top: 10px;" onclick="addProduct()">PUBLIER SUR L'EMPIRE</button>
            </div>

            <button onclick="location.reload()" style="margin-top: 30px; width: 100%; padding: 12px; border: none; background: #CC0C39; color: white; border-radius: 8px; font-weight: bold; cursor: pointer;">DÉCONNEXION</button>
        </div>
    </div>

    <div id="scannerModal" class="modal">
        <div class="modal-box">
            <h2 id="scan-status">🔒 PORTAIL SÉCURISÉ</h2>
            <div id="scan-loader" style="margin: 20px 0; font-size: 14px; color: #666;">
                Veuillez entrer vos informations pour le scan S.E.G.
            </div>
            <input type="text" id="storeNameInput" placeholder="Nom de votre entité" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="action-btn" id="startBtn" onclick="runGlobalScan()">ACTIVER LE SCANNER</button>
            <p onclick="closeScanner()" style="color:red; cursor:pointer; font-weight:bold; margin-top:10px;">ANNULER</p>
        </div>
    </div>

    <script>
        function openScanner() { document.getElementById('scannerModal').style.display = 'flex'; }
        function closeScanner() { document.getElementById('scannerModal').style.display = 'none'; }

        function runGlobalScan() {
            const name = document.getElementById('storeNameInput').value;
            if (name.length < 3) { alert("Nom trop court pour la sécurité S.E.G"); return; }

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('scan-status').innerText = "🔎 SCAN EN COURS...";
            
            // Simulation du scan de sécurité
            setTimeout(() => {
                alert("✅ ACCÈS AUTORISÉ par le Directeur Général.\nIdentité vérifiée à 100%.");
                closeScanner();
                
                // Switch vers le Dashboard
                document.getElementById('public-view').style.display = 'none';
                document.getElementById('vendor-dashboard').style.display = 'block';
                document.getElementById('welcome-name').innerText = "Boutique " + name + " 👋";
            }, 2000);
        }

        function addProduct() {
            const pName = document.getElementById('newProdName').value;
            const pPrice = document.getElementById('newProdPrice').value;

            if (pName && pPrice) {
                const commission = pPrice * 0.10;
                const gainVendeur = pPrice - commission;
                
                alert(`📦 Produit "${pName}" publié !\n\nAnalyse financière :\n- Prix client : ${parseInt(pPrice).toLocaleString()} FCFA\n- Commission S.E.G (10%) : ${commission.toLocaleString()} FCFA\n- Votre gain net : ${gainVendeur.toLocaleString()} FCFA`);
                
                // Mise à jour du solde sur le dashboard
                document.getElementById('vendor-balance').innerText = gainVendeur.toLocaleString() + " FCFA";
            } else {
                alert("Veuillez remplir tous les champs.");
            }
        }
    </script>
</body>
</html>
