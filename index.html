<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Authentification de Luxe</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { background-color: #000; color: #D4AF37; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .container { border: 2px solid #D4AF37; padding: 30px; border-radius: 15px; background: linear-gradient(145deg, #0f0f0f, #000); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); width: 90%; max-width: 400px; }
        h1 { font-size: 24px; letter-spacing: 3px; margin-bottom: 5px; }
        p.subtitle { font-size: 10px; text-transform: uppercase; margin-bottom: 30px; color: #aaa; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 12px; background-color: #D4AF37; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .message { margin-top: 15px; font-size: 14px; display: none; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
        #product_interface { display: none; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .product-card { border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth_section">
        <h1>S.E.G GLOBAL</h1>
        <p class="subtitle">Authentification de Luxe</p>
        <div id="step1">
            <input type="email" id="user_email" placeholder="Entrez votre e-mail" required>
            <button onclick="sendOTP()">Obtenir mon code d'accès</button>
        </div>
        <div id="step2" style="display: none;">
            <p>Code envoyé à votre iPhone.</p>
            <input type="text" id="user_otp" placeholder="Entrez le code reçu">
            <button onclick="verifyOTP()">Valider l'accès</button>
        </div>
    </div>

    <div id="product_interface">
        <h1>S.E.G GLOBAL</h1>
        <p class="subtitle">Catalogue des Diamants</p>
        <div class="product-grid">
            <div class="product-card">💎 Diamant Brut<br>1.5 Carats</div>
            <div class="product-card">💎 Diamant Pur<br>0.8 Carats</div>
        </div>
        <button style="margin-top: 20px;" onclick="location.reload()">Déconnexion</button>
    </div>
    <div id="status_msg" class="message"></div>
</div>

<script>
    (function() {
        // --- ACTION REQUISE ICI ---
        // Remplace le texte ci-dessous par ta Public Key (onglet Account dans EmailJS)
        emailjs.init("TA_CLE_PUBLIQUE_ICI"); 
    })();

    let generatedOTP = "";

    function sendOTP() {
        const email = document.getElementById("user_email").value;
        const msg = document.getElementById("status_msg");
        if(!email) { alert("Entrez votre mail"); return; }

        generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
        const params = { to_email: email, otp_code: generatedOTP };

        msg.style.display = "block";
        msg.innerHTML = "Envoi du code...";

        emailjs.send("service_ocg86ge", "template_v7i6m5m", params)
            .then(function() {
                msg.innerHTML = "CODE ENVOYÉ ! Vérifiez votre iPhone.";
                msg.className = "message success";
                document.getElementById("step1").style.display = "none";
                document.getElementById("step2").style.display = "block";
            }, function(error) {
                msg.innerHTML = "ERREUR D'ENVOI. Vérifie ta Public Key.";
                msg.className = "message error";
            });
    }

    function verifyOTP() {
        if(document.getElementById("user_otp").value === generatedOTP) {
            document.getElementById("auth_section").style.display = "none";
            document.getElementById("status_msg").style.display = "none";
            document.getElementById("product_interface").style.display = "block";
        } else {
            alert("Code incorrect.");
        }
    }
</script>
</body>
</html>
