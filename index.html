<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Système Intégré</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>

    <style>
        :root { --gold: #D4AF37; --bg: #000; --glass: rgba(255, 255, 255, 0.05); }
        body { background-color: var(--bg); color: var(--gold); font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
        .container { border: 2px solid var(--gold); padding: 30px; border-radius: 15px; background: linear-gradient(145deg, #0f0f0f, #000); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); width: 90%; max-width: 400px; }
        
        h1 { font-size: 24px; letter-spacing: 3px; margin-bottom: 5px; color: var(--gold); }
        p.subtitle { font-size: 10px; text-transform: uppercase; margin-bottom: 30px; color: #aaa; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 14px; background-color: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #fff; box-shadow: 0 0 15px #fff; }

        .message { margin-top: 15px; font-size: 14px; display: none; padding: 10px; border-radius: 5px; }
        .success { color: #2ecc71; background: rgba(46, 204, 113, 0.1); }
        .error { color: #e74c3c; background: rgba(231, 76, 60, 0.1); }

        #product_interface { display: none; width: 100%; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .product-card { border: 1px solid #444; padding: 15px; border-radius: 8px; font-size: 12px; background: var(--glass); }
    </style>
</head>
<body>

<div class="container">
    <div id="auth_section">
        <h1>S.E.G GLOBAL</h1>
        <p class="subtitle">Sécurisation Empire v2.0</p>
        
        <div id="step1">
            <input type="email" id="user_email" placeholder="E-mail de l'iPhone" required>
            <button onclick="sendOTP()">Obtenir mon code d'accès</button>
        </div>

        <div id="step2" style="display: none;">
            <p style="font-size: 12px; color: #fff;">Vérifiez vos emails...</p>
            <input type="text" id="user_otp" placeholder="Entrez le code reçu">
            <button onclick="verifyOTP()">Valider l'accès</button>
        </div>
    </div>

    <div id="product_interface">
        <h1>S.E.G GLOBAL</h1>
        <p class="subtitle">Espace Membre Officiel</p>
        <div class="product-grid">
            <div class="product-card">💎 Diamant Brut<br>Disponible</div>
            <div class="product-card">🏢 Gestion<br>Ma Boutique</div>
        </div>
        <button style="margin-top: 30px; background-color: #444; color: white;" onclick="logout()">Déconnexion</button>
    </div>

    <div id="status_msg" class="message"></div>
</div>

<script>
    // 1. CONFIGURATION FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAMX8SfBySnpcD_vS9hH5f8Q2L-Y0X0kE0", 
        authDomain: "seg-global.firebaseapp.com",
        projectId: "seg-global",
        storageBucket: "seg-global.appspot.com",
        messagingSenderId: "880037527683",
        appId: "1:880037527683:web:0f0b38d469714f808c96bb"
    };
    firebase.initializeApp(firebaseConfig);

    // 2. CONFIGURATION EMAILJS
    (function() {
        emailjs.init("QGnoNmpH78_GuSLf4"); // Ta clé corrigée
    })();

    let generatedOTP = "";

    // Vérifier si déjà connecté
    window.onload = function() {
        if (localStorage.getItem("seg_active") === "true") {
            showProducts();
        }
    };

    function sendOTP() {
        const email = document.getElementById("user_email").value;
        const msg = document.getElementById("status_msg");
        if(!email) { alert("Entrez votre mail"); return; }

        generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
        const params = { to_email: email, otp_code: generatedOTP };

        msg.style.display = "block";
        msg.innerHTML = "Lancement de la procédure...";
        msg.className = "message";

        emailjs.send("service_ocg86ge", "template_v7i6m5m", params)
            .then(function() {
                msg.innerHTML = "CODE ENVOYÉ ! Regardez votre iPhone.";
                msg.className = "message success";
                document.getElementById("step1").style.display = "none";
                document.getElementById("step2").style.display = "block";
            }, function(error) {
                console.log("Erreur:", error);
                msg.innerHTML = "ERREUR D'ENVOI. Vérifiez votre Public Key.";
                msg.className = "message error";
            });
    }

    function verifyOTP() {
        const val = document.getElementById("user_otp").value;
        if(val === generatedOTP) {
            localStorage.setItem("seg_active", "true");
            showProducts();
        } else {
            alert("Code invalide.");
        }
    }

    function showProducts() {
        document.getElementById("auth_section").style.display = "none";
        document.getElementById("status_msg").style.display = "none";
        document.getElementById("product_interface").style.display = "block";
    }

    function logout() {
        localStorage.removeItem("seg_active");
        location.reload();
    }
</script>

</body>
</html>
