<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AUTO GLOBAL | SYSTÈME INTÉGRÉ</title>
    <style>
        :root { --main: #1877F2; --gold: #D4AF37; --bg: #080808; --card: #18191a; --shield: #00ff88; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 90px; overflow-x: hidden; }

        /* ÉCRAN 1 : LE BOUCLIER (VÉRIFICATION IA) */
        #shieldOverlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .camera-ring { width: 220px; height: 220px; border: 3px solid var(--main); border-radius: 50%; position: relative; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--main); top: 0; animation: scan 2s linear infinite; }

        /* HEADER & SEARCH */
        .top-nav { position: sticky; top: 0; background: rgba(8,8,8,0.9); backdrop-filter: blur(15px); padding: 15px; z-index: 1000; border-bottom: 1px solid #222; }
        .search-box { background: #242526; border-radius: 12px; padding: 10px 15px; margin-top: 10px; display: flex; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; outline: none; }

        /* CONTENU & VUES */
        .view { display: none; padding: 15px; animation: slideUp 0.4s ease; }
        .view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* CARTES DE L'EMPIRE */
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #2d2e2f; }
        .big-sum { color: var(--gold); font-size: 28px; font-weight: 900; margin: 10px 0; display: block; }
        .btn-empire { background: var(--main); color: white; border: none; width: 100%; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-empire:active { transform: scale(0.97); }

        /* NAVIGATION BASSE */
        .bottom-tabs { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; padding: 15px 0; border-top: 1px solid #222; z-index: 5000; }
        .tab { flex: 1; text-align: center; font-size: 10px; color: #555; font-weight: bold; cursor: pointer; }
        .tab.active { color: var(--main); }

        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<!-- PROTECTION IA -->
<div id="shieldOverlay">
    <div class="camera-ring">
        <div class="scan-line"></div>
        👤
    </div>
    <h3 style="color:var(--main)">SÉCURITÉ BIOMÉTRIQUE</h3>
    <p style="color:#888; font-size:13px;">Vérification Auto Global en cours...</p>
    <button class="btn-empire" style="width:70%;" onclick="unlock()">DÉVERROUILLER</button>
</div>

<!-- HEADER -->
<div class="top-nav">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:900; font-size:24px; color:var(--main);">S.E.G</span>
        <span id="userGreet" style="font-size:12px; font-weight:bold; color:var(--gold);">STÈVE (CEO)</span>
    </div>
    <div class="search-box">
        <input type="text" placeholder="Rechercher des pierres sur Mars...">
    </div>
</div>

<!-- VUE 1 : TABLEAU DE BORD -->
<div id="homeView" class="view active">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:12px; color:var(--shield);">● PROTECTION ACTIVE</span>
            <span style="font-size:20px;">🛡️</span>
        </div>
        <p style="color:#888; font-size:14px; margin-bottom:5px;">Trésorerie Totale :</p>
        <span class="big-sum">450 023 573 FCFA</span>
        <div style="height:40px; display:flex; align-items:flex-end; gap:5px; margin-top:15px;">
            <div style="height:30%; flex:1; background:var(--main); border-radius:3px;"></div>
            <div style="height:60%; flex:1; background:var(--main); border-radius:3px;"></div>
            <div style="height:45%; flex:1; background:var(--main); border-radius:3px;"></div>
            <div style="height:95%; flex:1; background:var(--gold); border-radius:3px;"></div>
        </div>
    </div>
</div>

<!-- VUE 2 : INVESTISSEMENT SÉCURISÉ -->
<div id="investView" class="view">
    <div class="card">
        <h3>💰 SÉQUESTRE SÉCURISÉ</h3>
        <p style="font-size:12px; color:#888;">L'argent est bloqué jusqu'à confirmation.</p>
        <input type="number" id="amt" style="width:100%; padding:15px; background:#121212; border:1px solid #333; color:white; border-radius:12px; margin-bottom:15px;" placeholder="Somme à sécuriser">
        <button class="btn-empire" onclick="calc()">Lancer la simulation</button>
        <p id="res" style="text-align:center; color:var(--shield); font-weight:bold; margin-top:15px; display:none;"></p>
    </div>
</div>

<!-- NAV -->
<div class="bottom-tabs">
    <div class="tab active" onclick="tab('homeView', this)">🏠<br>TABLEAU</div>
    <div class="tab" onclick="tab('investView', this)">💰<br>INVESTIR</div>
    <div class="tab">🌍<br>MARCHÉ</div>
    <div class="tab">☰<br>MENU</div>
</div>

<script>
    function unlock() {
        document.getElementById('shieldOverlay').style.opacity = '0';
        setTimeout(() => document.getElementById('shieldOverlay').style.display = 'none', 500);
    }

    function tab(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function calc() {
        let val = document.getElementById('amt').value;
        if(val) {
            document.getElementById('res').innerText = "Rendement Sécurisé : " + (val * 1.25).toLocaleString() + " FCFA";
            document.getElementById('res').style.display = 'block';
        }
    }
</script>
</body>
</html>
