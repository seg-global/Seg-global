<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL - Empire Mondial</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; color: #1a1a1a; }

        /* HEADER PRESTIGE */
        .main-header { background-color: #232F3E; padding: 20px; text-align: center; color: white; position: sticky; top: 0; z-index: 100; }
        .logo { color: #19C9D1; font-size: 28px; font-weight: bold; text-decoration: none; letter-spacing: 3px; }

        /* SECTION DIRECTEUR GÉNÉRAL */
        .ceo-section { padding: 20px; }
        .ceo-card {
            background-image: url('https://i.ibb.co/tPhqzzV2/IMG-1506.jpg'); 
            height: 450px; background-size: cover; background-position: center;
            border-radius: 15px; display: flex; flex-direction: column; justify-content: flex-end;
            padding: 25px; color: white; position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .ceo-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
        .ceo-text { z-index: 2; }

        /* BOUTON INSCRIPTION */
        .reg-btn {
            background: #19C9D1; color: white; border: none; padding: 18px; width: 100%;
            font-weight: bold; border-radius: 10px; cursor: pointer; margin: 20px 0;
            font-size: 16px; text-transform: uppercase;
        }

        /* FLUX DYNAMIQUE (VIDÉOS & ARTICLES) */
        .dynamic-feed { padding: 20px; background: white; border-radius: 20px 20px 0 0; margin-top: 10px; }
        .section-title { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        /* Scroll Vidéos */
        .video-container { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .video-box { 
            min-width: 140px; height: 230px; background: #000; border-radius: 12px; 
            position: relative; flex-shrink: 0; border: 2px solid #19C9D1;
        }
        .video-label { position: absolute; bottom: 10px; left: 10px; color: white; font-size: 11px; font-weight: bold; }

        /* Grille Articles */
        .article-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .article-card { background: #f9f9f9; border-radius: 12px; padding: 12px; border: 1px solid #eee; }
        .article-img-placeholder { height: 130px; background: #eee; border-radius: 8px; margin-bottom: 10px; }

        /* MODALE INSCRIPTION */
        #registerModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-box { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        .modal-box input, .modal-box select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }

        /* TRADUCTION */
        #google_translate_element { padding: 10px; text-align: center; background: #FEBD69; font-weight: bold; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <header class="main-header">
        <a href="#" class="logo">S.E.G GLOBAL</a>
    </header>

    <main>
        <section class="ceo-section">
            <div class="ceo-card">
                <div class="ceo-text">
                    <p style="color: #19C9D1; font-weight: bold; letter-spacing: 1px;">DIRECTEUR GÉNÉRAL</p>
                    <h1 style="font-size: 24px;">L'EXCELLENCE À PORTÉE DE MAIN</h1>
                </div>
            </div>
            
            <button class="reg-btn" onclick="toggleModal(true)">Rejoindre l'Empire (Vendeur / Architecte)</button>
        </section>

        <section class="dynamic-feed">
            <h2 class="section-title">🔥 EN DIRECT DES BOUTIQUES</h2>
            <div class="video-container">
                <div class="video-box"><span class="video-label">💎 Diamants Brut</span></div>
                <div class="video-box"><span class="video-label">🏛️ Archi-Luxe</span></div>
                <div class="video-box"><span class="video-label">⌚ S.E.G Watch</span></div>
                <div class="video-box"><span class="video-label">🚗 Supercars</span></div>
            </div>

            <h2 class="section-title" style="margin-top: 25px;">🛍️ DERNIÈRES NOUVEAUTÉS</h2>
            <div class="article-grid">
                <div class="article-card">
                    <div class="article-img-placeholder"></div>
                    <p style="font-weight: bold; font-size: 14px;">Collier Émeraude</p>
                    <p style="color: #19C9D1; font-size: 11px;">Par : Boutique Royale</p>
                </div>
                <div class="article-card">
                    <div class="article-img-placeholder"></div>
                    <p style="font-weight: bold; font-size: 14px;">Plan Villa Futur</p>
                    <p style="color: #19C9D1; font-size: 11px;">Par : Archi-Design</p>
                </div>
            </div>
        </section>
    </main>

    <div id="registerModal">
        <div class="modal-box">
            <h2 style="margin-bottom: 15px;">Créer votre Espace</h2>
            <select id="role">
                <option value="vendeur">Devenir Vendeur</option>
                <option value="architecte">Devenir Architecte</option>
            </select>
            <input type="text" placeholder="Nom de votre entité">
            <input type="email" placeholder="Email professionnel">
            <input type="password" placeholder="Mot de passe">
            <button class="reg-btn" style="margin-top: 10px;" onclick="finishReg()">CONFIRMER L'INSCRIPTION</button>
            <p onclick="toggleModal(false)" style="color: red; margin-top: 15px; cursor: pointer; font-weight: bold;">FERMER</p>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            document.getElementById('registerModal').style.display = show ? 'flex' : 'none';
        }
        function finishReg() {
            const role = document.getElementById('role').value;
            alert("Félicitations ! Votre espace " + role + " est en cours de création. Le Directeur Général valide votre accès.");
            toggleModal(false);
        }
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'fr'}, 'google_translate_element');
        }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
