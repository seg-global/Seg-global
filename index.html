<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.G GLOBAL IA - Accueil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           STYLE GÉNÉRAL & RESET
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            min-height: 100vh;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* ==========================================================================
           EN-TÊTE LUMINEUX (EMPIRE SYSTEM)
           ========================================================================== */
        .empire-header {
            text-align: center;
            padding: 20px 10px;
            background: linear-gradient(180deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .empire-header h1 {
            color: #D4AF37;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .objectif-badge {
            color: #00E5FF;
            font-size: 11px;
            margin-top: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* GESTION DES ÉCRANS */
        .app-screen {
            display: none; 
            animation: fadeIn 0.4s ease forwards;
            padding: 20px;
        }

        .app-screen.active-screen {
            display: block; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================================================
           ÉCRAN 1 : MARCHÉ DE LUXE (ACCUEIL)
           ========================================================================== */
        .section-title {
            color: #D4AF37;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 15px;
            padding: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            margin-bottom: 20px;
            position: relative;
            transition: transform 0.2s ease;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 229, 255, 0.15);
            border: 1px solid #00E5FF;
            color: #00E5FF;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
        }

        .product-image-placeholder {
            width: 100%;
            height: 220px;
            background: rgba(255, 255, 255, 0.01);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(212, 175, 55, 0.3);
            border: 1px dashed rgba(212, 175, 55, 0.2);
        }

        .product-info {
            margin-top: 15px;
        }

        .product-info h3 {
            font-size: 19px;
            color: #ffffff;
        }

        .price {
            color: #00E5FF;
            font-size: 17px;
            font-weight: bold;
            margin: 5px 0 12px 0;
        }

        .btn-buy {
            width: 100%;
            background: linear-gradient(90deg, #D4AF37 0%, #AA7C11 100%);
            border: none;
            padding: 14px;
            color: #000000;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        /* ==========================================================================
           ÉCRAN 2 : IA VENTE (FORMULAIRE DE DÉPLOIEMENT)
           ========================================================================== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #D4AF37;
            margin-bottom: 8px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 14px;
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            border-color: #00E5FF;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        .file-select-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            padding: 25px;
            text-align: center;
            position: relative;
            cursor: pointer;
        }

        .file-select-container input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-custom-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 8px;
            color: #D4AF37;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .file-name-text {
            display: block;
            font-size: 13px;
            color: #888888;
        }

        /* Statut d'envoi IA */
        .ia-status-box {
            text-align: center;
            margin: 25px 0;
        }

        .ia-percent {
            color: #00E5FF;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-deploy {
            width: 100%;
            background: linear-gradient(90deg, #AA7C11 0%, #D4AF37 50%, #AA7C11 100%);
            border: none;
            padding: 16px;
            color: #000000;
            font-weight: bold;
            border-radius: 10px;
            font-size: 15px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        /* ==========================================================================
           BARRES DE STATUT ET NAVIGATION (FIXES)
           ========================================================================== */
        .server-status {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #666666;
            margin: 20px 0 10px 0;
        }

        .status-dot.online {
            width: 6px;
            height: 6px;
            background-color: #00FF66;
            border-radius: 50%;
            box-shadow: 0 0 8px #00FF66;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(5, 5, 5, 0.95);
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(25px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666666;
            text-decoration: none;
            font-size: 10px;
            gap: 5px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item.active {
            color: #D4AF37;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <header class="empire-header">
        <h1>S.E.G GLOBAL IA</h1>
        <div class="objectif-badge">OBJECTIF : 24,000,000,000 FCFA</div>
    </header>

    <main id="screen-accueil" class="app-screen active-screen">
        <h2 class="section-title">MARCHÉ DE LUXE</h2>
        
        <div class="product-card">
            <div class="product-badge"><i class="fa-solid fa-sparkles"></i> Vérifié par l'Ouvrier IA</div>
            <div class="product-image-placeholder">
                <i class="fa-solid fa-gem fa-4x"></i>
            </div>
            <div class="product-info">
                <h3>Mpina Premium</h3>
                <p class="price">20 000 FCFA</p>
                <button class="btn-buy" onclick="acheterProduit('Mpina Premium')">Acheter Maintenant</button>
            </div>
        </div>
    </main>

    <main id="screen-vente" class="app-screen">
        <h2 class="section-title">PUBLIER AVEC IA</h2>
        
        <div class="form-group">
            <label>Nom du produit</label>
            <input type="text" id="prod-name" placeholder="Ex: Diamant Brut Brillant">
        </div>

        <div class="form-group">
            <label>Prix (FCFA)</label>
            <input type="number" id="prod-price" placeholder="Ex: 5000000">
        </div>

        <div class="form-group">
            <label>Fichier Média (Image/Vidéo)</label>
            <div class="file-select-container">
                <span class="file-custom-btn">Choisir le fichier</span>
                <span class="file-name-text" id="file-name-display">aucun fichier sélectionné</span>
                <input type="file" id="prod-file" onchange="mettreAJourFichier(this)">
            </div>
        </div>

        <div class="ia-status-box">
            <div class="ia-percent" id="upload-status">Déploiement IA : 0%</div>
        </div>

        <button class="btn-deploy" onclick="lancerDeploieIA()">DÉPLOYER AVEC IA</button>
    </main>

    <div class="server-status">
        <span class="status-dot online"></span>
        <p>Connexion Cloud Google : <span class="latency">22ms</span> (Stable)</p>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="btn-nav-accueil" onclick="changerEcran('accueil')">
            <i class="fa-solid fa-house"></i>
            <span>Accueil</span>
        </div>
        <div class="nav-item" id="btn-nav-vente" onclick="changerEcran('vente')">
            <i class="fa-solid fa-bolt"></i>
            <span>IA Vente</span>
        </div>
        <div class="nav-item" onclick="quitterApp()">
            <i class="fa-solid fa-door-open"></i>
            <span>Quitter</span>
        </div>
    </nav>

    <script>
        function changerEcran(nomEcran) {
            document.getElementById('screen-accueil').classList.remove('active-screen');
            document.getElementById('screen-vente').classList.remove('active-screen');
            
            document.getElementById('btn-nav-accueil').classList.remove('active');
            document.getElementById('btn-nav-vente').classList.remove('active');

            if(nomEcran === 'accueil') {
                document.getElementById('screen-accueil').classList.add('active-screen');
                document.getElementById('btn-nav-accueil').classList.add('active');
            } else if(nomEcran === 'vente') {
                document.getElementById('screen-vente').classList.add('active-screen');
                document.getElementById('btn-nav-vente').classList.add('active');
            }
        }

        function mettreAJourFichier(input) {
            const display = document.getElementById('file-name-display');
            if (input.files && input.files.length > 0) {
                display.textContent = input.files[0].name;
                display.style.color = "#00E5FF";
            } else {
                display.textContent = "aucun fichier sélectionné";
                display.style.color = "#888888";
            }
        }

        function lancerDeploieIA() {
            const statusText = document.getElementById('upload-status');
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;

            if(!name || !price) {
                alert("Veuillez remplir le nom et le prix avant le déploiement.");
                return;
            }

            let pourcentage = 0;
            statusText.style.color = "#00E5FF";
            
            const intervalle = setInterval(() => {
                pourcentage += 10;
                statusText.textContent = `Déploiement IA : ${pourcentage}%`;
                
                if (pourcentage >= 100) {
                    clearInterval(intervalle);
                    statusText.textContent = "DEPLOIEMENT IA REUSSI !";
                    statusText.style.color = "#00FF66";
                    alert(`Félicitations Steve ! Le produit "${name}" a été traité par l'Ouvrier IA.`);
                }
            }, 150);
        }

        function acheterProduit(nom) {
            alert(`Demande d'achat initiée pour : ${nom}. Connexion à la passerelle de paiement...`);
        }

        function quitterApp() {
            if(confirm("Voulez-vous fermer l'application S.E.G GLOBAL ?")) {
                alert("Fermeture de la session de l'Empire.");
            }
        }
    </script>
</body>
</html>
